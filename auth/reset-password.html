<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Cambiar contraseña · Homyo</title>
    <link rel="stylesheet" href="./bh-shared.css" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600&display=swap');

      :root{
        --bg:#FFFDFA;
        --granate:#8C1F2D;
        --granateDark:#701724;
        --dorado:#C4962A;
        --doradoSoft:#E2B84C;
        --crema:#F2E9D8;
        --ink:#1d1a17;
        --ink2:#4a4640;
        --muted:#8a857d;
        --line:#ece6db;
        --card:#fff;
        --ok:#1f7a4c;
        --error:#9f1d2f;
      }

      *{ box-sizing:border-box; }

      html,body{
        min-height:100%;
        margin:0;
        background:
          radial-gradient(circle at 16% 22%, rgba(226,184,76,.15), transparent 30%),
          radial-gradient(circle at 84% 78%, rgba(140,31,45,.08), transparent 32%),
          var(--bg);
        color:var(--ink);
        font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      }

      body{
        min-height:100vh;
        display:grid;
        place-items:center;
        padding:24px;
      }

      .resetCard{
        width:min(500px,100%);
        background:rgba(255,255,255,.92);
        border:1px solid rgba(196,150,42,.28);
        border-radius:18px;
        box-shadow:0 18px 50px rgba(140,31,45,.09);
        padding:38px 34px 32px;
        position:relative;
        overflow:hidden;
      }

      .resetCard::before{
        content:"";
        position:absolute;
        left:0;
        right:0;
        top:0;
        height:4px;
        background:linear-gradient(90deg,var(--granate),var(--doradoSoft));
      }

      .brand{
        font-family:'Raleway','Montserrat',system-ui,sans-serif;
        font-size:28px;
        font-weight:600;
        letter-spacing:.34em;
        line-height:1;
        color:var(--granate);
        text-transform:uppercase;
        text-align:center;
        margin-bottom:32px;
      }

      .kicker{
        margin:0 0 12px;
        font-family:'Raleway','Montserrat',system-ui,sans-serif;
        font-size:11px;
        font-weight:600;
        letter-spacing:.26em;
        text-transform:uppercase;
        color:var(--dorado);
      }

      .resetTitle{
        margin:0 0 12px;
        font-family:'Raleway','Montserrat',system-ui,sans-serif;
        font-size:34px;
        line-height:1.08;
        letter-spacing:-.7px;
        font-weight:400;
        color:var(--granate);
      }

      .resetText{
        margin:0 0 22px;
        color:var(--ink2);
        font-size:16px;
        line-height:1.55;
      }

      .fieldLabel{
        display:block;
        margin:0 0 8px;
        color:var(--ink2);
        font-size:13px;
        font-weight:600;
      }

      .passwordField{
        width:100%;
        min-height:48px;
        border:1px solid rgba(140,31,45,.18);
        border-radius:12px;
        background:#fff;
        color:var(--ink);
        font-size:16px;
        padding:0 14px;
        outline:none;
        transition:border-color .18s ease, box-shadow .18s ease;
      }

      .passwordField:focus{
        border-color:rgba(140,31,45,.42);
        box-shadow:0 0 0 4px rgba(140,31,45,.07);
      }

      .primaryBtn{
        width:100%;
        min-height:48px;
        margin-top:14px;
        appearance:none;
        border:1px solid var(--granate);
        border-radius:999px;
        background:var(--granate);
        color:#fff;
        padding:12px 20px;
        cursor:pointer;
        font-family:'Raleway','Montserrat',system-ui,sans-serif;
        font-size:12px;
        font-weight:600;
        letter-spacing:.18em;
        text-transform:uppercase;
        transition:background .18s ease, transform .18s ease, box-shadow .18s ease, opacity .18s ease;
      }

      .primaryBtn:hover:not(:disabled){
        background:var(--granateDark);
        transform:translateY(-1px);
        box-shadow:0 10px 24px rgba(140,31,45,.16);
      }

      .primaryBtn:disabled{
        opacity:.55;
        cursor:not-allowed;
      }

      .resetMsg{
        margin-top:16px;
        padding:12px 14px;
        border-radius:12px;
        border:1px solid transparent;
        background:var(--crema);
        color:var(--ink2);
        font-size:14px;
        line-height:1.45;
      }

      .resetMsg:empty{ display:none; }
      .resetMsg.ok{ color:var(--ok); background:rgba(31,122,76,.07); border-color:rgba(31,122,76,.18); }
      .resetMsg.error{ color:var(--error); background:rgba(140,31,45,.07); border-color:rgba(140,31,45,.18); }

      .resetActions{
        margin-top:22px;
        text-align:center;
      }

      .resetLink{
        color:var(--granate);
        text-decoration:none;
        font-family:'Raleway','Montserrat',system-ui,sans-serif;
        font-size:12px;
        font-weight:600;
        letter-spacing:.16em;
        text-transform:uppercase;
        border-bottom:1px solid rgba(140,31,45,.32);
        padding-bottom:3px;
      }

      .resetLink:hover{
        border-bottom-color:var(--granate);
      }

      .resetHidden{ display:none !important; }

      @media (max-width:560px){
        body{ padding:18px; }
        .resetCard{ padding:32px 22px 28px; border-radius:14px; }
        .brand{ font-size:24px; letter-spacing:.26em; margin-bottom:26px; }
        .resetTitle{ font-size:28px; }
        .resetText{ font-size:15px; }
      }
    </style>
  </head>
  <body>
    <main class="resetCard">
      <div class="brand">Homyo</div>

      <p class="kicker">Acceso seguro</p>
      <h1 class="resetTitle">Cambia tu contraseña</h1>
      <p class="resetText" id="resetIntro">Validando el enlace de recuperación…</p>

      <div id="resetForm" class="resetHidden">
        <label class="fieldLabel" for="newPassword">Nueva contraseña</label>
        <input id="newPassword" class="passwordField" type="password" autocomplete="new-password" placeholder="Mínimo 8 caracteres" />
        <button id="savePasswordBtn" type="button" class="primaryBtn">Guardar contraseña</button>
      </div>

      <div id="resetMsg" class="resetMsg" role="status" aria-live="polite"></div>

      <div class="resetActions">
        <a class="resetLink" href="./index.html">Volver al inicio</a>
      </div>
    </main>

    <script type="module">
      import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

      const SUPABASE_URL = "https://dpusnylssfjnksbieimj.supabase.co";
      const SUPABASE_ANON_KEY = "sb_publishable_tSSgJcWWRfEe2uob7SFYgw_AqcBL7KK";
      const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const resetIntro = document.getElementById("resetIntro");
      const resetForm = document.getElementById("resetForm");
      const newPassword = document.getElementById("newPassword");
      const savePasswordBtn = document.getElementById("savePasswordBtn");
      const resetMsg = document.getElementById("resetMsg");

      function setMsg(text, type = "") {
        resetMsg.textContent = text || "";
        resetMsg.className = "resetMsg" + (type ? " " + type : "");
      }

      async function establishRecoverySession(){
        const currentUrl = new URL(window.location.href);
        const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ""));
        const hasCode = currentUrl.searchParams.has("code");
        const hasHashSession = hashParams.has("access_token");
        const hasError = currentUrl.searchParams.has("error") || currentUrl.searchParams.has("error_description") || hashParams.has("error") || hashParams.has("error_description");

        if (hasError) {
          throw new Error(hashParams.get("error_description") || currentUrl.searchParams.get("error_description") || "El enlace no es válido.");
        }

        if (hasCode) {
          const { error } = await supabase.auth.exchangeCodeForSession(window.location.href);
          if (error) throw error;
          window.history.replaceState({}, document.title, window.location.pathname);
        } else if (hasHashSession) {
          const access_token = hashParams.get("access_token");
          const refresh_token = hashParams.get("refresh_token");
          const { error } = await supabase.auth.setSession({ access_token, refresh_token });
          if (error) throw error;
          window.history.replaceState({}, document.title, window.location.pathname);
        }

        const { data, error } = await supabase.auth.getSession();
        if (error) throw error;
        if (!data?.session) throw new Error("No hay sesión de recuperación activa.");
      }

      async function init(){
        try {
          await establishRecoverySession();
          resetIntro.textContent = "Introduce una nueva contraseña para tu cuenta.";
          resetForm.classList.remove("resetHidden");
          setMsg("");
          newPassword.focus();
        } catch (e) {
          console.error(e);
          resetIntro.textContent = "No se ha podido validar el enlace de recuperación.";
          setMsg("El enlace puede haber caducado o la URL de recuperación no está autorizada en Supabase. Solicita un nuevo correo de recuperación.", "error");
          savePasswordBtn.disabled = true;
        }
      }

      savePasswordBtn.addEventListener("click", async () => {
        const password = newPassword.value || "";

        if (password.length < 8) {
          setMsg("La contraseña debe tener al menos 8 caracteres.", "error");
          return;
        }

        try {
          savePasswordBtn.disabled = true;
          setMsg("");

          const { error } = await supabase.auth.updateUser({ password });
          if (error) throw error;

          setMsg("Contraseña actualizada. Ya puedes iniciar sesión.", "ok");
          setTimeout(async () => {
            await supabase.auth.signOut();
            window.location.href = "./index.html";
          }, 1200);
        } catch (e) {
          setMsg("No se pudo actualizar la contraseña. Abre de nuevo el enlace del correo e inténtalo otra vez.", "error");
          console.error(e);
        } finally {
          savePasswordBtn.disabled = false;
        }
      });

      newPassword.addEventListener("keydown", (e) => {
        if (e.key === "Enter") savePasswordBtn.click();
      });

      init();
    </script>
  </body>
</html>
