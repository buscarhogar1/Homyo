<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Buscar Hogar – Mapa</title>

    <link rel="stylesheet" href="./bh-shared.css?v=20260504" />
    <link rel="stylesheet" href="./bh-header-overrides.css?v=20260504" />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <link rel="stylesheet" href="./bh-map.css?v=20260505_marker_states_no_footer_fix" />

    <style>
      @media (max-width: 720px){
        #bhHeader{
          display:block !important;
          position:relative !important;
          z-index:10020 !important;
        }

        #bhHeader .topbar{
          display:flex !important;
          visibility:visible !important;
          opacity:1 !important;
          position:relative !important;
          z-index:10021 !important;
        }

        .mobileBottomNav{
          display:none !important;
        }
      }
    </style>
  </head>

  <body>
    <div id="bhHeader"></div>

    <!-- Contenedor general de la página del mapa -->

    <div class="mobileTopRow" aria-hidden="true">
      <div class="mobileSearchShell">
        <span class="mobileSearchIcon" aria-hidden="true">⌕</span>
        <input id="mobileSearchInput" class="mobileSearchInput" type="text" placeholder="Buscar zona..." />
      </div>
    </div>

    <div class="mobileActionsRow" aria-hidden="true">
      <button id="mobileFiltersBtn" class="mobileActionBtn" type="button">Filtros</button>
      <button id="mobileListBtn" class="mobileActionBtn" type="button">Listado</button>
    </div>

    <div class="page">
      <div class="mapShell">

        <!-- Fila superior independiente (NO dentro de columnas) -->
        <div class="topRow">
          <div class="topCell topCellLeft">
            <button id="toggleFiltersBtn" class="topToggleBtn" type="button">Ocultar filtros</button>
          </div>

          <div class="topCell topCellCenter">
            <!-- Etiqueta dinámica “Comunidad / Ciudad / Zona” -->
            <div id="placeLabel" class="placeLabel">—</div>
          </div>

          <div class="topCell topCellRight">
            <div class="topRightTools">
              <button id="orderBtn" class="topToggleBtn" type="button">Ordenar por</button>
              <button id="toggleListBtn" class="topToggleBtn" type="button">Ocultar listado</button>

              <!-- Menú desplegable de orden -->
              <div id="orderMenu" class="orderMenu" aria-hidden="true">
                <button class="orderItem" type="button" data-order="date_desc">Fecha de publicación: más recientes</button>
                <button class="orderItem" type="button" data-order="date_asc">Fecha de publicación: más antiguos</button>
                <button class="orderItem" type="button" data-order="price_asc">Precio: menor a mayor</button>
                <button class="orderItem" type="button" data-order="price_desc">Precio: mayor a menor</button>
                <button class="orderItem" type="button" data-order="size_asc">Tamaño: menor a mayor</button>
                <button class="orderItem" type="button" data-order="size_desc">Tamaño: mayor a menor</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Layout 3 columnas: filtros | mapa | listado -->
        <div class="grid3" id="grid3">
          <!-- Columna filtros (scroll interno) -->
          <aside class="col colFilters" id="filtersCol">
            <div class="mobilePanelHead">
              <div class="mobilePanelTitle">Filtros</div>
              <button id="mobileFiltersCloseBtn" class="mobilePanelClose" type="button" aria-label="Cerrar filtros">×</button>
            </div>
            <div id="filtersBarMount"></div>
          </aside>

          <!-- Columna mapa -->
          <main class="col colMap" id="mapCol">
            <div id="mapWrap" class="mapWrap">
              <div id="map"></div>

              <!-- Overlay / UI existente -->
              <div id="sunOverlay" class="sunOverlay" aria-hidden="true">
                <div id="sunOverlayLabel" class="sunOverlayLabel">—</div>
                <svg id="sunPolarOverlay" aria-label="Diagrama solar"></svg>
              </div>

              <div id="sunDateDock" class="sunDateDock" aria-hidden="true">
                <div class="sunDateDockInner">
                  <input type="date" id="sunDate" />
                  <button type="button" id="sunNowBtn">Ahora</button>
                </div>
              </div>

              <div id="sunTimebar" class="sunTimebar" aria-hidden="true">
                <div class="sunTimebarInner">
                  <div class="sunHoursRow" id="sunHoursRow"></div>
                  <div class="sunTrack" id="sunTrack">
                    <input id="sunRange" class="sunRange" type="range" min="0" max="1439" step="10" />
                  </div>
                </div>
              </div>

              <div id="areaHint" class="areaHint" aria-hidden="true">
                <div class="areaHintInner">
                  <div class="areaHintDot" aria-hidden="true"></div>
                  <div id="areaHintText" class="areaHintText">—</div>
                </div>
              </div>

              <!-- Tarjeta “flotante” de selección (ahora se posiciona respecto al mapa, no al viewport) -->
              <div id="card" class="card">
                <div class="cardGrid">
                  <div class="mediaSide">
                    <span id="badgeNew" class="badgeNew">Nuevo</span>
                    <img id="mediaImg" class="mediaImg" alt="" style="display:none;" />
                    <div id="mediaPlaceholder" class="mediaPlaceholder">Foto</div>

                    <div class="mediaMiniIcon" title="Fotos">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h3l2-2h4l2 2h3a2 2 0 0 1 2 2z"/>
                        <path d="M12 17a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/>
                      </svg>
                    </div>
                  </div>

                  <div class="textSide">
                    <div class="topActions">
                      <button class="closeBtn" id="cardClose" type="button" aria-label="Cerrar">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                          <path d="M18 6L6 18"/><path d="M6 6l12 12"/>
                        </svg>
                      </button>
                    </div>

                    <a id="cardAddrTop" class="addrTop" href="#">Dirección</a>
                    <div id="cardAddrBottom" class="addrBottom">—</div>

                    <div id="cardPrice" class="price">—</div>
                    <div id="cardFacts" class="facts"></div>

                    <div id="cardAgency" class="agency">—</div>
                  </div>
                </div>
              </div>

              <!-- Status “pill” dentro del mapa (referencia visual) -->
              <div id="status"></div>
            </div>
          </main>

          <!-- Columna listado (scroll interno) -->
          <aside class="col colList" id="listCol">
            <div class="mobilePanelHead">
              <div class="mobilePanelTitle">Listado</div>
              <div class="mobilePanelHeadActions">
                <button id="mobileOrderBtn" class="mobilePanelActionBtn" type="button" aria-label="Ordenar listado">Ordenar por</button>
                <button id="mobileListCloseBtn" class="mobilePanelClose" type="button" aria-label="Cerrar listado">×</button>
              </div>
              <div id="mobileOrderMenu" class="mobileOrderMenu" aria-hidden="true">
                <button class="orderItem" type="button" data-order="date_desc">Fecha de publicación: más recientes</button>
                <button class="orderItem" type="button" data-order="date_asc">Fecha de publicación: más antiguos</button>
                <button class="orderItem" type="button" data-order="price_asc">Precio: menor a mayor</button>
                <button class="orderItem" type="button" data-order="price_desc">Precio: mayor a menor</button>
                <button class="orderItem" type="button" data-order="size_asc">Tamaño: menor a mayor</button>
                <button class="orderItem" type="button" data-order="size_desc">Tamaño: mayor a menor</button>
              </div>
            </div>
            <div id="listMount" class="listMount">
              <div id="listItems" class="listItems"></div>
            </div>
          </aside>
        </div>
      </div>
    </div>
<script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>

    <script type="module">
      import { initLayout } from "./bh-layout.js?v=20260504";
      import { initAuth } from "./bh-auth.js?v=20260504";
      import { initFiltersBar } from "./bh-map-filters.js";
      import { initMap } from "./bh-map-core.js";

      // Header / auth
      // bh-layout.js necesita un contenedor bhFooter, pero en map.html no queremos footer visible.
      // Creamos un soporte temporal oculto, inicializamos el layout y lo eliminamos.
      let tempFooterMount = null;
      if (!document.getElementById("bhFooter")) {
        tempFooterMount = document.createElement("div");
        tempFooterMount.id = "bhFooter";
        tempFooterMount.hidden = true;
        tempFooterMount.style.display = "none";
        document.body.appendChild(tempFooterMount);
      }

      initLayout({ showMiniSearch: true });

      if (tempFooterMount) {
        tempFooterMount.remove();
      }

      initAuth();

      // Inicializamos filtros dentro de su columna
      initFiltersBar({ mountId: "filtersBarMount" });

      // Toggle columnas (arreglo del bug: el de filtros ahora alterna bien siempre)
      const grid = document.getElementById("grid3");
      const btnFilters = document.getElementById("toggleFiltersBtn");
      const btnList = document.getElementById("toggleListBtn");
      const mobileFiltersBtn = document.getElementById("mobileFiltersBtn");
      const mobileListBtn = document.getElementById("mobileListBtn");
      const mobileFiltersCloseBtn = document.getElementById("mobileFiltersCloseBtn");
      const mobileListCloseBtn = document.getElementById("mobileListCloseBtn");
      const mobileOrderBtn = document.getElementById("mobileOrderBtn");
      const mobileOrderMenu = document.getElementById("mobileOrderMenu");

      function closeMobilePanels() {
        document.body.classList.remove("mobileFiltersOpen");
        document.body.classList.remove("mobileListOpen");
        notifyLayoutResize();
      }

      function openMobileFilters() {
        document.body.classList.remove("mobileListOpen");
        document.body.classList.add("mobileFiltersOpen");
      }

      function openMobileList() {
        document.body.classList.remove("mobileFiltersOpen");
        document.body.classList.add("mobileListOpen");
      }

      function applyToggleTexts() {
        const filtersHidden = grid.classList.contains("hideFilters");
        const listHidden = grid.classList.contains("hideList");
        btnFilters.textContent = filtersHidden ? "Mostrar filtros" : "Ocultar filtros";
        btnList.textContent = listHidden ? "Mostrar listado" : "Ocultar listado";
      }

      function notifyLayoutResize() {
        // Leaflet necesita invalidateSize; bh-map-core.js escucha este evento
        window.dispatchEvent(new CustomEvent("bh:layout-resize"));
      }

      btnFilters.addEventListener("click", () => {
        grid.classList.toggle("hideFilters");
        applyToggleTexts();
        notifyLayoutResize();
      });

      btnList.addEventListener("click", () => {
        grid.classList.toggle("hideList");
          notifyLayoutResize();
      });


      mobileFiltersBtn?.addEventListener("click", () => {
        openMobileFilters();
      });

      mobileListBtn?.addEventListener("click", () => {
        openMobileList();
      });

      mobileFiltersCloseBtn?.addEventListener("click", () => {
        closeMobilePanels();
      });

      mobileListCloseBtn?.addEventListener("click", () => {
        closeMobilePanels();
      });

      applyToggleTexts();

      // Orden: escritorio + móvil
      const orderBtn = document.getElementById("orderBtn");
      const orderMenu = document.getElementById("orderMenu");

      function closeOrderMenu() {
        orderMenu.style.display = "none";
        orderMenu.setAttribute("aria-hidden", "true");
      }
      function openOrderMenu() {
        orderMenu.style.display = "block";
        orderMenu.setAttribute("aria-hidden", "false");
      }

      function closeMobileOrderMenu() {
        if (!mobileOrderMenu) return;
        mobileOrderMenu.style.display = "none";
        mobileOrderMenu.setAttribute("aria-hidden", "true");
      }
      function openMobileOrderMenu() {
        if (!mobileOrderMenu) return;
        mobileOrderMenu.style.display = "block";
        mobileOrderMenu.setAttribute("aria-hidden", "false");
      }

      closeOrderMenu();
      closeMobileOrderMenu();

      orderBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        const open = orderMenu.getAttribute("aria-hidden") === "false";
        if (open) closeOrderMenu();
        else openOrderMenu();
      });

      mobileOrderBtn?.addEventListener("click", (e) => {
        e.stopPropagation();
        const open = mobileOrderMenu?.getAttribute("aria-hidden") === "false";
        if (open) closeMobileOrderMenu();
        else openMobileOrderMenu();
      });

      document.addEventListener("click", () => {
        closeOrderMenu();
        closeMobileOrderMenu();
      });

      orderMenu.querySelectorAll(".orderItem").forEach((b) => {
        b.addEventListener("click", () => {
          const v = b.getAttribute("data-order");
          window.__bhListOrder = v || "date_desc";
          closeOrderMenu();
          window.dispatchEvent(new CustomEvent("bh:list-order-changed"));
        });
      });

      mobileOrderMenu?.querySelectorAll(".orderItem").forEach((b) => {
        b.addEventListener("click", () => {
          const v = b.getAttribute("data-order");
          window.__bhListOrder = v || "date_desc";
          closeMobileOrderMenu();
          window.dispatchEvent(new CustomEvent("bh:list-order-changed"));
        });
      });

      // Inicializar mapa
      initMap();
    </script>
  

    <script>
      if (new URLSearchParams(location.search).get('sim')) {
        document.addEventListener('DOMContentLoaded', function() {
          var t = document.getElementById('previewToggle');
          var o = document.getElementById('mobileSimOverlay');
          if (t) t.style.display = 'none';
          if (o) o.style.display = 'none';
        });
      }
    </script>
    <!-- Botón preview responsive -->
    <style>
      #previewToggle {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 99999;
        display: flex;
        align-items: center;
        gap: 6px;
        background: #fff;
        border: 1px solid rgba(140,31,45,.18);
        border-radius: 999px;
        padding: 6px 14px 6px 10px;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 12px;
        font-weight: 500;
        color: #8C1F2D;
        cursor: pointer;
        box-shadow: 0 2px 12px rgba(0,0,0,.10);
        transition: box-shadow .15s, background .15s;
        user-select: none;
      }
      #previewToggle:hover {
        background: #fdf5f5;
        box-shadow: 0 4px 18px rgba(140,31,45,.13);
      }
      #previewToggle svg {
        width: 15px;
        height: 15px;
        flex-shrink: 0;
      }
      #mobileSimOverlay {
        display: none;
        position: fixed;
        inset: 0;
        background: #d6d2cd;
        z-index: 99990;
        align-items: center;
        justify-content: center;
      }
      #mobileSimOverlay.active {
        display: flex;
      }
      .sim-phone-wrap {
        position: relative;
        flex-shrink: 0;
      }
      .sim-phone-bezel {
        position: absolute;
        inset: 0;
        background: transparent;
        border: 8px solid #1c1c1e;
        border-radius: 48px;
        box-shadow: 0 0 0 2px #3a3a3c, 0 24px 64px rgba(0,0,0,.5);
        pointer-events: none;
        z-index: 3;
        box-sizing: border-box;
      }
      .sim-phone-island {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        background: #1c1c1e;
        border-radius: 20px;
        z-index: 3;
        pointer-events: none;
      }
      .sim-phone-screen {
        position: absolute;
        border-radius: 42px;
        overflow: hidden;
        background: #FFFDFA;
        z-index: 1;
      }
      .sim-phone-content {
        width: 375px;
        transform-origin: top left;
        overflow-y: auto;
        overflow-x: hidden;
        background: #FFFDFA;
      }
      .sim-clone-inner {
        width: 375px;
        background: #FFFDFA;
      }
    </style>

    <button id="previewToggle" title="Ver en móvil">
      <svg id="ptIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="2" width="14" height="20" rx="2"></rect>
        <circle cx="12" cy="17" r="1"></circle>
      </svg>
      <span id="ptLabel">Móvil</span>
    </button>

    <div id="mobileSimOverlay">
      <div class="sim-phone-wrap" id="simPhoneWrap">
        <div class="sim-phone-bezel"></div>
        <div class="sim-phone-island"></div>
        <div class="sim-phone-screen">
          <div class="sim-phone-content" id="simContent"></div>
        </div>
      </div>
    </div>


    <script>
      (function() {
        const btn     = document.getElementById('previewToggle');
        const overlay = document.getElementById('mobileSimOverlay');
        const wrap    = document.getElementById('simPhoneWrap');
        const bezel   = wrap.querySelector('.sim-phone-bezel');
        const island  = wrap.querySelector('.sim-phone-island');
        const screen  = wrap.querySelector('.sim-phone-screen');
        const icon    = document.getElementById('ptIcon');
        const label   = document.getElementById('ptLabel');

        const ICON_MOBILE  = `<rect x="5" y="2" width="14" height="20" rx="2"></rect><circle cx="12" cy="17" r="1"></circle>`;
        const ICON_DESKTOP = `<rect x="2" y="3" width="20" height="14" rx="2"></rect><path d="M8 21h8M12 17v4"></path>`;

        const PW = 393, PH = 852;
        const INSET = 10;
        const SIM_W = 375;

        let active = false;
        let frameCreated = false;

        function computeScale() {
          const margin = 40;
          return Math.min(
            (window.innerWidth  - margin * 2) / PW,
            (window.innerHeight - margin * 2) / PH,
            1
          );
        }

        function applyScale() {
          const s = computeScale();
          const tw = PW * s;
          const th = PH * s;
          wrap.style.width  = tw + 'px';
          wrap.style.height = th + 'px';
          bezel.style.borderRadius = (48 * s) + 'px';
          island.style.top    = (14 * s) + 'px';
          island.style.width  = (110 * s) + 'px';
          island.style.height = (30 * s) + 'px';
          island.style.borderRadius = (20 * s) + 'px';
          const si = INSET * s;
          const sw = tw - si * 2;
          const sh = th - si * 2;
          screen.style.left   = si + 'px';
          screen.style.top    = si + 'px';
          screen.style.width  = sw + 'px';
          screen.style.height = sh + 'px';
          screen.style.borderRadius = (42 * s) + 'px';
          // Escalar iframe al viewport simulado
          const cs = sw / SIM_W;
          const frame = screen.querySelector('iframe');
          if (frame) {
            frame.style.transform = `scale(${cs})`;
            frame.style.transformOrigin = 'top left';
            frame.style.width  = SIM_W + 'px';
            frame.style.height = (sh / cs) + 'px';
          }
        }

        function createFrame() {
          if (frameCreated) return;
          frameCreated = true;
          const frame = document.createElement('iframe');
          frame.src = location.href + (location.search ? '&' : '?') + 'sim=1';
          frame.style.border = 'none';
          frame.style.display = 'block';
          frame.setAttribute('title', 'Vista móvil');
          screen.appendChild(frame);
        }

        function open() {
          createFrame();
          applyScale();
          overlay.classList.add('active');
          icon.innerHTML = ICON_DESKTOP;
          label.textContent = 'Web';
          btn.title = 'Volver a vista web';
          active = true;
        }

        function close() {
          overlay.classList.remove('active');
          icon.innerHTML = ICON_MOBILE;
          label.textContent = 'Móvil';
          btn.title = 'Ver en móvil';
          active = false;
        }

        btn.addEventListener('click', () => active ? close() : open());
        window.addEventListener('resize', () => { if (active) applyScale(); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape' && active) close(); });
      })();
    </script>
  </body>
</html>
