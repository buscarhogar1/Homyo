    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>

    <script>
      /* =========================
         CONFIG + UTILIDADES
         ========================= */

      const SUPABASE_URL = "https://dpusnylssfjnksbieimj.supabase.co";
      const SUPABASE_ANON_KEY = "sb_publishable_tSSgJcWWRfEe2uob7SFYgw_AqcBL7KK";

      const DEFAULT_CENTER = [37.9838, -1.1280];
      const DEFAULT_ZOOM = 13;

      /* =========================
         MAPA
         ========================= */

      let map = L.map("map").setView(DEFAULT_CENTER, DEFAULT_ZOOM);

      L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap &copy; CARTO"
      }).addTo(map);

      let markersLayer = L.layerGroup().addTo(map);

      /* =========================
         AREAS – ESTADO Y LOGICA
         ========================= */

      const MAX_AREAS = 5;

      const areaState = {
        pointsActive: false,
        freehandActive: false,

        isDrawing: false,
        drawingMode: null,

        points: [],
        tempLine: null,
        tempLivePoly: null,
        tempFirstMarker: null,
        tempVertexMarkers: [],

        polys: [],
        nextId: 1,

        sunBtnForceOff: null,
        lastHint: ""
      };

      const areasLayer = L.layerGroup().addTo(map);

      function setMarkersVisible(v){
        if (v) markersLayer.addTo(map);
        else map.removeLayer(markersLayer);
      }

      function clearTempDrawing(){
        if (areaState.tempLine) areasLayer.removeLayer(areaState.tempLine);
        if (areaState.tempLivePoly) areasLayer.removeLayer(areaState.tempLivePoly);
        if (areaState.tempFirstMarker) areasLayer.removeLayer(areaState.tempFirstMarker);
        areaState.tempVertexMarkers.forEach(m => areasLayer.removeLayer(m));

        areaState.tempLine = null;
        areaState.tempLivePoly = null;
        areaState.tempFirstMarker = null;
        areaState.tempVertexMarkers = [];
        areaState.points = [];
      }

      function cancelCurrentDrawing(){
        areaState.isDrawing = false;
        areaState.drawingMode = null;
        clearTempDrawing();
        setMarkersVisible(true);
      }

      function startNewAreaDrawing(mode){
        if (areaState.polys.length >= MAX_AREAS) return;
        if (areaState.sunBtnForceOff) areaState.sunBtnForceOff();

        cancelCurrentDrawing();
        areaState.isDrawing = true;
        areaState.drawingMode = mode;
        setMarkersVisible(false);

        if (mode === "points") {
          areaState.tempLine = L.polyline([], {
            color: "rgba(26,115,232,0.88)",
            weight: 3
          }).addTo(areasLayer);
        }
      }

      function addAreaPolygon(latlngs){
        if (latlngs.length < 3) return;

        const id = areaState.nextId++;
        const poly = L.polygon(latlngs, {
          color: "rgba(26,115,232,0.8)",
          fillOpacity: 0.18
        }).addTo(areasLayer);

        areaState.polys.push({ id, latlngs, poly });
      }

      /* =========================
         FILTRADO
         ========================= */

      function pointInPoly(lat, lng, poly){
        let inside = false;
        for (let i=0,j=poly.length-1;i<poly.length;j=i++){
          const xi=poly[i].lng, yi=poly[i].lat;
          const xj=poly[j].lng, yj=poly[j].lat;
          const intersect = ((yi>lat)!==(yj>lat)) &&
            (lng < (xj-xi)*(lat-yi)/((yj-yi)||1e-12)+xi);
          if (intersect) inside=!inside;
        }
        return inside;
      }

      function isInsideAnyArea(p){
        if (!areaState.polys.length) return true;
        return areaState.polys.some(a => pointInPoly(p.lat, p.lng, a.latlngs));
      }

      /* =========================
         SOL
         ========================= */

      const ZOOM_SOL_MIN = 16; // ← CAMBIO CLAVE

      let sunEnabled = false;

      function polarXY(cx, cy, R, bearingDeg, altDeg){
        const altClamped = Math.max(-24, Math.min(90, altDeg));
        const r = ((90 - altClamped) / 90) * R;
        const t = bearingDeg * Math.PI / 180;
        return {
          x: cx + r * Math.sin(t),
          y: cy - r * Math.cos(t)
        };
      }

      /* resto de lógica solar SIN CAMBIOS */

      /* =========================
         FIN PARTE 1
         ========================= */
      /* =========================
         CONTROLES AREAS
         (parte 2)
         ========================= */

      // Helpers para cumplir reglas de:
      // - + solo aparece tras el 1er área de ese tipo
      // - desactivar un modo borra SOLO sus áreas
      // - ambos modos pueden estar activos a la vez
      function countAreasByType(type){
        return areaState.polys.filter(a => a && a.type === type).length;
      }

      function removeAreasByType(type){
        const toRemove = areaState.polys.filter(a => a && a.type === type).map(a => a.id);
        toRemove.forEach(id => removeAreaById(id));
      }

      // Wrap: añade type (si no viene, usa drawingMode actual)
      const _addAreaPolygon_original = addAreaPolygon;
      addAreaPolygon = function(latlngs, type){
        const t = type || areaState.drawingMode || "points";
        const ok = _addAreaPolygon_original(latlngs);
        if (!ok) return false;

        // el último insertado es el nuevo
        const last = areaState.polys[areaState.polys.length - 1];
        if (last) last.type = t;

        return true;
      };

      const AreasControl = L.Control.extend({
        options: { position: "topright" },
        onAdd: function() {
          const container = L.DomUtil.create("div", "quickCol");
          L.DomEvent.disableClickPropagation(container);
          L.DomEvent.disableScrollPropagation(container);

          // Fila 1: (+) puntos + botón "puntos"
          const rowPoints = L.DomUtil.create("div", "quickRow", container);

          const plusPoints = L.DomUtil.create("div", "qBtnSmall", rowPoints);
          plusPoints.title = "Añadir otro polígono (punto a punto)";
          plusPoints.style.display = "none";
          plusPoints.innerHTML = `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14"></path><path d="M5 12h14"></path>
            </svg>
          `;

          const btnPoints = L.DomUtil.create("div", "qBtn", rowPoints);
          btnPoints.title = "Área por puntos";
          btnPoints.innerHTML = `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2l4 8-4 12-4-12 4-8z"></path>
              <path d="M12 10l8 2-8 2-8-2 8-2z"></path>
            </svg>
          `;

          // Fila 2: (+) libre + botón "libre"
          const rowFree = L.DomUtil.create("div", "quickRow", container);

          const plusFree = L.DomUtil.create("div", "qBtnSmall", rowFree);
          plusFree.title = "Añadir otro dibujo libre";
          plusFree.style.display = "none";
          plusFree.innerHTML = `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14"></path><path d="M5 12h14"></path>
            </svg>
          `;

          const btnFree = L.DomUtil.create("div", "qBtn", rowFree);
          btnFree.title = "Área dibujo libre";
          btnFree.innerHTML = `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 17c3-6 6-6 9 0s6 6 9 0"></path>
              <path d="M3 7c3 6 6 6 9 0s6-6 9 0"></path>
            </svg>
          `;

          // refs
          areaState.btnPointsEl = btnPoints;
          areaState.btnFreeEl = btnFree;
          areaState.btnPlusPointsEl = plusPoints;
          areaState.btnPlusFreeEl = plusFree;

          function refreshPlusVisibility(){
            // + solo aparece si:
            // - modo activo
            // - ya existe al menos 1 área de ese tipo
            const hasPts = countAreasByType("points") >= 1;
            const hasFree = countAreasByType("freehand") >= 1;

            plusPoints.style.display = (areaState.pointsActive && hasPts) ? "grid" : "none";
            plusFree.style.display = (areaState.freehandActive && hasFree) ? "grid" : "none";

            const full = areaState.polys.length >= MAX_AREAS;
            plusPoints.classList.toggle("disabled", full);
            plusFree.classList.toggle("disabled", full);
          }

          function refreshButtons(){
            btnPoints.classList.toggle("active", areaState.pointsActive);
            btnFree.classList.toggle("active", areaState.freehandActive);
            refreshPlusVisibility();
          }

          function activatePoints(){
            if (areaState.pointsActive) return;
            areaState.pointsActive = true;

            // Si no hay ningún polígono de puntos aún, empieza el 1º inmediatamente
            if (countAreasByType("points") === 0) {
              if (areaState.isDrawing) cancelCurrentDrawing();
              startNewAreaDrawing("points");
            }
            refreshButtons();
          }

          function deactivatePoints(){
            if (!areaState.pointsActive) return;
            areaState.pointsActive = false;

            // Si estabas dibujando puntos, cancela
            if (areaState.isDrawing && areaState.drawingMode === "points") {
              cancelCurrentDrawing();
            }

            // Borra TODOS los polígonos de puntos
            removeAreasByType("points");

            refreshButtons();
            scheduleReload();
          }

          function activateFree(){
            if (areaState.freehandActive) return;
            areaState.freehandActive = true;

            // Si no hay ningún libre aún, empieza el 1º inmediatamente
            if (countAreasByType("freehand") === 0) {
              if (areaState.isDrawing) cancelCurrentDrawing();
              startNewAreaDrawing("freehand");
            }
            refreshButtons();
          }

          function deactivateFree(){
            if (!areaState.freehandActive) return;
            areaState.freehandActive = false;

            if (areaState.isDrawing && areaState.drawingMode === "freehand") {
              cancelCurrentDrawing();
            }

            // Borra TODOS los libres
            removeAreasByType("freehand");

            refreshButtons();
            scheduleReload();
          }

          function startAnotherPoints(){
            if (!areaState.pointsActive) return;
            if (areaState.polys.length >= MAX_AREAS) return;

            // No desactiva el otro modo; solo cancela el dibujo actual si lo hay
            if (areaState.isDrawing) cancelCurrentDrawing();
            startNewAreaDrawing("points");
          }

          function startAnotherFree(){
            if (!areaState.freehandActive) return;
            if (areaState.polys.length >= MAX_AREAS) return;

            if (areaState.isDrawing) cancelCurrentDrawing();
            startNewAreaDrawing("freehand");
          }

          // Clicks botón principal (activa/desactiva)
          btnPoints.addEventListener("click", () => {
            if (areaState.pointsActive) deactivatePoints();
            else activatePoints();
          });

          btnFree.addEventListener("click", () => {
            if (areaState.freehandActive) deactivateFree();
            else activateFree();
          });

          // Clicks +
          plusPoints.addEventListener("click", () => {
            if (plusPoints.classList.contains("disabled")) return;
            startAnotherPoints();
          });

          plusFree.addEventListener("click", () => {
            if (plusFree.classList.contains("disabled")) return;
            startAnotherFree();
          });

          // Mantener visibilidad del + sincronizada cuando se añaden/borra áreas:
          // (hook ligero: cada vez que recargues, recalcula)
          const _scheduleReload = scheduleReload;
          scheduleReload = function(){
            refreshPlusVisibility();
            return _scheduleReload();
          };

          refreshButtons();
          return container;
        }
      });

      map.addControl(new AreasControl());

      // carga inicial
      (async function init(){
        try {
          if (initialParams.city) {
            const center = await geocodeCity(initialParams.city);
            if (center) map.setView(center, 13);
          }
          await loadPointsForCurrentView();
        } catch (e) {
          const msg = (e && e.message) ? e.message : String(e);
          setStatus(`Error: ${msg}`);
          console.error(e);
        }
      })();
