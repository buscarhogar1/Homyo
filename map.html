<!-- map.html -->
<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Buscar Hogar – Mapa</title>

    <link rel="stylesheet" href="/buscarhogardemo/bh-shared.css" />
    <link rel="stylesheet" href="/buscarhogardemo/bh-map.css" />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
  </head>

  <body>
    <div id="bhHeader"></div>

    <!-- futuro: filtros -->
    <div id="bhFilters"></div>

    <div class="page">
      <div class="mapShell">
        <!-- futuro: listado a la izquierda (aún no definido) -->
        <div id="bhList" style="display:none;"></div>

        <div id="map"></div>

        <div id="sunOverlay" class="sunOverlay" aria-hidden="true">
          <div id="sunOverlayLabel" class="sunOverlayLabel">—</div>
          <svg id="sunPolarOverlay" aria-label="Diagrama solar"></svg>
        </div>

        <div id="sunDateDock" class="sunDateDock" aria-hidden="true">
          <div class="sunDateDockInner">
            <input type="date" id="sunDate" />
            <button type="button" id="sunNowBtn">Ahora</button>
          </div>
        </div>

        <div id="sunTimebar" class="sunTimebar" aria-hidden="true">
          <div class="sunTimebarInner">
            <div class="sunHoursRow" id="sunHoursRow"></div>
            <div class="sunTrack" id="sunTrack">
              <input id="sunRange" class="sunRange" type="range" min="0" max="1439" step="10" />
            </div>
          </div>
        </div>

        <div id="areaHint" class="areaHint" aria-hidden="true">
          <div class="areaHintInner">
            <div class="areaHintDot" aria-hidden="true"></div>
            <div id="areaHintText" class="areaHintText">—</div>
          </div>
        </div>
      </div>
    </div>

    <div id="status"></div>

    <div id="card" class="card">
      <div class="cardGrid">
        <div class="mediaSide">
          <span id="badgeNew" class="badgeNew">Nuevo</span>
          <img id="mediaImg" class="mediaImg" alt="" style="display:none;" />
          <div id="mediaPlaceholder" class="mediaPlaceholder">Foto</div>

          <div class="mediaMiniIcon" title="Fotos">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h3l2-2h4l2 2h3a2 2 0 0 1 2 2z"/>
              <path d="M12 17a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/>
            </svg>
          </div>
        </div>

        <div class="textSide">
          <div class="topActions">
            <button class="heartBtn" id="heartBtn" type="button" aria-label="Guardar">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/>
              </svg>
            </button>

            <button class="closeBtn" id="cardClose" type="button" aria-label="Cerrar">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 6L6 18"/><path d="M6 6l12 12"/>
              </svg>
            </button>
          </div>

          <a id="cardAddrTop" class="addrTop" href="#">Dirección</a>
          <div id="cardAddrBottom" class="addrBottom">—</div>

          <div id="cardPrice" class="price">—</div>
          <div id="cardFacts" class="facts"></div>

          <div id="cardAgency" class="agency">—</div>
        </div>
      </div>
    </div>

    <div id="bhFooter"></div>

    <script type="module">
      import { initLayout } from "/buscarhogardemo/bh-layout.js";
      import { initAuth } from "/buscarhogardemo/bh-auth.js";
      initLayout({ showMiniSearch: true });
      initAuth();

      const h = document.documentElement.style;
      const applyHeaderH = () => {
        const header = document.querySelector(".bh-topbar, #bhTopbar, header");
        const px = header ? Math.round(header.getBoundingClientRect().height) : 56;
        h.setProperty("--headerH", px + "px");
      };
      window.addEventListener("load", applyHeaderH);
      window.addEventListener("resize", applyHeaderH);
      setTimeout(applyHeaderH, 0);
    </script>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>

    <!-- tus scripts (orden importante) -->
    <script src="/buscarhogardemo/bh-map-core.js"></script>
    <script src="/buscarhogardemo/bh-map-card.js"></script>
    <script src="/buscarhogardemo/bh-map-areas.js"></script>
    <script src="/buscarhogardemo/bh-map-sun.js"></script>
    <script src="/buscarhogardemo/bh-map-filters.js"></script>
    <script src="/buscarhogardemo/bh-map-list.js"></script>
  </body>
</html>
