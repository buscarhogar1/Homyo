<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Buscar Hogar — Mapa</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <!-- Estilos del proyecto -->
  <link rel="stylesheet" href="./bh-map.css" />
</head>

<body>
  <!-- Topbar -->
  <header class="topbar">
    <div class="topbarInner">
      <a class="brand" href="./">BH</a>

      <form id="miniSearchForm" class="miniSearch" autocomplete="off">
        <input id="miniQ" type="text" placeholder="Buscar..." />
        <button type="submit" aria-label="Buscar">
          <!-- lupa -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z" stroke="currentColor" stroke-width="2"/>
            <path d="M16.3 16.3 21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </form>

      <nav class="rightGroup">
        <a id="favLink" href="#" class="toplink">Favoritos</a>
        <a id="loginLink" href="#" class="toplink">Iniciar sesión</a>
      </nav>
    </div>
  </header>

  <!-- Layout principal (sin scroll en body en desktop; el scroll va dentro de columnas) -->
  <main class="page">
    <section id="mapShell" class="mapShell">
      <!-- Fila superior: botones + breadcrumb -->
      <div class="topRow">
        <div class="topCell topCellLeft">
          <div class="topBtnRow">
            <button id="toggleFiltersBtn" class="pillBtn" type="button">Ocultar filtros</button>
            <button id="clearFiltersBtn" class="pillBtn ghost" type="button">Limpiar filtros</button>
          </div>
        </div>

        <div class="topCell topCellCenter">
          <div id="crumbText" class="crumbText">—</div>
        </div>

        <div class="topCell topCellRight">
          <div class="topBtnRow right">
            <div id="sortWrap" class="sortWrap">
              <button id="sortBtn" class="pillBtn" type="button">Ordenar por</button>
              <div id="sortMenu" class="sortMenu bh-hidden" role="menu" aria-label="Ordenar por">
                <button class="sortItem" data-sort="date_desc" type="button">Fecha publicación: más reciente</button>
                <button class="sortItem" data-sort="date_asc" type="button">Fecha publicación: más antigua</button>
                <div class="sortSep"></div>
                <button class="sortItem" data-sort="price_desc" type="button">Precio: mayor a menor</button>
                <button class="sortItem" data-sort="price_asc" type="button">Precio: menor a mayor</button>
                <div class="sortSep"></div>
                <button class="sortItem" data-sort="size_asc" type="button">Tamaño: menor a mayor</button>
                <button class="sortItem" data-sort="size_desc" type="button">Tamaño: mayor a menor</button>
              </div>
            </div>

            <button id="toggleListBtn" class="pillBtn" type="button">Ocultar listado</button>
          </div>
        </div>
      </div>

      <!-- Grid principal -->
      <div class="mainGrid">
        <!-- Columna filtros -->
        <aside id="filtersCol" class="sideCol">
          <div class="sideInner">
            <div id="filtersRoot"></div>
          </div>
        </aside>

        <!-- Mapa -->
        <section id="mapCol" class="mapCol">
          <div id="map" class="map"></div>

          <!-- Barra estado -->
          <div id="mapStatus" class="mapStatus bh-hidden"></div>

          <!-- Tarjeta (se posiciona respecto al contenedor del mapa, no al viewport) -->
          <div id="mapCardHost" class="mapCardHost"></div>
        </section>

        <!-- Columna listado -->
        <aside id="listCol" class="sideCol">
          <div class="sideInner">
            <div id="listRoot"></div>
          </div>
        </aside>
      </div>

      <!-- Footer SIEMPRE visible (sin scroll del body en desktop) -->
      <footer class="footerBar">
        <div class="footerInner">
          © 2026 Buscar Hogar &nbsp;&middot;&nbsp;
          <a href="./terms.html">Términos de uso</a> &nbsp;&middot;&nbsp;
          <a href="./privacy.html">Política de privacidad</a> &nbsp;&middot;&nbsp;
          <a href="./cookies.html">Política de cookies</a>
        </div>
      </footer>
    </section>
  </main>

  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Código -->
  <script type="module" src="./bh-map-core.js"></script>
</body>
</html>
