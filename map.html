<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Buscar Hogar – Mapa</title>

    <link rel="stylesheet" href="./bh-shared.css?v=20260504" />
    <link rel="stylesheet" href="./bh-header-overrides.css?v=20260504" />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <link rel="stylesheet" href="./bh-map.css?v=20260510_filters_tight3" />

    <style>
      @media (max-width: 720px){
        #bhHeader{
          display:block !important;
          position:relative !important;
          z-index:10020 !important;
        }

        #bhHeader .topbar{
          display:flex !important;
          visibility:visible !important;
          opacity:1 !important;
          position:relative !important;
          z-index:10021 !important;
        }

        .mobileBottomNav{
          display:none !important;
        }
      }

      /* Oculta la barra de búsqueda móvil antigua: la sustituye .mobileSearchHeader */
      .mobileTopRow{ display:none !important; }
      .mobileSearchHeader{ display:none; }

      @media (max-width: 768px){
        .mobileSearchHeader{
          display: flex;
          align-items: center;
          gap: 12px;
          padding: 10px 12px 10px;
          background: var(--bg, #FFFDFA);
          border-bottom: 1px solid rgba(140,31,45,0.10);
          box-sizing: border-box;
          min-height: 64px;
        }

        .mobileBackBtn{
          flex: 0 0 auto;
          width: 40px;
          height: 40px;
          display: grid;
          place-items: center;
          border-radius: 999px;
          border: 1px solid rgba(140,31,45,0.22);
          background: #fff;
          color: #8C1F2D;
          cursor: pointer;
          padding: 0;
          transition: background 0.13s, border-color 0.13s, box-shadow 0.13s;
        }
        .mobileBackBtn svg{
          width: 20px;
          height: 20px;
          display: block;
        }
        .mobileBackBtn:active,
        .mobileBackBtn:hover{
          background: rgba(140,31,45,0.06);
          border-color: rgba(140,31,45,0.40);
        }

        .mobileSearchHeaderInfo{
          flex: 1 1 auto;
          min-width: 0;
          display: flex;
          flex-direction: column;
          justify-content: center;
          gap: 2px;
        }

        .mobileSearchHeaderPlace{
          font-family: inherit;
          font-size: 16px;
          font-weight: 700;
          color: #111;
          letter-spacing: 0.005em;
          line-height: 1.2;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
          min-width: 0;
        }

        .mobileSearchHeaderEdit{
          align-self: flex-start;
          background: transparent;
          border: 0;
          padding: 2px 0 0;
          margin: 0;
          font-family: inherit;
          font-size: 13px;
          font-weight: 600;
          color: #C4962A;
          cursor: pointer;
          line-height: 1.2;
          letter-spacing: 0.01em;
          text-decoration: none;
          border-bottom: 1px solid transparent;
          transition: color 0.13s, border-color 0.13s;
        }
        .mobileSearchHeaderEdit:hover,
        .mobileSearchHeaderEdit:active{
          color: #8C1F2D;
          border-bottom-color: rgba(140,31,45,0.45);
        }

        .mobileSaveSearchBtn{
          flex: 0 0 auto;
          height: 40px;
          padding: 0 14px;
          display: inline-flex;
          align-items: center;
          gap: 7px;
          border-radius: 999px;
          border: 1px solid #8C1F2D;
          background: #8C1F2D;
          color: #FFFDFA;
          font-family: inherit;
          font-size: 13.5px;
          font-weight: 600;
          letter-spacing: 0.015em;
          cursor: pointer;
          box-shadow: 0 2px 8px rgba(140,31,45,0.18);
          transition: background 0.13s, border-color 0.13s, box-shadow 0.13s, transform 0.06s;
        }
        .mobileSaveSearchBtn:hover{
          background: #761724;
          border-color: #761724;
          box-shadow: 0 3px 12px rgba(140,31,45,0.28);
        }
        .mobileSaveSearchBtn:active{
          transform: translateY(1px);
        }
        .mobileSaveSearchIcon{
          width: 16px;
          height: 16px;
          display: block;
          flex: 0 0 auto;
        }
        .mobileSaveSearchLabel{
          line-height: 1;
        }

        /* Estado "guardada": invierte la jerarquía cromática */
        .mobileSaveSearchBtn.is-saved{
          background: #fff;
          color: #8C1F2D;
          border-color: rgba(140,31,45,0.35);
          box-shadow: 0 1px 4px rgba(140,31,45,0.10);
        }
        .mobileSaveSearchBtn.is-saved .mobileSaveSearchIcon{
          fill: #C4962A;
          stroke: #8C1F2D;
        }
      }
    </style>
  </head>

  <body>
    <div id="bhHeader"></div>

    <!-- Contenedor general de la página del mapa -->

    <div class="mobileSearchHeader" aria-hidden="true">
      <button id="mobileBackBtn" class="mobileBackBtn" type="button" aria-label="Volver">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>

      <div class="mobileSearchHeaderInfo">
        <div id="mobilePlaceLabel" class="mobileSearchHeaderPlace">—</div>
        <button id="mobileNewSearchBtn" class="mobileSearchHeaderEdit" type="button">Nueva búsqueda</button>
      </div>

      <button id="mobileSaveSearchBtn" class="mobileSaveSearchBtn" type="button" aria-label="Guardar búsqueda">
        <svg class="mobileSaveSearchIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M18 16v-5a6 6 0 1 0-12 0v5l-1.6 2.2A.6.6 0 0 0 4.9 19h14.2a.6.6 0 0 0 .5-.8z"/>
          <path d="M10 21a2 2 0 0 0 4 0"/>
        </svg>
        <span class="mobileSaveSearchLabel">Guardar</span>
      </button>
    </div>

    <div class="mobileActionsRow" aria-hidden="true">
      <button id="mobileFiltersBtn" class="mobileActionBtn" type="button">Filtros</button>
      <button id="mobileListBtn" class="mobileActionBtn" type="button">Listado</button>
    </div>

    <div class="page">
      <div class="mapShell">

        <!-- Fila superior independiente (NO dentro de columnas) -->
        <div class="topRow">
          <div class="topCell topCellLeft">
            <button id="toggleFiltersBtn" class="topToggleBtn" type="button">Ocultar filtros</button>
            <button id="clearFiltersBtn" class="topToggleBtn clearFiltersBtn" type="button">Eliminar filtros</button>
          </div>

          <div class="topCell topCellCenter">
            <!-- Etiqueta dinámica “Comunidad / Ciudad / Zona” -->
            <div id="placeLabel" class="placeLabel">—</div>
          </div>

          <div class="topCell topCellRight">
            <div class="topRightTools">
              <button id="orderBtn" class="topToggleBtn" type="button">Ordenar por</button>
              <button id="saveSearchDesktopBtn" class="topToggleBtn saveSearchDesktopBtn" type="button">Guardar búsqueda</button>
              <button id="toggleListBtn" class="topToggleBtn" type="button">Ocultar listado</button>

              <!-- Menú desplegable de orden -->
              <div id="orderMenu" class="orderMenu" aria-hidden="true">
                <button class="orderItem" type="button" data-order="date_desc">Fecha de publicación: más recientes</button>
                <button class="orderItem" type="button" data-order="date_asc">Fecha de publicación: más antiguos</button>
                <button class="orderItem" type="button" data-order="price_asc">Precio: menor a mayor</button>
                <button class="orderItem" type="button" data-order="price_desc">Precio: mayor a menor</button>
                <button class="orderItem" type="button" data-order="size_asc">Tamaño: menor a mayor</button>
                <button class="orderItem" type="button" data-order="size_desc">Tamaño: mayor a menor</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Layout 3 columnas: filtros | mapa | listado -->
        <div class="grid3" id="grid3">
          <!-- Columna filtros (scroll interno) -->
          <aside class="col colFilters" id="filtersCol">
            <div class="mobilePanelHead">
              <div class="mobilePanelTitle">Filtros</div>
              <button id="mobileFiltersCloseBtn" class="mobilePanelClose" type="button" aria-label="Cerrar filtros">×</button>
            </div>
            <div id="filtersBarMount"></div>
          </aside>

          <!-- Columna mapa -->
          <main class="col colMap" id="mapCol">
            <div id="mapWrap" class="mapWrap">
              <div id="map"></div>

              <!-- Overlay / UI existente -->
              <div id="sunOverlay" class="sunOverlay" aria-hidden="true">
                <div id="sunOverlayLabel" class="sunOverlayLabel">—</div>
                <svg id="sunPolarOverlay" aria-label="Diagrama solar"></svg>
              </div>

              <div id="sunDateDock" class="sunDateDock" aria-hidden="true">
                <div class="sunDateDockInner">
                  <input type="date" id="sunDate" />
                  <button type="button" id="sunNowBtn">Ahora</button>
                </div>
              </div>

              <div id="sunTimebar" class="sunTimebar" aria-hidden="true">
                <div class="sunTimebarInner">
                  <div class="sunHoursRow" id="sunHoursRow"></div>
                  <div class="sunTrack" id="sunTrack">
                    <input id="sunRange" class="sunRange" type="range" min="0" max="1439" step="10" />
                  </div>
                </div>
              </div>

              <div id="areaHint" class="areaHint" aria-hidden="true">
                <div class="areaHintInner">
                  <div class="areaHintDot" aria-hidden="true"></div>
                  <div id="areaHintText" class="areaHintText">—</div>
                </div>
              </div>

              <!-- Tarjeta “flotante” de selección (ahora se posiciona respecto al mapa, no al viewport) -->
              <div id="card" class="card">
                <div class="cardGrid">
                  <div class="mediaSide">
                    <span id="badgeNew" class="badgeNew">Nuevo</span>
                    <img id="mediaImg" class="mediaImg" alt="" style="display:none;" />
                    <div id="mediaPlaceholder" class="mediaPlaceholder">Foto</div>

                    <div class="mediaMiniIcon" title="Fotos">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h3l2-2h4l2 2h3a2 2 0 0 1 2 2z"/>
                        <path d="M12 17a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/>
                      </svg>
                    </div>
                  </div>

                  <div class="textSide">
                    <div class="topActions">
                      <button class="closeBtn" id="cardClose" type="button" aria-label="Cerrar">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                          <path d="M18 6L6 18"/><path d="M6 6l12 12"/>
                        </svg>
                      </button>
                    </div>

                    <a id="cardAddrTop" class="addrTop" href="#">Dirección</a>
                    <div id="cardAddrBottom" class="addrBottom">—</div>

                    <div id="cardPrice" class="price">—</div>
                    <div id="cardFacts" class="facts"></div>

                    <div id="cardAgency" class="agency">—</div>
                  </div>
                </div>
              </div>

              <!-- Status “pill” dentro del mapa (referencia visual) -->
              <div id="status"></div>
            </div>
          </main>

          <!-- Columna listado (scroll interno) -->
          <aside class="col colList" id="listCol">
            <div class="mobilePanelHead">
              <div class="mobilePanelTitle">Listado</div>
              <div class="mobilePanelHeadActions">
                <button id="mobileOrderBtn" class="mobilePanelActionBtn" type="button" aria-label="Ordenar listado">Ordenar por</button>
                <button id="mobileListCloseBtn" class="mobilePanelClose" type="button" aria-label="Cerrar listado">×</button>
              </div>
              <div id="mobileOrderMenu" class="mobileOrderMenu" aria-hidden="true">
                <button class="orderItem" type="button" data-order="date_desc">Fecha de publicación: más recientes</button>
                <button class="orderItem" type="button" data-order="date_asc">Fecha de publicación: más antiguos</button>
                <button class="orderItem" type="button" data-order="price_asc">Precio: menor a mayor</button>
                <button class="orderItem" type="button" data-order="price_desc">Precio: mayor a menor</button>
                <button class="orderItem" type="button" data-order="size_asc">Tamaño: menor a mayor</button>
                <button class="orderItem" type="button" data-order="size_desc">Tamaño: mayor a menor</button>
              </div>
            </div>
            <div id="listMount" class="listMount">
              <div id="listItems" class="listItems"></div>
            </div>
          </aside>
        </div>
      </div>
    </div>
    <div id="bhFooter" hidden style="display:none !important;"></div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>

    <script type="module">
      import { initLayout } from "./bh-layout.js?v=20260507_fix_layout_export";
      import { initAuth } from "./bh-auth.js?v=20260504";
      import { initFiltersBar } from "./bh-map-filters.js";
      import { initMap } from "./bh-map-core.js";

      // Header / auth
      initLayout({ showMiniSearch: true });
      initAuth();

      // Inicializamos filtros dentro de su columna
      initFiltersBar({ mountId: "filtersBarMount" });

      // Toggle columnas (arreglo del bug: el de filtros ahora alterna bien siempre)
      const grid = document.getElementById("grid3");
      const btnFilters = document.getElementById("toggleFiltersBtn");
      const btnList = document.getElementById("toggleListBtn");
      const btnClearFilters = document.getElementById("clearFiltersBtn");
      const saveSearchDesktopBtn = document.getElementById("saveSearchDesktopBtn");
      const mobileFiltersBtn = document.getElementById("mobileFiltersBtn");
      const mobileListBtn = document.getElementById("mobileListBtn");
      const mobileFiltersCloseBtn = document.getElementById("mobileFiltersCloseBtn");
      const mobileListCloseBtn = document.getElementById("mobileListCloseBtn");
      const mobileOrderBtn = document.getElementById("mobileOrderBtn");
      const mobileOrderMenu = document.getElementById("mobileOrderMenu");

      function closeMobilePanels() {
        document.body.classList.remove("mobileFiltersOpen");
        document.body.classList.remove("mobileListOpen");
        notifyLayoutResize();
      }

      function openMobileFilters() {
        document.body.classList.remove("mobileListOpen");
        document.body.classList.add("mobileFiltersOpen");
      }

      function openMobileList() {
        document.body.classList.remove("mobileFiltersOpen");
        document.body.classList.add("mobileListOpen");
      }

      function applyToggleTexts() {
        const filtersHidden = grid.classList.contains("hideFilters");
        const listHidden = grid.classList.contains("hideList");
        btnFilters.textContent = filtersHidden ? "Mostrar filtros" : "Ocultar filtros";
        btnList.textContent = listHidden ? "Mostrar listado" : "Ocultar listado";
        if (btnClearFilters) btnClearFilters.hidden = filtersHidden;
      }

      function clearMapFilters() {
        const paramsToRemove = [
          "price_min", "price_max",
          "since_days", "availability",
          "useful_min", "useful_max",
          "built_min", "built_max",
          "bedrooms_min", "bathrooms_min",
          "outdoor_type", "orientations", "energy",
          "build_periods", "parking", "storage", "accessibility",
          "quick"
        ];
        const url = new URL(window.location.href);
        paramsToRemove.forEach((key) => url.searchParams.delete(key));
        window.location.href = url.toString();
      }

      function toggleDesktopSavedSearch() {
        if (!saveSearchDesktopBtn) return;
        const saved = saveSearchDesktopBtn.classList.toggle("is-saved");
        saveSearchDesktopBtn.textContent = saved ? "Búsqueda guardada" : "Guardar búsqueda";
        saveSearchDesktopBtn.setAttribute("aria-pressed", saved ? "true" : "false");
      }

      function notifyLayoutResize() {
        // Leaflet necesita invalidateSize; bh-map-core.js escucha este evento
        window.dispatchEvent(new CustomEvent("bh:layout-resize"));
      }

      btnFilters.addEventListener("click", () => {
        grid.classList.toggle("hideFilters");
        applyToggleTexts();
        notifyLayoutResize();
      });

      btnClearFilters?.addEventListener("click", clearMapFilters);
      saveSearchDesktopBtn?.addEventListener("click", toggleDesktopSavedSearch);

      btnList.addEventListener("click", () => {
        grid.classList.toggle("hideList");
          notifyLayoutResize();
      });


      mobileFiltersBtn?.addEventListener("click", () => {
        openMobileFilters();
      });

      mobileListBtn?.addEventListener("click", () => {
        openMobileList();
      });

      mobileFiltersCloseBtn?.addEventListener("click", () => {
        closeMobilePanels();
      });

      mobileListCloseBtn?.addEventListener("click", () => {
        closeMobilePanels();
      });

      applyToggleTexts();

      // Orden: escritorio + móvil
      const orderBtn = document.getElementById("orderBtn");
      const orderMenu = document.getElementById("orderMenu");

      function closeOrderMenu() {
        orderMenu.style.display = "none";
        orderMenu.setAttribute("aria-hidden", "true");
      }
      function openOrderMenu() {
        orderMenu.style.display = "block";
        orderMenu.setAttribute("aria-hidden", "false");
      }

      function closeMobileOrderMenu() {
        if (!mobileOrderMenu) return;
        mobileOrderMenu.style.display = "none";
        mobileOrderMenu.setAttribute("aria-hidden", "true");
      }
      function openMobileOrderMenu() {
        if (!mobileOrderMenu) return;
        mobileOrderMenu.style.display = "block";
        mobileOrderMenu.setAttribute("aria-hidden", "false");
      }

      closeOrderMenu();
      closeMobileOrderMenu();

      orderBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        const open = orderMenu.getAttribute("aria-hidden") === "false";
        if (open) closeOrderMenu();
        else openOrderMenu();
      });

      mobileOrderBtn?.addEventListener("click", (e) => {
        e.stopPropagation();
        const open = mobileOrderMenu?.getAttribute("aria-hidden") === "false";
        if (open) closeMobileOrderMenu();
        else openMobileOrderMenu();
      });

      document.addEventListener("click", () => {
        closeOrderMenu();
        closeMobileOrderMenu();
      });

      orderMenu.querySelectorAll(".orderItem").forEach((b) => {
        b.addEventListener("click", () => {
          const v = b.getAttribute("data-order");
          window.__bhListOrder = v || "date_desc";
          closeOrderMenu();
          window.dispatchEvent(new CustomEvent("bh:list-order-changed"));
        });
      });

      mobileOrderMenu?.querySelectorAll(".orderItem").forEach((b) => {
        b.addEventListener("click", () => {
          const v = b.getAttribute("data-order");
          window.__bhListOrder = v || "date_desc";
          closeMobileOrderMenu();
          window.dispatchEvent(new CustomEvent("bh:list-order-changed"));
        });
      });

      // Inicializar mapa
      initMap();

      // ====== Mobile search header: sync place label + actions ======
      const mobilePlaceLabel = document.getElementById("mobilePlaceLabel");
      const desktopPlaceLabel = document.getElementById("placeLabel");
      const mobileBackBtn = document.getElementById("mobileBackBtn");
      const mobileNewSearchBtn = document.getElementById("mobileNewSearchBtn");
      const mobileSaveSearchBtn = document.getElementById("mobileSaveSearchBtn");

      // Refleja el texto dinámico (reverse-geocode) del placeLabel de escritorio
      if (desktopPlaceLabel && mobilePlaceLabel){
        const syncPlace = () => {
          const t = (desktopPlaceLabel.textContent || "").trim();
          if (t) mobilePlaceLabel.textContent = t;
        };
        syncPlace();
        new MutationObserver(syncPlace).observe(desktopPlaceLabel, {
          childList: true, characterData: true, subtree: true,
        });
      }

      mobileBackBtn?.addEventListener("click", () => {
        if (history.length > 1) history.back();
        else location.href = "./index.html";
      });

      mobileNewSearchBtn?.addEventListener("click", () => {
        // Reutiliza el panel de filtros como "nueva búsqueda" en móvil
        openMobileFilters();
      });

      mobileSaveSearchBtn?.addEventListener("click", () => {
        const saved = mobileSaveSearchBtn.classList.toggle("is-saved");
        mobileSaveSearchBtn.setAttribute(
          "aria-label",
          saved ? "Búsqueda guardada" : "Guardar búsqueda"
        );
        const lbl = mobileSaveSearchBtn.querySelector(".mobileSaveSearchLabel");
        if (lbl) lbl.textContent = saved ? "Guardada" : "Guardar";
      });
    </script>
</body>
</html>
