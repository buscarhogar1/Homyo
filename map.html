<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Buscar Hogar – Mapa</title>

    <link rel="stylesheet" href="/buscarhogardemo/bh-shared.css" />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <link rel="stylesheet" href="/buscarhogardemo/bh-map.css" />
  </head>

  <body>
    <!-- Header común -->
    <div id="bhHeader"></div>

    <!-- Página MAP: 3 columnas (filtros | mapa | listado) + fila superior de controles -->
    <div class="page">
      <div class="mapShell">
        <!-- Fila superior fija dentro del layout del mapa:
             - Izq: botones filtros
             - Centro: texto región/ciudad/zona (auto según viewport del mapa)
             - Dcha: ordenar + botones listado -->
        <div class="topRow" id="topRow">
          <div class="topLeft">
            <button type="button" class="topBtn" id="toggleFiltersBtn">Ocultar filtros</button>
            <button type="button" class="topBtn" id="clearFiltersBtn">Limpiar filtros</button>
          </div>

          <div class="topCenter">
            <div class="areaCrumb" id="areaCrumb">—</div>
          </div>

          <div class="topRight">
            <!-- “Ordenar por” debe ocultarse cuando el listado está oculto -->
            <div class="sortWrap" id="sortWrap">
              <button type="button" class="topBtn" id="sortBtn">Ordenar por</button>
              <div class="sortMenu" id="sortMenu" aria-hidden="true"></div>
            </div>

            <button type="button" class="topBtn" id="toggleListBtn">Ocultar listado</button>
          </div>
        </div>

        <!-- Grid principal -->
        <div class="mainGrid" id="mainGrid">
          <!-- Columna filtros -->
          <aside class="filtersCol" id="filtersCol">
            <div class="filtersScroll" id="filtersBarMount"></div>
          </aside>

          <!-- Mapa -->
          <section class="mapCol" id="mapCol">
            <div id="map"></div>

            <!-- Overlays del sol -->
            <div id="sunOverlay" class="sunOverlay" aria-hidden="true">
              <div id="sunOverlayLabel" class="sunOverlayLabel">—</div>
              <svg id="sunPolarOverlay" aria-label="Diagrama solar"></svg>
            </div>

            <div
