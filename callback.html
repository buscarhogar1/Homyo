<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Buscar Hogar – Verificación</title>
    <style>
      :root{
        --bg:#ffffff;
        --text:#111111;
        --muted:#5f6368;
        --border:#e6e7eb;
        --accent:#7a2f1b;
        --accentHover:#622614;
      }

      *{ box-sizing:border-box; }

      html,body{
        height:100%;
        margin:0;
        font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
        background:var(--bg);
        color:var(--text);
      }

      body{
        min-height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        padding:24px;
      }

      .card{
        width:min(560px,100%);
        border:1px solid var(--border);
        border-radius:24px;
        padding:40px 32px;
        text-align:center;
        background:#fff;
        box-shadow:0 18px 50px rgba(0,0,0,0.06);
      }

      .eyebrow{
        font-size:15px;
        color:var(--muted);
        margin:0 0 12px;
      }

      h1{
        margin:0 0 14px;
        font-size:42px;
        line-height:1.06;
        letter-spacing:-0.02em;
      }

      .msg{
        margin:0 auto;
        max-width:420px;
        font-size:20px;
        line-height:1.45;
        color:#232323;
      }

      .sub{
        margin:16px auto 0;
        max-width:420px;
        font-size:15px;
        line-height:1.5;
        color:var(--muted);
      }

      .actions{
        margin-top:28px;
        display:flex;
        justify-content:center;
      }

      .btn{
        appearance:none;
        border:0;
        border-radius:14px;
        padding:14px 22px;
        min-width:200px;
        font-size:16px;
        font-weight:600;
        cursor:pointer;
        color:#fff;
        background:var(--accent);
      }

      .btn:hover{ background:var(--accentHover); }

      .status-ok{
        display:inline-flex;
        align-items:center;
        justify-content:center;
        width:62px;
        height:62px;
        border-radius:999px;
        margin:0 auto 18px;
        background:#f5f8f5;
        border:1px solid #d9e8d9;
      }

      .status-ok svg{
        width:28px;
        height:28px;
        stroke:#2f7d32;
      }

      .hidden{ display:none; }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="status-ok" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 6L9 17l-5-5"></path>
        </svg>
      </div>

      <p class="eyebrow">Buscar Hogar</p>
      <h1 id="title">Email verificado</h1>
      <p class="msg" id="msg">Tu cuenta ya está verificada. Ya puedes iniciar sesión.</p>
      <p class="sub" id="sub">Pulsa el botón para volver a la página principal.</p>

      <div class="actions">
        <button class="btn" id="goBtn" type="button">Ir a inicio</button>
      </div>
    </main>

    <script type="module">
      import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

      const SUPABASE_URL = "https://dpusnylssfjnksbieimj.supabase.co";
      const SUPABASE_ANON_KEY = "sb_publishable_tSSgJcWWRfEe2uob7SFYgw_AqcBL7KK";
      const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const titleEl = document.getElementById("title");
      const msgEl = document.getElementById("msg");
      const subEl = document.getElementById("sub");
      const goBtn = document.getElementById("goBtn");

      const HOME_URL = "../index.html";

      function goHome(){
        window.location.href = HOME_URL;
      }

      goBtn.addEventListener("click", goHome);

      const currentUrl = new URL(window.location.href);
      const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ""));
      const hasCode = currentUrl.searchParams.has("code");
      const hasHashSession = hashParams.has("access_token");
      const hasError = currentUrl.searchParams.has("error") || currentUrl.searchParams.has("error_description") || hashParams.has("error") || hashParams.has("error_description");
      const authType = currentUrl.searchParams.get("type") || hashParams.get("type") || "";

      try {
        if (hasCode) {
          const { error } = await supabase.auth.exchangeCodeForSession(window.location.href);
          if (error) throw error;
        } else if (hasHashSession) {
          const access_token = hashParams.get("access_token");
          const refresh_token = hashParams.get("refresh_token");

          const { error } = await supabase.auth.setSession({ access_token, refresh_token });
          if (error) throw error;
        } else if (hasError) {
          throw new Error(hashParams.get("error_description") || currentUrl.searchParams.get("error_description") || "No se pudo completar la verificación.");
        }

        window.history.replaceState({}, document.title, window.location.pathname);

        if (authType === "signup") {
          titleEl.textContent = "Email verificado";
          msgEl.textContent = "Tu cuenta ya está verificada. Ya puedes iniciar sesión.";
          subEl.textContent = "Pulsa el botón para volver a la página principal.";
        } else {
          titleEl.textContent = "Acceso completado";
          msgEl.textContent = "Ya puedes continuar en Buscar Hogar.";
          subEl.textContent = "Pulsa el botón para volver a la página principal.";
        }
      } catch (e) {
        console.error(e);
        titleEl.textContent = "No se pudo completar la verificación";
        msgEl.textContent = "El enlace no es válido o ha caducado. Vuelve a solicitarlo e inténtalo de nuevo.";
        subEl.textContent = "Puedes volver al inicio y repetir el acceso.";
      }
    </script>
  </body>
</html>
