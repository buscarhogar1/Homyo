<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Buscar Hogar</title>

    <link rel="stylesheet" href="./bh-shared.css?v=3" />
    <style>
      .topbar { border: none !important; box-shadow: none !important; }
    </style>

    
    <style>
      body{
        background:#FFFDFA;
      }

      .wrap{
        min-height: calc(100% - 54px);
        display:grid;
        grid-template-rows: 1fr auto;
      }

      /* ---- Hero full-bleed ---- */
      .heroWrap{
        position:relative;
        width:100%;
        margin:0;
        overflow:hidden;
        line-height:0;
      }

      .heroImage{
        width:100%;
        height:auto;
        display:block;
        margin-top:-8%;
      }

      /* Gradiente superior: funde el header con la imagen */
      .heroWrap::before{
        content:'';
        position:absolute;
        top:0; left:0; right:0;
        height:38%;
        background:linear-gradient(to bottom, #FFFDFA 0%, rgba(255,253,250,0) 100%);
        pointer-events:none;
        z-index:1;
      }

      /* ---- Layout principal ---- */
      .main{
        display:flex;
        flex-direction:column;
        align-items:center;
        padding:0 16px 24px;
        box-sizing:border-box;
      }

      .center{
        width:min(1180px, 100%);
        display:grid;
        justify-items:center;
        text-align:center;
        padding-top:28px;
      }

      /* ---- Headline ---- */
      .headline{
        font-family: Georgia, "Times New Roman", serif;
        font-weight:700;
        letter-spacing:-0.3px;
        font-size:34px;
        line-height:1.15;
        color:#8C1F2D;
        margin:0 0 20px;
        text-wrap:balance;
      }

      /* ---- Tagline ---- */
      .tagline{
        display:flex;
        align-items:center;
        gap:14px;
        margin:0 0 28px;
        color:#8C1F2D;
        font-size:12px;
        font-weight:600;
        letter-spacing:1.2px;
        text-transform:uppercase;
      }

      .tagline::before,
      .tagline::after{
        content:'';
        height:1px;
        width:36px;
        background:#C4962A;
        flex-shrink:0;
      }

      /* ---- Controls ---- */
      .controlsWrap{
        width:min(760px,100%);
        display:grid;
        gap:16px;
      }

      /* ---- Pills: estilo línea/pestaña ---- */
      .modeRow{
        width:100%;
        display:grid;
        grid-template-columns:repeat(4, minmax(0, 1fr));
        gap:0;
        align-items:stretch;
        border-bottom:2px solid #e8e0d5;
      }

      .pill{
        position:relative;
        display:flex;
        align-items:center;
        justify-content:center;
        min-height:44px;
        padding:0 8px;
        border-radius:0;
        background:transparent;
        color:#888;
        font-size:12px;
        font-weight:500;
        line-height:1;
        text-transform:uppercase;
        letter-spacing:0.6px;
        cursor:pointer;
        user-select:none;
        box-sizing:border-box;
        transition:color .15s ease;
        white-space:nowrap;
        border-bottom:2px solid transparent;
        margin-bottom:-2px;
      }

      .pill input{
        position:absolute;
        inset:0;
        opacity:0;
        pointer-events:none;
      }

      .pill span{ color:inherit; }

      .pill:hover{
        color:#8C1F2D;
      }

      .pill:has(input:checked){
        color:#8C1F2D;
        font-weight:700;
        border-bottom:2px solid #8C1F2D;
      }

      /* ---- Search ---- */
      .searchShell{
        width:100%;
        background:transparent;
        padding:0;
        box-sizing:border-box;
      }

      .searchIcon{
        color:#aaa;
        width:18px;
        min-width:18px;
        height:18px;
        margin-right:10px;
        display:flex;
        align-items:center;
        justify-content:center;
      }

      .searchIcon svg{ width:18px; height:18px; display:block; }

      .searchBox{
        width:100%;
        display:flex;
        align-items:center;
        background:#fff;
        border-radius:999px;
        padding:0 20px;
        box-sizing:border-box;
        min-height:56px;
        box-shadow:0 2px 12px rgba(0,0,0,.10);
        transition:box-shadow .18s ease;
        border:1px solid rgba(140,31,45,0.12);
      }

      .searchBox:hover,
      .searchBox:focus-within{
        box-shadow:0 4px 18px rgba(140,31,45,.14);
        border-color:rgba(140,31,45,0.25);
      }

      .input{
        width:100%;
        border:0;
        outline:0;
        background:transparent;
        padding:0;
        font-size:15px;
        line-height:1.2;
        color:#222;
      }

      .input::placeholder{ color:#aaa; }

      /* ---- Subetiqueta ---- */
      .subTag{
        width:min(760px,100%);
        font-size:11.5px;
        color:#aaa;
        letter-spacing:0.4px;
        text-align:center;
        margin-top:12px;
      }

      /* ---- Desktop ---- */
      @media (min-width: 721px){
        .center{ padding-top:32px; }

        .headline{ font-size:42px; margin-bottom:20px; }

        .tagline{ font-size:12px; margin-bottom:32px; }

        .controlsWrap{ width:min(820px,100%); gap:0; }

        .modeRow{ margin-bottom:20px; }

        .pill{ min-height:46px; font-size:12px; padding:0 12px; }

        .searchBox{ min-height:60px; padding:0 22px; }

        .input{ font-size:17px; }

        .subTag{ width:min(820px,100%); font-size:12px; margin-top:14px; }
      }

      /* ---- Mobile ---- */
      @media (max-width: 720px){
        .main{ padding:0 14px 20px; }

        .center{ width:100%; padding-top:20px; }

        .headline{ font-size:22px; margin-bottom:8px; }

        .tagline{ font-size:10px; letter-spacing:0.8px; margin-bottom:22px; }
        .tagline::before, .tagline::after{ width:24px; }

        .controlsWrap{ width:100%; gap:0; }

        .modeRow{ margin-bottom:16px; }

        .pill{ min-height:40px; font-size:10px; padding:0 4px; }

        .searchBox{ min-height:50px; padding:0 16px; }

        .input{ font-size:14px; }

        .subTag{ width:100%; font-size:11px; margin-top:10px; }
      }
    </style>

  </head>

  <body>
    <div id="bhHeader"></div>

    <div class="wrap">
      <main class="main">

        <!-- Hero full-bleed fuera del .center -->
        <div class="heroWrap">
          <img
            src="./index-hero.png"
            alt="Ilustración de varios tipos de viviendas"
            class="heroImage"
          />
        </div>

        <div class="center">
          <h1 class="headline">Solo anuncios de profesionales</h1>

          <div class="tagline">Encuentra tu hogar</div>

          <div class="controlsWrap">
            <div class="modeRow" aria-label="Tipo de búsqueda">
              <label class="pill">
                <input type="radio" name="mode" value="buy" checked />
                <span>Comprar</span>
              </label>
              <label class="pill">
                <input type="radio" name="mode" value="rent" />
                <span>Alquilar</span>
              </label>
              <label class="pill">
                <input type="radio" name="mode" value="room" />
                <span>Habitación</span>
              </label>
              <label class="pill">
                <input type="radio" name="mode" value="new_build" />
                <span>Obra nueva</span>
              </label>
            </div>

            <div class="searchShell">
              <form id="form" class="searchBox" autocomplete="off">
                <span class="searchIcon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="7"></circle>
                    <path d="M21 21l-4.3-4.3"></path>
                  </svg>
                </span>
                <input
                  id="q"
                  class="input"
                  placeholder="Escribe una ciudad, zona o código postal..."
                  aria-label="Buscar ciudad o zona"
                  enterkeyhint="search"
                />
              </form>
            </div>
          </div>

          <div class="subTag">Una vivienda · Un anuncio</div>
        </div>
      </main>

      <div id="bhFooter"></div>
    </div>

    <script type="module">
      import { initLayout } from "./bh-layout.js?v=20260309b";
      import { initAuth } from "./bh-auth.js?v=20260309b";

      initLayout({ showMiniSearch: false });
      initAuth();

      function getSelectedMode(){
        const el = document.querySelector('input[name="mode"]:checked');
        return el ? el.value : "buy";
      }

      window.BH_goToMap = function(city){
        const params = new URLSearchParams();
        params.set("city", city);
        params.set("mode", getSelectedMode());
        window.location.href = "./map.html?" + params.toString();
      };

      const form = document.getElementById("form");
      const q = document.getElementById("q");

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const city = (q.value || "").trim();
        if(!city) return;
        window.BH_goToMap(city);
      });
    </script>
  </body>
</html>
