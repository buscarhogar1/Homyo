<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Homyo — Solo anuncios de profesionales</title>

    <link rel="stylesheet" href="./bh-shared.css?v=20260506_header" />
    <link rel="stylesheet" href="./bh-header-overrides.css?v=20260506_header" />

    <style>
      :root{
        --bg:#FFFDFA;
        --granate:#8C1F2D;
        --dorado:#C4962A;
        --muted:#6b7280;
        --terra:#FFFDFA;
      }

      *{ box-sizing:border-box; }

      html,body{
        width:100%;
        height:100%;
        min-height:100%;
        margin:0;
        background:var(--bg);
        color:#111;
        font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
        overflow:hidden;
      }

      body{
        min-height:100vh;
        min-height:100dvh;
      }

      #bhFooter{ display:none !important; }

      .wrap{
        height:calc(100vh - var(--headerH,82px));
        height:calc(100dvh - var(--headerH,82px));
        display:grid;
        grid-template-rows:minmax(0,1fr);
        overflow:hidden;
      }

      .main{
        position:relative;
        display:flex;
        flex-direction:column;
        align-items:stretch;
        min-height:0;
        padding-bottom:0;
        overflow:hidden;
      }

      .searchBlock{
        display:flex;
        flex-direction:column;
        align-items:center;
        width:100%;
        padding:clamp(14px,3vh,28px) 20px 0;
        margin-top:0;
        flex:0 0 auto;
      }

      .skylineWrap{
        width:min(1400px,96vw);
        display:flex;
        justify-content:center;
        align-items:center;
        margin-top:48px;
        margin-bottom:42px;
        transform:translateY(15px);
        pointer-events:none;
        user-select:none;
      }

      .skylineImg{
        width:100%;
        height:auto;
        display:block;
        object-fit:contain;
      }

      .searchInner{
        display:flex;
        flex-direction:column;
        align-items:center;
        width:100%;
        max-width:650px;
        margin:0 auto;
        padding:20px 20px 20px;
        border:none;
        border-radius:0;
      }

      .modeRow{
        display:grid;
        grid-template-columns:repeat(4,minmax(0,1fr));
        width:min(680px,100%);
        border-bottom:1.5px solid #e8e0d5;
        margin-top:10px;
        margin-bottom:37px;
      }

      .pill{
        position:relative;
        display:flex;
        align-items:center;
        justify-content:center;
        min-height:44px;
        padding:0 8px;
        background:transparent;
        color:#c0b8b0;
        font-size:17px;
        font-weight:500;
        letter-spacing:1px;
        text-transform:uppercase;
        cursor:pointer;
        border-bottom:2px solid transparent;
        margin-bottom:-1.5px;
        white-space:nowrap;
        transition:color .15s;
      }

      .pill input{ position:absolute; inset:0; opacity:0; pointer-events:none; }
      .pill:hover{ color:var(--granate); }
      .pill:has(input:checked){ color:var(--granate); font-weight:700; border-bottom-color:var(--granate); }
      .pill:has(input:checked) span{ color:var(--granate); }

      .searchWrap{ width:min(680px,100%); }

      .searchBox{
        width:calc(100% + 60px);
        margin-left:-30px;
        margin-right:-30px;
        display:flex;
        align-items:center;
        background:#fff;
        border-radius:999px;
        padding:0 12px 0 22px;
        min-height:58px;
        box-shadow:0 2px 20px rgba(196,150,42,.12);
        border:1px solid rgba(196,150,42,.18);
        gap:10px;
        transition:box-shadow .18s,border-color .18s;
      }

      .searchBox:focus-within{
        box-shadow:0 4px 28px rgba(196,150,42,.16);
        border-color:rgba(196,150,42,.28);
      }

      .searchIcon{
        color:#ddd;
        width:18px;
        min-width:18px;
        height:18px;
        margin-right:12px;
        display:flex;
        align-items:center;
        justify-content:center;
        transition:color .18s;
      }

      .searchBox:focus-within .searchIcon{ color:#555; }
      .searchIcon svg{ width:18px; height:18px; display:block; }

      .input{
        width:100%;
        min-width:0;
        border:0;
        outline:0;
        background:transparent;
        font-size:17px;
        color:#222;
        line-height:1.2;
      }

      .input::placeholder{ color:#ccc; }

      .searchBtn{
        background:var(--granate);
        color:#fff;
        border:none;
        border-radius:999px;
        padding:10px 18px;
        font-size:14px;
        font-weight:600;
        cursor:pointer;
        white-space:nowrap;
        transition:all .18s ease;
      }

      .searchBtn:hover{
        opacity:.9;
        transform:translateY(-1px);
      }

      .subTagline{
        margin-top:28px;
        display:flex;
        align-items:center;
        justify-content:center;
        gap:12px;
        font-family:Georgia,serif;
        font-size:15px;
        font-style:italic;
        color:var(--dorado);
        letter-spacing:1.2px;
        text-transform:uppercase;
        opacity:.85;
      }

      .midDot{
        display:inline-block;
        margin:0;
        font-size:16px;
        line-height:1;
      }

      .carouselCard{
        width:min(935px,calc(100% - 40px));
        margin:calc(clamp(18px,4vh,40px) + 6px) auto clamp(10px,2vh,20px);
        align-self:center;
        background:#faf7f2;
        border-radius:18px;
        box-shadow:0 2px 18px rgba(140,31,45,.06),0 1px 4px rgba(0,0,0,.04);
        border:1px solid rgba(196,150,42,.12);
        overflow:hidden;
        padding:33px 0;
      }

      .carouselTrack{
        display:flex;
        width:max-content;
        animation:carouselScroll 32s linear infinite;
        will-change:transform;
      }

      .carouselTrack:hover{ animation-play-state:paused; }

      .carouselItem{
        display:inline-flex;
        align-items:center;
        gap:18px;
        padding:0 36px;
        white-space:nowrap;
        font-family:Georgia,"Times New Roman",serif;
        font-size:16px;
        font-style:italic;
        color:#555;
        letter-spacing:.2px;
      }

      .carouselDot{
        width:5px;
        height:5px;
        border-radius:50%;
        background:var(--dorado);
        opacity:.55;
        flex-shrink:0;
      }

      @keyframes carouselScroll{
        0%{ transform:translateX(0); }
        100%{ transform:translateX(-50%); }
      }

      #navFavoritos{ display:none !important; }

      @media (max-width:720px){
        .wrap{
          height:calc(100vh - var(--headerH,56px));
          height:calc(100dvh - var(--headerH,56px));
          grid-template-rows:minmax(0,1fr);
        }

        .main{ padding-bottom:0; }
        .searchBlock{ padding:clamp(10px,2.2vh,22px) 18px 0; }

        .skylineWrap{
          width:96vw;
          margin-top:28px;
          margin-bottom:30px;
          transform:translateY(10px);
        }

        .modeRow{
          grid-template-columns:repeat(2,minmax(0,1fr));
          width:100%;
          max-width:299px;
          column-gap:15px;
          row-gap:20px;
          border-bottom:0;
          margin-top:15px;
          margin-bottom:31px;
        }

        .pill{
          min-width:0;
          min-height:42px;
          padding:0 4px;
          background:#fff;
          color:#6b6b6b;
          font-size:12.5px;
          font-weight:500;
          letter-spacing:.17em;
          font-family:Raleway,Montserrat,system-ui,sans-serif;
          text-transform:uppercase;
          border:1px solid #e7dfd2;
          border-radius:10px;
          margin-bottom:0;
          overflow:hidden;
          text-overflow:ellipsis;
          box-shadow:0 1px 6px rgba(0,0,0,.04);
          transition:all .18s ease;
        }

        .pill:hover{
          color:var(--granate);
          border-color:rgba(140,31,45,.35);
          box-shadow:0 2px 10px rgba(140,31,45,.08);
        }

        .pill:has(input:checked){
          background:var(--granate);
          color:#fff;
          font-weight:600;
          border-color:var(--dorado);
          box-shadow:0 4px 14px rgba(140,31,45,.18);
        }

        .pill:has(input:checked) span{ color:#fff; }

        .searchWrap{
          width:100%;
          max-width:420px;
        }

        .searchBox{
          width:calc(100% + 40px);
          margin-left:-20px;
          margin-right:-20px;
          min-height:54px;
          padding:0 10px 0 14px;
        }

        .searchBtn{
          padding:8px 14px;
          font-size:13px;
        }

        .input{
          font-size:15px;
          min-width:0;
        }

        .subTagline{
          font-size:10px;
          margin-top:24px;
          text-align:center;
          white-space:nowrap;
        }

        .carouselCard{
          width:calc(100% - 36px);
          max-width:420px;
          margin:calc(clamp(18px,3vh,30px) + 11px) auto clamp(8px,1.5vh,20px);
          padding:clamp(18px,3vh,30px) 0;
        }

        .carouselItem{
          font-size:15px;
          padding:0 28px;
          gap:14px;
        }
      }

      @media (max-width:420px){
        .wrap{
          height:calc(100vh - var(--headerH,54px));
          height:calc(100dvh - var(--headerH,54px));
        }

        .pill{
          font-size:11.5px;
          letter-spacing:.17em;
        }
      }
    </style>
  </head>

          <div class="searchInner">
            <div class="modeRow" aria-label="Tipo de búsqueda">
              <label class="pill"><input type="radio" name="mode" value="buy" checked /><span>Comprar</span></label>
              <label class="pill"><input type="radio" name="mode" value="new_build" /><span>Obra nueva</span></label>
              <label class="pill"><input type="radio" name="mode" value="rent" /><span>Alquilar</span></label>
              <label class="pill"><input type="radio" name="mode" value="room" /><span>Habitación</span></label>
            </div>

            <div class="searchWrap">
              <form id="form" class="searchBox" autocomplete="off">
                <span class="searchIcon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="7"></circle>
                    <path d="M21 21l-4.3-4.3"></path>
                  </svg>
                </span>
                <input id="q" class="input" placeholder="Ciudad, zona, código postal..." aria-label="Buscar ciudad o zona" enterkeyhint="search" />
                <button class="searchBtn" type="submit">Buscar</button>
              </form>
            </div>

            <div class="subTagline"><span class="midDot">·</span><span>SOLO ANUNCIOS DE PROFESIONALES</span><span class="midDot">·</span></div>
          </div>

        <div class="carouselCard" aria-label="Valores de la plataforma">
          <div class="carouselTrack" id="carouselTrack"></div>
        </div>
      </main>

      <div id="bhFooter"></div>
    </div>

    <script type="module">
      import { initLayout } from "./bh-layout.js?v=20260506_header";
      import { initAuth } from "./bh-auth.js?v=20260506_header";

      initLayout({ showMiniSearch: false });
      initAuth();

      const phrases = [
        "Metros de vivienda útiles",
        "Precio por metro cuadrado útil",
        "Sin anuncios duplicados",
        "Sin anuncios de particulares",
        "Filtros por fecha de construcción",
        "Posición del sol durante el año",
        "Plano siempre disponible"
      ];

      const track = document.getElementById("carouselTrack");
      if (track) {
        const buildItems = () => phrases.map(text => `
          <span class="carouselItem">
            <span class="carouselDot" aria-hidden="true"></span>
            ${text}
          </span>
        `).join("");

        track.innerHTML = buildItems() + buildItems();

        requestAnimationFrame(() => {
          const halfW = track.scrollWidth / 2;
          const duration = Math.round(halfW / 38);
          track.style.animationDuration = duration + "s";
        });
      }

      function getSelectedMode() {
        const el = document.querySelector('input[name="mode"]:checked');
        return el ? el.value : "buy";
      }

      window.BH_goToMap = function(city) {
        const params = new URLSearchParams();
        params.set("city", city);
        params.set("mode", getSelectedMode());
        window.location.href = "./map.html?" + params.toString();
      };

      const form = document.getElementById("form");
      const q = document.getElementById("q");

      function updateSearchPlaceholder() {
        if (!q) return;
        q.placeholder = window.matchMedia("(max-width:720px)").matches
          ? "Ciudad, Barrio, CP..."
          : "Ciudad, zona, código postal...";
      }

      updateSearchPlaceholder();
      window.addEventListener("resize", updateSearchPlaceholder);

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const city = (q.value || "").trim();
        if (!city) return;
        window.BH_goToMap(city);
      });
    </script>
