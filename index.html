<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Buscar Hogar</title>

    <link rel="stylesheet" href="./bh-shared.css" />

    
    <style>
      body{
        background:#FFFFFF;
      }

      .wrap{
        min-height: calc(100% - 54px);
        display:grid;
        grid-template-rows: 1fr auto;
      }

      .main{
        display:flex;
        align-items:flex-start;
        justify-content:center;
        padding:0 16px 14px;
        box-sizing:border-box;
      }

      .center{
        width:min(1180px, 100%);
        display:grid;
        justify-items:center;
        text-align:center;
      }

      .heroWrap{
        width:100%;
        margin:7px 0 2px;
      }

      .heroImage{
        width:100%;
        height:auto;
        display:block;
      }

      .headline{
        margin:5px 0 18px;
        font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",system-ui,Segoe UI,Roboto,sans-serif;
        font-weight:700;
        letter-spacing:-0.4px;
        font-size:24px;
        line-height:1.08;
        color:#111;
        margin:0 0 14px;
        text-wrap:balance;
      }

      .controlsWrap{
        width:min(760px,100%);
        display:grid;
        gap:10px;
      }

      .modeRow{
        width:100%;
        display:grid;
        grid-template-columns:repeat(4, minmax(0, 1fr));
        gap:10px;
        align-items:stretch;
      }

      .pill{
        position:relative;
        display:flex;
        align-items:center;
        justify-content:center;
        min-height:48px;
        padding:0 10px;
        border-radius:8px;
        background:#fff;
        color:#111;
        font-size:13px;
        font-weight:600;
        line-height:1;
        text-transform:uppercase;
        letter-spacing:0.22px;
        cursor:pointer;
        user-select:none;
        box-sizing:border-box;
        transition:background .15s ease, color .15s ease, transform .15s ease;
        white-space:nowrap;
      }

      .pill input{
        position:absolute;
        inset:0;
        opacity:0;
        pointer-events:none;
      }

      .pill span{
        color:inherit;
      }

      .pill:has(input:checked){
        background:#9e2f0d;
        color:#fff;
      }

      .searchShell{
        width:100%;
        background:transparent;
        padding:0;
        margin-top:0px;
        box-sizing:border-box;
      }

      .searchBox{
        width:100%;
        display:flex;
        align-items:center;
        background:#fff;
        border-radius:999px;
        padding:0 18px;
        box-sizing:border-box;
        min-height:54px;
        box-shadow:0 1px 6px rgba(32,33,36,.28);
        transition:box-shadow .18s ease;
      }

      .searchBox:hover,
      .searchBox:focus-within{
        box-shadow:0 2px 10px rgba(32,33,36,.32);
      }

      .input{
        width:100%;
        border:0;
        outline:0;
        background:transparent;
        padding:0;
        font-size:15px;
        line-height:1.2;
        color:#222;
      }

      .input::placeholder{
        color:#7c7c7c;
      }

      .subTag{
        width:min(760px,100%);
        font-size:13px;
        color:#666;
        text-align:center;
        margin-top:10px;
      }

      @media (min-width: 721px){
        .heroWrap{
          max-width:896px; /* 20% smaller */
          margin:4px 0 2px; /* closer to header */
        }

        .headline{
        margin:5px 0 18px;
          font-size:30px;
          margin:2px 0 16px;
        }

        .controlsWrap{
          width:min(820px,100%);
        }

        .modeRow{
          gap:12px;
        }

        .pill{
          min-height:50px;
          font-size:14px;
        }

        .searchShell{
          padding:0;
        }

        .searchBox{
          min-height:58px;
          border-radius:999px;
          padding:0 20px;
        }

        .input{
          font-size:17px;
        }

        .subTag{
          width:min(820px,100%);
          font-size:14px;
          margin-top:12px;
        }
      }

      @media (max-width: 720px){
        .main{
          padding:0 16px 10px;
        }

        .center{
          width:min(100%, 560px);
        }

        .heroWrap{
          margin:7px 0 0px;
        }

        .headline{
          margin:0 0 18px;
          font-size:22px;
          line-height:1.1;
        }

        .controlsWrap{
          width:100%;
          gap:16px;
        }

        .modeRow{
          gap:8px;
        }

        .pill{
          min-height:44px;
          font-size:11px;
          padding:0 6px;
          border-radius:7px;
        }

        .searchShell{
          padding:0;
        }

        .searchBox{
          min-height:50px;
          border-radius:999px;
          padding:0 16px;
        }

        .input{
          font-size:13px;
        }

        .subTag{
          width:100%;
          font-size:12px;
          margin-top:8px;
        }
      }
    </style>

  </head>

  <body>
    <div id="bhHeader"></div>

    <div class="wrap">
      <main class="main">
        <div class="center">
          <div class="heroWrap">
            <div class="heroCrop">
              <img
                src="/buscarhogardemo/index-hero.png?v=3"
                alt="Ilustración de varios tipos de viviendas"
                class="heroImage"
              />
            </div>
          </div>

          <h1 class="headline">Solo anuncios de profesionales</h1>

          <div class="controlsWrap">
            <div class="modeRow" aria-label="Tipo de búsqueda">
              <label class="pill">
                <input type="radio" name="mode" value="buy" checked />
                <span>COMPRAR</span>
              </label>

              <label class="pill">
                <input type="radio" name="mode" value="rent" />
                <span>ALQUILAR</span>
              </label>

              <label class="pill">
                <input type="radio" name="mode" value="room" />
                <span>HABITACIÓN</span>
              </label>

              <label class="pill">
                <input type="radio" name="mode" value="new_build" />
                <span>OBRA NUEVA</span>
              </label>
            </div>

            <div class="searchShell">
              <form id="form" class="searchBox" autocomplete="off">
                <input
                  id="q"
                  class="input"
                  placeholder="Escribe una ciudad, zona, CP..."
                  aria-label="Buscar ciudad o zona"
                  enterkeyhint="search"
                />
              </form>
            </div>
          </div>

          <div class="subTag">Una vivienda, un anuncio.</div>
        </div>
      </main>

      <div id="bhFooter"></div>
    </div>

    <script type="module">
      import { initLayout } from "./bh-layout.js?v=20260309b";
      import { initAuth } from "./bh-auth.js?v=20260309b";

      initLayout({ showMiniSearch: false });
      initAuth();

      function getSelectedMode(){
        const el = document.querySelector('input[name="mode"]:checked');
        return el ? el.value : "buy";
      }

      window.BH_goToMap = function(city){
        const params = new URLSearchParams();
        params.set("city", city);
        params.set("mode", getSelectedMode());
        window.location.href = "./map.html?" + params.toString();
      };

      const form = document.getElementById("form");
      const q = document.getElementById("q");

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const city = (q.value || "").trim();
        if(!city) return;
        window.BH_goToMap(city);
      });
    </script>
  </body>
</html>
