<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Homyo</title>

  <link rel="stylesheet" href="./bh-shared.css?v=20260504" />
  <link rel="stylesheet" href="./bh-header-overrides.css?v=20260504" />

  <style>
    :root{
      --bg:#FFFDFA;
      --granate:#8C1F2D;
      --dorado:#C4962A;
      --muted:#6b7280;
      --headerH:82px;
    }

    *{ box-sizing:border-box; }

    html,body{
      width:100%;
      height:100%;
      min-height:100%;
      margin:0;
      background:var(--bg);
      color:#111;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      overflow:hidden;
    }

    body{
      min-height:100vh;
      min-height:100dvh;
    }

    .wrap{
      height:calc(100vh - var(--headerH,82px));
      height:calc(100dvh - var(--headerH,82px));
      display:grid;
      grid-template-rows:minmax(0,1fr);
      overflow:hidden;
    }

    .main{
      position:relative;
      display:flex;
      flex-direction:column;
      align-items:stretch;
      min-height:0;
      padding-bottom:0;
      overflow:hidden;
    }

    .searchBlock{
      display:flex;
      flex-direction:column;
      align-items:center;
      width:100%;
      padding:clamp(14px,3vh,28px) 20px 0;
      margin-top:0;
      flex:0 0 auto;
    }

    .searchInner{
      display:flex;
      flex-direction:column;
      align-items:center;
      width:100%;
      max-width:650px;
      margin:0 auto;
      padding:20px;
      border:none;
      border-radius:3.5px;
    }

    .tagline{
      margin-top:33px;
      transform:translateY(15px);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      color:var(--dorado);
      font-size:34px;
      font-weight:550;
      letter-spacing:2.4px;
      word-spacing:6px;
      text-transform:uppercase;
      margin-bottom:52px;
      font-family:'Raleway','Montserrat',system-ui,sans-serif;
      font-style:normal;
      white-space:nowrap;
    }

    .modeRow{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      width:min(680px,100%);
      border-bottom:1.5px solid #e8e0d5;
      margin-top:10px;
      margin-bottom:37px;
    }

    .pill{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:44px;
      padding:0 8px;
      background:transparent;
      color:#c0b8b0;
      font-size:17px;
      font-weight:500;
      letter-spacing:1px;
      text-transform:uppercase;
      cursor:pointer;
      border-bottom:2px solid transparent;
      margin-bottom:-1.5px;
      white-space:nowrap;
      transition:color .15s;
    }

    .pill input{
      position:absolute;
      inset:0;
      opacity:0;
      pointer-events:none;
    }

    .pill:hover{ color:var(--granate); }

    .pill:has(input:checked){
      color:var(--granate);
      font-weight:700;
      border-bottom-color:var(--granate);
    }

    .pill:has(input:checked) span{ color:var(--granate); }

    .searchWrap{
      width:min(680px,100%);
    }

    .searchBox{
      width:calc(100% + 60px);
      margin-left:-30px;
      margin-right:-30px;
      display:flex;
      align-items:center;
      background:#fff;
      border-radius:999px;
      padding:0 12px 0 22px;
      min-height:58px;
      box-shadow:0 2px 20px rgba(196,150,42,.12);
      border:1px solid rgba(196,150,42,.18);
      gap:10px;
      transition:box-shadow .18s,border-color .18s;
    }

    .searchBox:focus-within{
      box-shadow:0 4px 28px rgba(196,150,42,.16);
      border-color:rgba(196,150,42,.28);
    }

    .searchIcon{
      color:#ddd;
      width:18px;
      min-width:24px;
      height:24px;
      margin-right:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:color .18s;
    }

    .searchBox:focus-within .searchIcon{ color:var(--dorado); }

    .searchIcon svg{
      width:16px;
      height:16px;
      display:block;
    }

    .input{
      width:100%;
      min-width:0;
      border:0;
      outline:0;
      background:transparent;
      font-size:17px;
      color:#222;
      line-height:1.2;
    }

    .input::placeholder{ color:#ccc; }

    .mobileSearchBtn{ display:none; }

    .locationBtn{
      appearance:none;
      border:none;
      background:transparent;
      color:var(--granate);
      width:42px;
      min-width:42px;
      height:42px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0;
      margin-left:auto;
      margin-right:2px;
      cursor:pointer;
    }

    .locationBtn svg{
      width:21px;
      height:21px;
      display:block;
    }

    .searchBtn{
      background:var(--granate);
      color:#fff;
      border:none;
      border-radius:999px;
      padding:10px 18px;
      font-size:14px;
      font-weight:600;
      cursor:pointer;
      white-space:nowrap;
      transition:all .18s ease;
    }

    .searchBtn:hover{
      opacity:.9;
      transform:translateY(-1px);
    }

    .subTagline{
      margin-top:28px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      font-family:'Raleway','Montserrat',system-ui,sans-serif;
      font-size:15px;
      font-style:normal;
      color:var(--dorado);
      letter-spacing:1.2px;
      text-transform:uppercase;
      opacity:.85;
    }

    .rotatingPhraseContent{
      color:#6b7280;
    }

    .midDot{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      margin:0;
      font-size:25px;
      line-height:1;
      transform:translateY(-1px);
    }

    #bhFooter{
      display:none !important;
    }

    @media (max-width:720px){
      :root{ --headerH:56px; }

      .desktopSearchBtn{
        display:none;
      }

      .mobileSearchBtn{
        display:block;
        width:calc(100% + 40px);
        margin:30px -20px 0;
        min-height:52px;
        border-radius:3.5px;
        padding:8px 14px;
        font-size:18px;
        font-family:'Raleway','Montserrat',system-ui,sans-serif;
        font-weight:600;
        letter-spacing:.17em;
        text-transform:none;
      }

      .wrap{
        height:calc(100vh - var(--headerH,56px));
        height:calc(100dvh - var(--headerH,56px));
        grid-template-rows:minmax(0,1fr);
      }

      .main{ padding-bottom:0; }

      .searchBlock{
        padding:clamp(10px,2.2vh,22px) 18px 0;
      }

      .tagline{
        margin-top:34px;
        margin-bottom:38px;
        max-width:100%;
        display:flex;
        justify-content:center;
        text-align:center;
        white-space:nowrap;
        transform:translateY(10px);
        text-transform:none;
        font-size:22px;
        letter-spacing:.55px;
        word-spacing:0;
      }

      .modeRow{
        grid-template-columns:repeat(2,minmax(0,1fr));
        width:calc(100% + 40px);
        margin-left:-20px;
        margin-right:-20px;
        max-width:none;
        column-gap:15px;
        row-gap:20px;
        border-bottom:0;
        margin-top:15px;
        margin-bottom:31px;
      }

      .pill{
        min-width:0;
        min-height:42px;
        padding:0 4px;
        background:#fff;
        color:#6b6b6b;
        font-size:12.5px;
        font-weight:500;
        letter-spacing:.17em;
        font-family:Raleway,Montserrat,system-ui,sans-serif;
        text-transform:uppercase;
        border:1px solid #e7dfd2;
        border-radius:3.5px;
        margin-bottom:0;
        overflow:hidden;
        text-overflow:ellipsis;
        box-shadow:0 1px 6px rgba(0,0,0,.04);
        transition:all .18s ease;
      }

      .pill:hover{
        color:var(--granate);
        border-color:rgba(140,31,45,.35);
        box-shadow:0 2px 10px rgba(140,31,45,.08);
      }

      .pill:has(input:checked){
        background:rgba(140,31,45,.055);
        color:var(--granate);
        font-weight:650;
        border-color:rgba(140,31,45,.55);
        box-shadow:
          inset 0 0 0 1px rgba(140,31,45,.18),
          0 3px 10px rgba(140,31,45,.08);
      }

      .pill:has(input:checked) span{
        color:var(--granate);
      }

      .searchWrap{
        width:100%;
        max-width:420px;
      }

      .searchBox{
        width:calc(100% + 40px);
        margin-left:-20px;
        margin-right:-20px;
        min-height:54px;
        padding:0 8px 0 14px;
        border-radius:3.5px;
      }

      .input{
        font-size:15px;
        min-width:0;
      }

      .locationBtn{
        width:34px;
        min-width:34px;
        height:34px;
        margin-left:2px;
        margin-right:0;
      }

      .locationBtn svg{
        width:19px;
        height:19px;
      }

      .subTagline{
        font-size:10px;
        margin-top:19px;
        text-align:center;
        white-space:nowrap;
      }
    }

    @media (max-width:420px){
      :root{ --headerH:54px; }

      .tagline{
        font-size:20px;
        letter-spacing:.55px;
        word-spacing:0;
      }

      .pill{
        font-size:11.5px;
        letter-spacing:.17em;
      }
    }
  </style>
</head>

<body>
  <div id="bhHeader"></div>
  <div id="bhFooter"></div>

  <div class="wrap">
    <main class="main">
      <div class="searchBlock">
        <div class="tagline">Solo anuncios de profesionales</div>

        <div class="searchInner">
          <div class="modeRow" aria-label="Tipo de búsqueda">
            <label class="pill"><input type="radio" name="mode" value="buy" checked /><span>Comprar</span></label>
            <label class="pill"><input type="radio" name="mode" value="new_build" /><span>Obra nueva</span></label>
            <label class="pill"><input type="radio" name="mode" value="rent" /><span>Alquilar</span></label>
            <label class="pill"><input type="radio" name="mode" value="room" /><span>Habitación</span></label>
          </div>

          <div class="searchWrap">
            <form id="form" autocomplete="off">
              <div class="searchBox">
                <span class="searchIcon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="7"></circle>
                    <path d="M21 21l-4.3-4.3"></path>
                  </svg>
                </span>

                <input id="q" class="input" placeholder="Ciudad, zona, código postal..." aria-label="Buscar ciudad o zona" enterkeyhint="search" />

                <button type="button" class="locationBtn" id="locationBtn" aria-label="Usar mi ubicación">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1 1 18 0z"></path>
                    <circle cx="12" cy="10" r="3"></circle>
                  </svg>
                </button>

                <button class="searchBtn desktopSearchBtn" type="submit">Buscar</button>
              </div>

              <button class="searchBtn mobileSearchBtn" type="submit">Buscar</button>
            </form>
          </div>

          <div class="subTagline" id="rotatingPhrase">
            <span class="midDot">·</span>
            <span class="rotatingPhraseContent" id="rotatingPhraseText">Metros de vivienda útiles</span>
            <span class="midDot">·</span>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { initLayout } from "./bh-layout.js?v=20260504";

    window.addEventListener("DOMContentLoaded", () => {
      initLayout({ showMiniSearch: false });
    });
  </script>

  <script>
    const phrases = [
      "Metros de vivienda útiles",
      "Precio por metro cuadrado útil",
      "Sin anuncios duplicados",
      "Sin anuncios de particulares",
      "Filtros por fecha de construcción",
      "Posición del sol durante el año",
      "Plano siempre disponible"
    ];

    const rotatingPhraseText = document.getElementById("rotatingPhraseText");
    let phraseIndex = 0;

    if (rotatingPhraseText) {
      setInterval(() => {
        phraseIndex = (phraseIndex + 1) % phrases.length;
        rotatingPhraseText.textContent = phrases[phraseIndex];
      }, 6000);
    }

    function getSelectedMode() {
      const el = document.querySelector('input[name="mode"]:checked');
      return el ? el.value : "buy";
    }

    function go(city) {
      const cleanCity = String(city || "").trim();
      if (!cleanCity) return;

      const params = new URLSearchParams();
      params.set("city", cleanCity);
      params.set("mode", getSelectedMode());

      window.location.href = "./map.html?" + params.toString();
    }

    window.BH_goToMap = go;

    const form = document.getElementById("form");
    const q = document.getElementById("q");

    function updateSearchPlaceholder() {
      if (!q) return;
      q.placeholder = window.matchMedia("(max-width:720px)").matches
        ? "Ciudad, Barrio, Código postal..."
        : "Ciudad, zona, código postal...";
    }

    updateSearchPlaceholder();
    window.addEventListener("resize", updateSearchPlaceholder);

    const locationBtn = document.getElementById("locationBtn");

    async function fillCurrentAreaFromLocation(position) {
      try {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;

        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`);
        const data = await response.json();

        const address = data.address || {};
        const area =
          address.suburb ||
          address.neighbourhood ||
          address.city_district ||
          address.quarter ||
          address.town ||
          address.village ||
          address.city ||
          "";

        if (area && q) q.value = area;
      } catch (err) {
        console.error(err);
      }
    }

    if (locationBtn && navigator.geolocation) {
      locationBtn.addEventListener("click", () => {
        navigator.geolocation.getCurrentPosition(fillCurrentAreaFromLocation, console.error, {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 300000
        });
      });
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      go(q.value);
    });

    window.addEventListener("bh:mini-search", (ev) => {
      const city = ev?.detail?.query || "";
      if (q) q.value = city;
      go(city);
    });
  </script>
</body>
</html>
