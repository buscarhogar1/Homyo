<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Homyo</title>

  <link rel="stylesheet" href="./bh-shared.css?v=20260504" />
  <link rel="stylesheet" href="./bh-header-overrides.css?v=20260504" />

  <style>
    :root{
      --bg:#FFFDFA;
      --granate:#8C1F2D;
      --dorado:#C4962A;
      --muted:#6b7280;
      --headerH:82px;
    }

    *{ box-sizing:border-box; }

    html,body{
      width:100%;
      height:100%;
      min-height:100%;
      margin:0;
      background:var(--bg);
      color:#111;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      overflow:hidden;
    }

    body{
      min-height:100vh;
      min-height:100dvh;
    }

    .wrap{
      height:calc(100vh - var(--headerH,82px));
      height:calc(100dvh - var(--headerH,82px));
      display:grid;
      grid-template-rows:minmax(0,1fr);
      overflow:hidden;
    }

    .main{
      position:relative;
      display:flex;
      flex-direction:column;
      align-items:stretch;
      min-height:0;
      padding-bottom:0;
      overflow:hidden;
    }

    .searchBlock{
      position:relative;
      display:block;
      width:100%;
      height:100%;
      min-height:0;
      padding:0 20px;
      margin-top:0;
      flex:1 1 auto;
      overflow:hidden;
    }

    /* Banda superior (logo) — su alto lo fija el JS de anclaje */
    /* Grupo fijo (botones + buscador + frases) — su posición la fija el JS */
    .coreAnchor{
      position:absolute;
      left:0;
      right:0;
      top:0;
      padding:0 20px;
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    .searchInner{
      display:flex;
      flex-direction:column;
      align-items:center;
      width:100%;
      max-width:650px;
      margin:0 auto;
      padding:20px 20px 0;
      border:none;
      border-radius:3.5px;
      flex:0 0 auto;
    }

    @media (min-width:721px){
      .searchInner{
        zoom:calc(1.265 * var(--uiScaleCore, 1));
        margin-left:auto;
        margin-right:auto;
      }

      /* El logo escala con el factor completo; el resto, más suave */
      .heroLogo{
        zoom:var(--uiScale, 1);
      }

      .quickActions{
        width:auto;
        zoom:var(--uiScaleCore, 1);
      }

      .searchBlock{
        align-items:center;
        justify-content:flex-start;
      }

      .modeRow,
      .searchWrap{
        margin-left:auto;
        margin-right:auto;
      }
    }

    .tagline{
      position:absolute;
      left:0;
      right:0;
      top:0;
      margin:0;
      transform:none;
      display:flex;
      align-items:center;
      justify-content:center;
      width:auto;
      overflow:hidden;
    }

    .heroMapImage{
      display:none;
    }

    /* Logo (casa) debajo del header (versión web/desktop) */
    #bhHeader .brandText, .brandText{
      white-space:nowrap !important;
    }

    .heroBrand{
      display:flex;
      align-items:center;
      justify-content:center;
      width:100%;
    }

    .heroLogo{
      width:560px;
      height:86px;
      background:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20376%2058'%3E%3Cpolyline%20points='8,50%20164,50%20164,28%20188,8%20212,28%20212,50%20368,50'%20fill='none'%20stroke='%238C1F2D'%20stroke-width='3.4'%20stroke-linejoin='miter'%20stroke-linecap='butt'/%3E%3C/svg%3E") no-repeat center center;
      background-size:contain;
    }

    .modeRow{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      width:min(680px,100%);
      border-bottom:1.5px solid #e8e0d5;
      margin-top:10px;
      margin-bottom:37px;
    }

    .pill{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:44px;
      padding:0 8px;
      background:transparent;
      color:#c0b8b0;
      font-size:17px;
      font-weight:500;
      letter-spacing:1px;
      text-transform:uppercase;
      cursor:pointer;
      border-bottom:2px solid transparent;
      margin-bottom:-1.5px;
      white-space:nowrap;
      transition:color .15s;
    }

    .pill input{
      position:absolute;
      inset:0;
      opacity:0;
      pointer-events:none;
    }

    .pill:hover{ color:var(--granate); }

    .pill:has(input:checked){
      color:var(--granate);
      font-weight:700;
      border-bottom-color:var(--granate);
    }

    .pill:has(input:checked) span{ color:var(--granate); }

    .searchWrap{
      width:min(680px,100%);
    }

    .searchBox{
      width:calc(100% + 60px);
      margin-left:-30px;
      margin-right:-30px;
      display:flex;
      align-items:center;
      background:#fff;
      border-radius:999px;
      padding:0 12px 0 22px;
      min-height:58px;
      box-shadow:0 2px 20px rgba(196,150,42,.12);
      border:1px solid rgba(196,150,42,.18);
      gap:10px;
      transition:box-shadow .18s,border-color .18s;
    }

    .searchBox:focus-within{
      box-shadow:0 4px 28px rgba(196,150,42,.16);
      border-color:rgba(196,150,42,.28);
    }

    .searchIcon{
      color:#ddd;
      width:18px;
      min-width:24px;
      height:24px;
      margin-right:-1px;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:color .18s;
    }

    .searchBox:focus-within .searchIcon{ color:var(--dorado); }

    .searchIcon svg{
      width:16px;
      height:16px;
      display:block;
    }

    .input{
      width:100%;
      min-width:0;
      border:0;
      outline:0;
      background:transparent;
      font-size:17px;
      color:#222;
      line-height:1.2;
    }

    .input::placeholder{ color:#ccc; }

    .mobileSearchBtn{ display:none; }

    .locationBtn{
      appearance:none;
      border:none;
      background:transparent;
      color:var(--granate);
      width:42px;
      min-width:42px;
      height:42px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0;
      margin-left:auto;
      margin-right:2px;
      cursor:pointer;
    }

    .locationBtn svg{
      width:21px;
      height:21px;
      display:block;
    }

    .searchBtn{
      background:var(--granate);
      color:#fff;
      border:none;
      border-radius:999px;
      padding:10px 18px;
      font-size:14px;
      font-weight:600;
      cursor:pointer;
      white-space:nowrap;
      transition:all .18s ease;
    }

    .searchBtn:hover{
      opacity:.9;
      transform:translateY(-1px);
    }

    .subTagline{
      margin-top:28px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      font-family:'Raleway','Montserrat',system-ui,sans-serif;
      font-size:15px;
      font-style:normal;
      color:var(--granate);
      letter-spacing:1.2px;
      text-transform:uppercase;
      opacity:.85;
    }

    .rotatingPhraseContent{
      color:var(--dorado);
    }

    .midDot{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:34px;
      height:1px;
      margin:0;
      font-size:0;
      line-height:0;
      color:transparent;
      background:#8A1F2D;
      transform:none;
      flex:0 0 34px;
    }

    .bottomPhraseZone{
      position:absolute;
      left:0;
      right:0;
      width:auto;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    .quickActions{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:86px;
      padding:0 24px;
      margin-top:auto;
      margin-bottom:auto;
    }

    .quickAction{
      appearance:none;
      border:none;
      background:transparent;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:10px;
      cursor:pointer;
      color:#8A1F2D;
      min-width:67px;
    }

    .quickActionIcon{
      width:58px;
      height:58px;
      border-radius:19px;
      border:1px solid rgba(138,31,45,.12);
      background:rgba(255,255,255,.72);
      box-shadow:
        0 10px 24px rgba(138,31,45,.06),
        inset 0 1px 0 rgba(255,255,255,.9);
      display:flex;
      align-items:center;
      justify-content:center;
      backdrop-filter:blur(10px);
      transition:all .18s ease;
    }

    .quickAction:hover .quickActionIcon{
      transform:translateY(-2px);
      border-color:rgba(226,184,76,.35);
      box-shadow:
        0 14px 30px rgba(138,31,45,.09),
        inset 0 1px 0 rgba(255,255,255,.95);
    }

    .quickActionIcon svg{
      width:24px;
      height:24px;
      stroke:#8A1F2D;
      stroke-width:1.8;
      fill:none;
    }

    .quickActionLabel{
      font-family:'Raleway','Montserrat',system-ui,sans-serif;
      font-size:10px;
      font-weight:650;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:#8A1F2D;
      white-space:nowrap;
    }

    #bhFooter{
      display:none !important;
    }

    @media (max-width:720px){
      :root{ --headerH:56px; }

      .desktopSearchBtn{
        display:none;
      }

      .mobileSearchBtn{
        display:block;
        width:calc(100% + 40px);
        margin:22px -20px 0;
        min-height:52px;
        border-radius:3.5px;
        padding:8px 14px;
        font-size:18px;
        font-family:'Raleway','Montserrat',system-ui,sans-serif;
        font-weight:600;
        letter-spacing:.17em;
        text-transform:none;
      }

      .wrap{
        height:calc(100vh - var(--headerH,56px));
        height:calc(100dvh - var(--headerH,56px));
        grid-template-rows:minmax(0,1fr);
      }

      .main{ padding-bottom:0; }

      .searchBlock{
        padding:0 18px;
      }

      .coreAnchor{
        padding:0 18px;
      }

      .tagline{
        margin:0;
        max-width:none;
        display:flex;
        justify-content:center;
        text-align:center;
        white-space:nowrap;
        transform:none;
        text-transform:none;
        font-size:22px;
        letter-spacing:.55px;
        word-spacing:0;
      }

      .heroBrand{
        display:flex;
        align-items:center;
        justify-content:center;
        width:100%;
      }

      .heroLogo{
        width:240px;
        height:70px;
        background:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20220%2058'%3E%3Cpolyline%20points='8,50%2086,50%2086,28%20110,8%20134,28%20134,50%20212,50'%20fill='none'%20stroke='%238C1F2D'%20stroke-width='3.4'%20stroke-linejoin='miter'%20stroke-linecap='butt'/%3E%3C/svg%3E") no-repeat center center;
        background-size:contain;
      }

      .modeRow{
        grid-template-columns:1fr;
        width:calc(100% + 40px);
        margin-left:-20px;
        margin-right:-20px;
        max-width:none;
        column-gap:15px;
        row-gap:12px;
        border-bottom:0;
        margin-top:15px;
        margin-bottom:22px;
      }

      .pill{
        min-width:0;
        min-height:54px;
        padding:0 4px;
        background:#fff;
        color:#6b6b6b;
        font-size:16.5px;
        font-weight:500;
        letter-spacing:.17em;
        font-family:Raleway,Montserrat,system-ui,sans-serif;
        text-transform:uppercase;
        border:1px solid #e7dfd2;
        border-radius:3.5px;
        margin-bottom:0;
        overflow:hidden;
        text-overflow:ellipsis;
        box-shadow:0 1px 6px rgba(0,0,0,.04);
        transition:all .18s ease;
      }

      .pill:hover{
        color:var(--granate);
        border-color:rgba(140,31,45,.35);
        box-shadow:0 2px 10px rgba(140,31,45,.08);
      }

      .pill:has(input:checked){
        background:rgba(196,150,42,.055);
        color:var(--granate);
        font-weight:650;
        border-color:rgba(196,150,42,.55);
        box-shadow:
          inset 0 0 0 1px rgba(196,150,42,.18),
          0 3px 10px rgba(196,150,42,.08);
      }

      .pill:has(input:checked) span{
        color:var(--granate);
      }

      .searchWrap{
        width:100%;
        max-width:420px;
      }

      .searchBox{
        width:calc(100% + 40px);
        margin-left:-20px;
        margin-right:-20px;
        min-height:54px;
        padding:0 8px 0 12px;
        border-radius:3.5px;
      }

      .input{
        font-size:15px;
        min-width:0;
      }

      .locationBtn{
        width:34px;
        min-width:34px;
        height:34px;
        margin-left:2px;
        margin-right:0;
      }

      .locationBtn svg{
        width:19px;
        height:19px;
      }

      .subTagline{
        font-size:11px;
        margin-top:24px;
        text-align:center;
        white-space:nowrap;
        gap:12px;
      }

      .midDot{
        width:22px;
        flex-basis:22px;
      }

      .quickActions{
        gap:10px;
        padding:0 10px;
      }

      .quickAction{
        min-width:58px;
        gap:8px;
      }

      .quickActionIcon{
        width:52px;
        height:52px;
        border-radius:18px;
      }

      .quickActionIcon svg{
        width:22px;
        height:22px;
      }

      .quickActionLabel{
        font-size:9px;
        letter-spacing:.08em;
      }
    }

    @media (max-width:420px){
      :root{ --headerH:54px; }

      .tagline{
        font-size:20px;
        letter-spacing:.55px;
        word-spacing:0;
      }

      .pill{
        font-size:13.5px;
        letter-spacing:.17em;
      }
    }

    /* ============================================================
       Autocompletado del buscador (web + móvil)
       Panel fijo anclado a la caja de búsqueda. Se monta en <body>
       para no recortarse por el overflow:hidden ni escalarse con el
       zoom del bloque de búsqueda.
       ============================================================ */
    .acPanel{
      position:fixed;
      z-index:1200;
      background:#fff;
      border:1px solid rgba(196,150,42,.20);
      border-radius:16px;
      box-shadow:
        0 24px 60px rgba(140,31,45,.13),
        0 4px 14px rgba(0,0,0,.05);
      padding:7px;
      display:none;
      overflow-y:auto;
      overscroll-behavior:contain;
      -webkit-overflow-scrolling:touch;
    }

    .acPanel.open{
      display:block;
      animation:acIn .14s ease;
    }

    @keyframes acIn{
      from{ opacity:0; transform:translateY(-5px); }
      to{ opacity:1; transform:none; }
    }

    .acGroup{
      font-family:'Raleway','Montserrat',system-ui,sans-serif;
      font-size:10px;
      font-weight:700;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:#bcab8d;
      padding:11px 13px 6px;
    }

    .acRow{
      display:flex;
      align-items:center;
      gap:12px;
      padding:9px 12px;
      border-radius:11px;
      cursor:pointer;
      transition:background .12s ease;
      user-select:none;
    }

    .acRow:hover,
    .acRow.active{
      background:rgba(196,150,42,.09);
    }

    .acRow.active{
      box-shadow:inset 0 0 0 1px rgba(196,150,42,.24);
    }

    .acIcon{
      width:34px;
      height:34px;
      min-width:34px;
      border-radius:10px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(140,31,45,.07);
      color:var(--granate);
    }

    .acIcon svg{
      width:17px;
      height:17px;
      display:block;
      fill:none;
      stroke:currentColor;
      stroke-width:2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .acRow.acLocate .acIcon{
      background:rgba(196,150,42,.12);
      color:var(--dorado);
    }

    .acText{
      min-width:0;
      flex:1 1 auto;
    }

    .acName{
      font-size:15px;
      color:#221c19;
      line-height:1.25;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .acName b{
      color:var(--granate);
      font-weight:700;
    }

    .acContext{
      font-size:12px;
      color:#9c9289;
      margin-top:1px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .acType{
      flex:0 0 auto;
      font-family:'Raleway','Montserrat',system-ui,sans-serif;
      font-size:9px;
      font-weight:700;
      letter-spacing:.1em;
      text-transform:uppercase;
      color:var(--dorado);
      white-space:nowrap;
      margin-left:8px;
      padding:3px 8px;
      border:1px solid rgba(196,150,42,.30);
      border-radius:999px;
    }

    .acState{
      display:flex;
      align-items:center;
      gap:11px;
      padding:13px 14px;
      color:#9c9289;
      font-size:13.5px;
    }

    .acSpinner{
      width:16px;
      height:16px;
      min-width:16px;
      border:2px solid rgba(140,31,45,.16);
      border-top-color:var(--granate);
      border-radius:50%;
      animation:acSpin .7s linear infinite;
    }

    @keyframes acSpin{ to{ transform:rotate(360deg); } }

    .acDivider{
      height:1px;
      background:rgba(196,150,42,.13);
      margin:6px 11px;
    }

    @media (max-width:720px){
      .acPanel{
        border-radius:13px;
        padding:6px;
      }

      .acName{ font-size:15px; }
      .acRow{ padding:10px 12px; }
    }
  </style>
</head>

<body>
  <div id="bhHeader"></div>
  <div id="bhFooter"></div>

  <div class="wrap">
    <main class="main">
      <div class="searchBlock">
        <div class="tagline" aria-hidden="true">
          <div class="heroMapImage"></div>
          <div class="heroBrand"><div class="heroLogo" aria-hidden="true"></div></div>
        </div>

        <div class="coreAnchor">
        <div class="searchInner">
          <div class="modeRow" aria-label="Tipo de búsqueda">
            <label class="pill"><input type="radio" name="mode" value="buy" checked /><span>Comprar</span></label>
            <label class="pill"><input type="radio" name="mode" value="rent" /><span>Alquilar</span></label>
            <label class="pill"><input type="radio" name="mode" value="room" /><span>Habitación</span></label>
          </div>

          <div class="searchWrap">
            <form id="form" autocomplete="off">
              <div class="searchBox">
                <span class="searchIcon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="7"></circle>
                    <path d="M21 21l-4.3-4.3"></path>
                  </svg>
                </span>

                <input id="q" class="input" placeholder="Ciudad, zona, código postal..." aria-label="Buscar ciudad o zona" enterkeyhint="search" />

                <button type="button" class="locationBtn" id="locationBtn" aria-label="Usar mi ubicación">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1 1 18 0z"></path>
                    <circle cx="12" cy="10" r="3"></circle>
                  </svg>
                </button>

                <button class="searchBtn desktopSearchBtn" type="submit">Buscar</button>
              </div>

              <button class="searchBtn mobileSearchBtn" type="submit">Buscar</button>
            </form>
          </div>

          <div class="subTagline" id="rotatingPhrase">
            <span class="midDot">·</span>
            <span class="rotatingPhraseContent" id="rotatingPhraseText">Solo anuncios de profesionales</span>
            <span class="midDot">·</span>
          </div>
        </div>
        </div>

        <div class="bottomPhraseZone">
          <div class="quickActions">
            <button class="quickAction" type="button" data-quick-action="location">
              <div class="quickActionIcon">
                <svg viewBox="0 0 24 24">
                  <path d="M12 19s5.5-5 5.5-10A5.5 5.5 0 1 0 6.5 9c0 5 5.5 10 5.5 10z"></path>
                  <circle cx="12" cy="9" r="2.1"></circle>
                  <path d="M8 21.5h8"></path>
                </svg>
              </div>
              <div class="quickActionLabel">Ubicación</div>
            </button>

            <button class="quickAction" type="button" data-quick-action="area">
              <div class="quickActionIcon">
                <svg viewBox="0 0 24 24">
                  <path d="M5 8l6-4 8 5-3 8-9-1z"></path>
                  <circle cx="5" cy="8" r="1.3"></circle>
                  <circle cx="11" cy="4" r="1.3"></circle>
                  <circle cx="19" cy="9" r="1.3"></circle>
                  <circle cx="16" cy="17" r="1.3"></circle>
                  <circle cx="7" cy="16" r="1.3"></circle>
                </svg>
              </div>
              <div class="quickActionLabel">Área</div>
            </button>

            <button class="quickAction" type="button" data-quick-action="trace">
              <div class="quickActionIcon">
                <svg viewBox="0 0 24 24">
                  <path d="M5 19l1.5-4L16 5.5l3 3L9.5 18z"></path>
                  <path d="M14 7.5l3 3"></path>
                </svg>
              </div>
              <div class="quickActionLabel">Trazo</div>
            </button>

            <button class="quickAction" type="button" data-quick-action="sun">
              <div class="quickActionIcon">
                <svg viewBox="0 0 24 24">
                  <path d="M2.5 20h19"></path>
                  <path d="M6 20a6 6 0 0 1 12 0"></path>
                  <path d="M12 3v3"></path>
                  <path d="M4 9l1.8 1.8"></path>
                  <path d="M20 9l-1.8 1.8"></path>
                </svg>
              </div>
              <div class="quickActionLabel">Sol</div>
            </button>

            <button class="quickAction" type="button" data-quick-action="vehicle">
              <div class="quickActionIcon">
                <svg viewBox="0 0 24 24">
                  <circle cx="12" cy="12" r="8"></circle>
                  <circle cx="12" cy="12" r="2.2"></circle>
                  <path d="M12 14.2V20"></path>
                  <path d="M9.9 11l-6.8-2.4"></path>
                  <path d="M14.1 11l6.8-2.4"></path>

      </div>
    </main>
  </div>

  <script type="module">
    import { initLayout } from "./bh-layout.js?v=20260507_fix_layout_export";
    import { initAuth } from "./bh-auth.js?v=20260511_auth_fix_branding";

    window.addEventListener("DOMContentLoaded", () => {
      initLayout({ showMiniSearch: false });
      initAuth();
    });
  </script>

  <script src="./bh-geo-suggest.js?v=20260602"></script>

  <script>
    const phrases = [
      "Solo anuncios de profesionales",
      "Metros de vivienda útiles",
      "Precio por metro cuadrado útil",
      "Sin anuncios duplicados",
      "Sin anuncios de particulares",
      "Filtros por fecha de construcción",
      "Posición del sol durante el año",
      "Plano siempre disponible"
    ];

    const rotatingPhraseText = document.getElementById("rotatingPhraseText");
    let phraseIndex = 0;

    if (rotatingPhraseText) {
      setInterval(() => {
        phraseIndex = (phraseIndex + 1) % phrases.length;
        rotatingPhraseText.textContent = phrases[phraseIndex];
      }, 6000);
    }

    function getSelectedMode() {
      const el = document.querySelector('input[name="mode"]:checked');
      return el ? el.value : "buy";
    }

    function mapUrl(extra = {}) {
      const params = new URLSearchParams();
      const cleanCity = String(document.getElementById("q")?.value || "").trim();

      if (cleanCity) params.set("city", cleanCity);
      params.set("mode", getSelectedMode());

      for (const [key, value] of Object.entries(extra)) {
        if (value != null && value !== "") params.set(key, value);
      }

      return "./map.html?" + params.toString();
    }

    function go(city) {
      const cleanCity = String(city || "").trim();
      if (!cleanCity) return;

      const params = new URLSearchParams();
      params.set("city", cleanCity);
      params.set("mode", getSelectedMode());

      window.location.href = "./map.html?" + params.toString();
    }

    window.BH_goToMap = go;

    /* ============================================================
       REGLA DE COMPOSICIÓN DEL INDEX (anclaje al centro de pantalla)
       - El grupo fijo (botones + buscador + frases) conserva su
         espaciado interno; lo que cambia entre móviles es DÓNDE
         queda, para que un punto concreto caiga en el centro:
           · Móvil → centro del hueco entre "Alquilar" y "Habitación".
           · Web   → centro de la barra del buscador.
       - El logo se centra en el espacio libre superior (header → Comprar).
       - Los 5 iconos se centran en el espacio libre inferior (frases → base).
       ============================================================ */
    (function setupAnchorLayout(){
      const mq = window.matchMedia("(max-width:720px)");

      function apply(){
        const block     = document.querySelector(".searchBlock");
        const logoZone  = document.querySelector(".tagline");
        const core      = document.querySelector(".coreAnchor");
        const inner     = document.querySelector(".searchInner");
        const quickZone = document.querySelector(".bottomPhraseZone");
        if (!block || !core || !inner || !quickZone || !logoZone) return;

        // ---- Escala proporcional (solo web) ----------------------------
        // En pantallas grandes todo crece de forma proporcional para
        // conservar las proporciones que funcionan en un portátil, en
        // lugar de quedar pequeño con huecos enormes. En móvil = 1.
        let uiScale = 1;
        if (!mq.matches) {
          const vw = window.innerWidth;
          const vh = window.innerHeight;
          const REF_W = 1500, REF_H = 820, MAX = 1.9;
          uiScale = Math.min(vw / REF_W, vh / REF_H);
          uiScale = Math.max(1, Math.min(uiScale, MAX));
        }
        // El núcleo (botones/buscador/frases) e iconos crecen más despacio
        // que el logo, para no quedar demasiado grandes en pantallas amplias.
        const CORE_DAMP = 0.25;
        const uiScaleCore = 1 + (uiScale - 1) * CORE_DAMP;
        block.style.setProperty("--uiScale", uiScale.toFixed(4));
        block.style.setProperty("--uiScaleCore", uiScaleCore.toFixed(4));

        // Medimos el grupo con el ancla en la parte superior del bloque.
        core.style.top = "0px";

        const H        = block.getBoundingClientRect().height;
        const blockTop = block.getBoundingClientRect().top;   // alto del header (de la cima de pantalla a .searchBlock)
        const coreRect = core.getBoundingClientRect();
        const Gh       = coreRect.height;
        const coreTop0 = coreRect.top;
        if (H <= 0 || Gh <= 0) return;

        // Punto de anclaje (coordenada vertical en viewport).
        let anchorY;
        if (mq.matches) {
          const pills = inner.querySelectorAll(".pill");
          if (pills.length >= 3) {
            anchorY = pills[2].getBoundingClientRect().bottom; // borde inferior de "Habitación"
          } else {
            anchorY = coreTop0 + Gh / 2;
          }
        } else {
          const pills = inner.querySelectorAll(".pill");
          const sb    = inner.querySelector(".searchBox");
          if (pills.length && sb) {
            // centro del hueco entre la fila de botones y el buscador
            let pillsBottom = 0;
            pills.forEach(p => { pillsBottom = Math.max(pillsBottom, p.getBoundingClientRect().bottom); });
            anchorY = (pillsBottom + sb.getBoundingClientRect().top) / 2;
          } else {
            const r = sb ? sb.getBoundingClientRect() : coreRect;
            anchorY = r.top + r.height / 2;
          }
        }

        const anchorRel    = anchorY - coreTop0;        // ancla dentro del grupo
        const firstPill    = inner.querySelector(".pill");
        const sub          = inner.querySelector(".subTagline");
        const comprarRel   = firstPill ? (firstPill.getBoundingClientRect().top - coreTop0) : 0;
        const subBottomRel = sub ? (sub.getBoundingClientRect().bottom - coreTop0) : Gh;

        // Colocamos el grupo para que el ancla caiga en el centro de la
        // pantalla COMPLETA (medido desde el borde superior del header).
        // Centro absoluto = (blockTop + H)/2 → en coords de .searchBlock = (H - blockTop)/2.
        let coreTopPx = (H - blockTop) / 2 - anchorRel;
        const minTop  = 4;
        const maxTop  = Math.max(minTop, H - Gh - 4);
        coreTopPx     = Math.max(minTop, Math.min(coreTopPx, maxTop));
        core.style.top = coreTopPx + "px";

        // Banda del logo: del header (0) al borde superior de "Comprar".
        const comprarTopAbs = coreTopPx + comprarRel;
        logoZone.style.top    = "0px";
        logoZone.style.height = Math.max(0, comprarTopAbs) + "px";

        // Banda de los iconos: del final de las frases a la base.
        const subBottomAbs = coreTopPx + subBottomRel;
        quickZone.style.top    = subBottomAbs + "px";
        quickZone.style.height = Math.max(0, H - subBottomAbs) + "px";
      }

      let raf = null;
      function schedule(){
        // Síncrono primero (funciona aunque la pestaña esté en segundo plano,
        // donde requestAnimationFrame no dispara) y un repaso en el frame.
        apply();
        if (raf) cancelAnimationFrame(raf);
        raf = requestAnimationFrame(apply);
      }

      window.BH_applyAnchorLayout = apply;

      schedule();
      window.addEventListener("DOMContentLoaded", () => { schedule(); setTimeout(schedule, 120); setTimeout(schedule, 400); });
      window.addEventListener("load", schedule);
      window.addEventListener("orientationchange", () => setTimeout(schedule, 80));
      document.addEventListener("visibilitychange", () => { if (!document.hidden) schedule(); });
      window.addEventListener("resize", () => {
        // No recolocamos mientras se escribe (evita saltos al abrir el teclado).
        const a = document.activeElement;
        if (a && a.id === "q") return;
        schedule();
      });
      if (document.fonts && document.fonts.ready) document.fonts.ready.then(schedule);
    })();

    const form = document.getElementById("form");
    const q = document.getElementById("q");

    function updateSearchPlaceholder() {
      if (!q) return;
      q.placeholder = window.matchMedia("(max-width:720px)").matches
        ? "Ciudad, Barrio, Código postal..."
        : "Ciudad, zona, código postal...";
    }

    updateSearchPlaceholder();
    window.addEventListener("resize", updateSearchPlaceholder);

    const locationBtn = document.getElementById("locationBtn");

    async function fillCurrentAreaFromLocation(position) {
      try {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;

        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`);
        const data = await response.json();

        const address = data.address || {};
        const area =
          address.suburb ||
          address.neighbourhood ||
          address.city_district ||
          address.quarter ||
          address.town ||
          address.village ||
          address.city ||
          "";

        if (area && q) q.value = area;
      } catch (err) {
        console.error(err);
      }
    }

    if (locationBtn && navigator.geolocation) {
      locationBtn.addEventListener("click", () => {
        navigator.geolocation.getCurrentPosition(fillCurrentAreaFromLocation, console.error, {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 300000
        });
      });
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      go(q.value);
    });

    window.addEventListener("bh:mini-search", (ev) => {
      const city = ev?.detail?.query || "";
      if (q) q.value = city;
      go(city);
    });

    document.querySelectorAll("[data-quick-action]").forEach((btn) => {
      btn.addEventListener("click", () => {
        const action = btn.getAttribute("data-quick-action");

        if (action === "location") {
          if (!navigator.geolocation) {
            window.location.href = mapUrl({ quick: "location" });
            return;
          }

          navigator.geolocation.getCurrentPosition(
            (pos) => {
              window.location.href = mapUrl({
                quick: "location",
                lat: pos.coords.latitude,
                lng: pos.coords.longitude
              });
            },
            () => {
              window.location.href = mapUrl({ quick: "location" });
            },
            {
              enableHighAccuracy: true,
              timeout: 10000,
              maximumAge: 300000
            }
          );
          return;
        }

        if (action === "area") {
          window.location.href = mapUrl({ quick: "area" });
          return;
        }

        if (action === "trace") {
          window.location.href = mapUrl({ quick: "trace" });
          return;
        }

        if (action === "sun") {
          window.location.href = mapUrl({ quick: "sun" });
          return;
        }

        if (action === "vehicle") {
          window.location.href = mapUrl({ quick: "vehicle" });
        }
      });
    });

    /* ============================================================
       AUTOCOMPLETADO DEL BUSCADOR (estilo idealista / fotocasa / pisos.com)
       - Sugerencias tipadas mientras se escribe (debounce + cancelación).
       - Navegación por teclado (↑ ↓ Enter Esc), ratón y táctil.
       - Búsquedas recientes + "usar mi ubicación".
       - Fuente de datos: Nominatim (igual que el mapa), filtrado a España.
       ============================================================ */
    (function setupAutocomplete(){
      const input = document.getElementById("q");
      const box = document.querySelector(".searchBox");
      if (!input || !box) return;

      const RECENTS_KEY = "homyo_recent_searches";
      const MIN_CHARS = 2;
      const DEBOUNCE_MS = 230;
      const MAX_RESULTS = 7;

      // Panel montado en <body> para evitar recorte por overflow:hidden y el zoom del bloque.
      const panel = document.createElement("div");
      panel.className = "acPanel";
      panel.id = "acPanel";
      panel.setAttribute("role", "listbox");
      document.body.appendChild(panel);

      input.setAttribute("role", "combobox");
      input.setAttribute("aria-autocomplete", "list");
      input.setAttribute("aria-expanded", "false");
      input.setAttribute("aria-controls", "acPanel");

      let items = [];        // filas seleccionables actuales [{kind,label,context,type,lat,lon,zoom}]
      let activeIndex = -1;
      let lastQuery = "";
      let debounceTimer = null;
      let aborter = null;
      const cache = new Map();

      /* ---------- utilidades ---------- */
      function normChar(ch){
        const n = ch.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
        return n.length ? n[0] : ch.toLowerCase();
      }
      function buildNorm(str){
        let out = "";
        for (const ch of String(str)) out += normChar(ch);
        return out;
      }
      function escapeHtml(s){
        return String(s).replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]));
      }
      function highlight(name, query){
        const nName = buildNorm(name);
        const nQ = buildNorm(query.trim());
        if (!nQ) return escapeHtml(name);
        const i = nName.indexOf(nQ);
        if (i < 0 || nName.length !== name.length) return escapeHtml(name);
        return escapeHtml(name.slice(0, i)) +
               "<b>" + escapeHtml(name.slice(i, i + nQ.length)) + "</b>" +
               escapeHtml(name.slice(i + nQ.length));
      }

      const TYPE_LABELS = {
        state:"Comunidad", region:"Comunidad",
        province:"Provincia", county:"Provincia",
        city:"Ciudad", town:"Municipio", municipality:"Municipio",
        village:"Pueblo", hamlet:"Aldea",
        city_district:"Distrito", district:"Distrito", borough:"Distrito", suburb:"Distrito",
        neighbourhood:"Barrio", quarter:"Barrio", residential:"Zona", allotments:"Zona",
        postcode:"Código postal"
      };
      function typeLabel(it){
        const t = String(it.addresstype || it.type || "").toLowerCase();
        return TYPE_LABELS[t] || "Zona";
      }
      function zoomForType(label){
        if (label === "Comunidad" || label === "Provincia") return 10;
        if (label === "Barrio" || label === "Distrito") return 15;
        if (label === "Código postal") return 14;
        return 13; // municipio / ciudad / pueblo
      }
      function primaryName(it){
        if (it.name && it.name.trim()) return it.name.trim();
        const first = String(it.display_name || "").split(",")[0];
        return (first || "").trim();
      }
      function contextLine(it, name){
        const parts = String(it.display_name || "")
          .split(",")
          .map(s => s.trim())
          .filter(Boolean);
        const out = [];
        for (const p of parts) {
          if (p === name) continue;
          if (/^espa(ñ|n)a$/i.test(p) || /^spain$/i.test(p)) continue;
          if (out.includes(p)) continue;
          out.push(p);
          if (out.length >= 3) break;
        }
        return out.join(" · ");
      }

      const pinSvg =
        '<svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>';
      const targetSvg =
        '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"></circle><path d="M12 2v3M12 19v3M2 12h3M19 12h3"></path></svg>';
      const clockSvg =
        '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"></circle><path d="M12 7v5l3 2"></path></svg>';

      /* ---------- recientes ---------- */
      function getRecents(){
        try { return JSON.parse(localStorage.getItem(RECENTS_KEY) || "[]"); }
        catch { return []; }
      }
      function pushRecent(place){
        try {
          const list = getRecents().filter(r => r.label !== place.label);
          list.unshift({ label: place.label, context: place.context || "", type: place.type || "", lat: place.lat, lon: place.lon, zoom: place.zoom });
          localStorage.setItem(RECENTS_KEY, JSON.stringify(list.slice(0, 5)));
        } catch {}
      }

      /* ---------- posicionamiento ---------- */
      function position(){
        const r = box.getBoundingClientRect();
        panel.style.left = r.left + "px";
        panel.style.width = r.width + "px";
        panel.style.top = (r.bottom + 8) + "px";
        const avail = window.innerHeight - r.bottom - 18;
        panel.style.maxHeight = Math.max(160, avail) + "px";
      }

      /* ---------- render ---------- */
      function render(state){
        // state: {mode:'recents'|'loading'|'results'|'empty'|'hint', query, results}
        items = [];
        activeIndex = -1;
        let html = "";

        if (state.mode === "recents") {
          const recents = state.results;
          if (recents.length) {
            html += `<div class="acGroup">Búsquedas recientes</div>`;
            recents.forEach(r => {
              const idx = items.length;
              items.push({ kind:"place", ...r });
              html += rowHtml({ kind:"place", idx, icon:clockSvg, name:escapeHtml(r.label), context:r.context, type:r.type });
            });
          } else {
            html += `<div class="acState">Escribe una ciudad, zona, barrio o código postal para empezar.</div>`;
          }
        } else if (state.mode === "hint") {
          html += `<div class="acState">Sigue escribiendo para ver sugerencias…</div>`;
        } else if (state.mode === "loading") {
          html += `<div class="acState"><span class="acSpinner"></span>Buscando ubicaciones…</div>`;
        } else if (state.mode === "empty") {
          html += `<div class="acState">Sin resultados para “${escapeHtml(state.query)}”. Prueba con otra ciudad o zona.</div>`;
        } else if (state.mode === "results") {
          html += `<div class="acGroup">Sugerencias</div>`;
          state.results.forEach(r => {
            const idx = items.length;
            items.push({ kind:"place", ...r });
            html += rowHtml({
              kind:"place", idx, icon:pinSvg,
              name: highlight(r.label, state.query),
              context:r.context, type:r.type
            });
          });
        }

        panel.innerHTML = html;
        bindRows();
        open();
      }

      function rowHtml({ kind, idx, icon, name, context, type, locate }){
        return `<div class="acRow${locate ? " acLocate" : ""}" role="option" id="acRow-${idx}" data-idx="${idx}">
            <span class="acIcon">${icon}</span>
            <span class="acText">
              <span class="acName">${name}</span>
              ${context ? `<span class="acContext">${escapeHtml(context)}</span>` : ""}
            </span>
            ${type ? `<span class="acType">${escapeHtml(type)}</span>` : ""}
          </div>`;
      }

      function bindRows(){
        panel.querySelectorAll(".acRow").forEach(el => {
          const idx = parseInt(el.dataset.idx, 10);
          el.addEventListener("mousedown", (e) => {
            e.preventDefault(); // no perder el foco del input antes del click
            choose(idx);
          });
          el.addEventListener("mouseenter", () => setActive(idx));
        });
      }

      /* ---------- abrir / cerrar / activar ---------- */
      function open(){
        position();
        panel.classList.add("open");
        input.setAttribute("aria-expanded", "true");
      }
      function close(){
        panel.classList.remove("open");
        input.setAttribute("aria-expanded", "false");
        input.removeAttribute("aria-activedescendant");
        activeIndex = -1;
      }
      function isOpen(){ return panel.classList.contains("open"); }

      function setActive(idx){
        activeIndex = idx;
        panel.querySelectorAll(".acRow").forEach(el => {
          const i = parseInt(el.dataset.idx, 10);
          el.classList.toggle("active", i === idx);
        });
        if (idx >= 0) {
          input.setAttribute("aria-activedescendant", "acRow-" + idx);
          const el = panel.querySelector("#acRow-" + idx);
          if (el) el.scrollIntoView({ block:"nearest" });
        } else {
          input.removeAttribute("aria-activedescendant");
        }
      }

      /* ---------- selección ---------- */
      function choose(idx){
        const it = items[idx];
        if (!it) return;
        if (it.kind === "locate") { useMyLocation(); return; }
        // place
        input.value = it.label;
        pushRecent(it);
        close();
        const params = new URLSearchParams();
        params.set("city", it.label);
        params.set("mode", getSelectedMode());
        if (it.lat != null && it.lon != null) {
          params.set("lat", it.lat);
          params.set("lng", it.lon);
          params.set("zoom", it.zoom || 13);
        }
        window.location.href = "./map.html?" + params.toString();
      }

      function useMyLocation(){
        if (!navigator.geolocation) { close(); return; }
        // feedback visual
        items = [];
        panel.innerHTML = `<div class="acState"><span class="acSpinner"></span>Localizándote…</div>`;
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            const lat = pos.coords.latitude, lon = pos.coords.longitude;
            const params = new URLSearchParams();
            params.set("mode", getSelectedMode());
            params.set("quick", "location");
            params.set("lat", lat);
            params.set("lng", lon);
            params.set("zoom", 15);
            window.location.href = "./map.html?" + params.toString();
          },
          () => { close(); },
          { enableHighAccuracy:true, timeout:10000, maximumAge:300000 }
        );
      }

      /* ---------- fetch sugerencias (Nominatim, long-tail + CP) ---------- */
      async function fetchRemote(query){
        const key = buildNorm(query);
        if (cache.has(key)) return cache.get(key);

        if (aborter) aborter.abort();
        aborter = new AbortController();

        const url = "https://nominatim.openstreetmap.org/search?format=jsonv2"
          + "&q=" + encodeURIComponent(query)
          + "&countrycodes=es&addressdetails=1&dedupe=1&accept-language=es&limit=12";

        const res = await fetch(url, { headers:{ "Accept":"application/json" }, signal: aborter.signal });
        if (!res.ok) throw new Error("nominatim " + res.status);
        const data = await res.json();

        const seen = new Set();
        const out = [];
        for (const it of (data || [])) {
          // Solo ubicaciones (ciudades, municipios, distritos, barrios, provincias, CP):
          // descartamos calles, edificios, comercios y otros POIs como hacen los portales.
          const cat = String(it.category || it.class || "").toLowerCase();
          const isPlace = cat === "place" || cat === "boundary"
            || String(it.addresstype || "").toLowerCase() === "postcode";
          if (!isPlace) continue;

          const name = primaryName(it);
          if (!name) continue;
          const type = typeLabel(it);
          const context = contextLine(it, name);
          const dedupeKey = (buildNorm(name) + "|" + buildNorm(context));
          if (seen.has(dedupeKey)) continue;
          seen.add(dedupeKey);
          out.push({
            label: name,
            context,
            type,
            lat: parseFloat(it.lat),
            lon: parseFloat(it.lon),
            zoom: zoomForType(type)
          });
          if (out.length >= MAX_RESULTS) break;
        }
        cache.set(key, out);
        return out;
      }

      // Resultados locales instantáneos (gazetteer España).
      function localResults(query){
        return (window.BH_GEO ? window.BH_GEO.search(query, 6) : []);
      }

      // Fusiona local (prioritario) + remoto, sin duplicados.
      function mergeResults(local, remote){
        const out = [];
        const seen = new Set();
        const add = (r) => {
          const k = buildNorm(r.label) + "|" + buildNorm(r.context || "");
          const k2 = buildNorm(r.label);
          if (seen.has(k) || seen.has(k2)) return;
          seen.add(k); seen.add(k2);
          out.push(r);
        };
        local.forEach(add);
        remote.forEach((r) => { if (out.length < MAX_RESULTS) add(r); });
        return out.slice(0, MAX_RESULTS);
      }

      function onQuery(value){
        const query = value.trim();
        lastQuery = query;

        if (query.length === 0) {
          close();
          return;
        }
        if (query.length < MIN_CHARS) {
          close();
          return;
        }

        // 1) Coincidencias locales al instante (sensación de portal).
        const local = localResults(query);
        if (local.length) render({ mode:"results", query, results: local });
        else render({ mode:"loading" });

        // 2) Enriquecemos con Nominatim (long-tail + códigos postales).
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(async () => {
          try {
            const remote = await fetchRemote(query);
            if (query !== lastQuery) return; // resultado obsoleto
            const merged = mergeResults(local, remote);
            if (!merged.length) render({ mode:"empty", query });
            else render({ mode:"results", query, results: merged });
          } catch (err) {
            if (err && err.name === "AbortError") return;
            if (query !== lastQuery) return;
            if (local.length) return; // ya mostramos locales
            render({ mode:"empty", query });
          }
        }, DEBOUNCE_MS);
      }

      /* ---------- eventos ---------- */
      input.addEventListener("input", () => onQuery(input.value));

      input.addEventListener("focus", () => {
        if (input.value.trim().length >= MIN_CHARS) onQuery(input.value);
      });

      input.addEventListener("keydown", (e) => {
        if (!isOpen()) {
          if (e.key === "ArrowDown") { onQuery(input.value); e.preventDefault(); }
          return;
        }
        if (e.key === "ArrowDown") {
          e.preventDefault();
          setActive(activeIndex < items.length - 1 ? activeIndex + 1 : 0);
        } else if (e.key === "ArrowUp") {
          e.preventDefault();
          setActive(activeIndex > 0 ? activeIndex - 1 : items.length - 1);
        } else if (e.key === "Enter") {
          if (activeIndex >= 0) { e.preventDefault(); choose(activeIndex); }
          // si no hay fila activa, deja que el form haga su submit normal
        } else if (e.key === "Escape") {
          close();
        }
      });

      document.addEventListener("click", (e) => {
        if (!panel.contains(e.target) && e.target !== input) close();
      });

      window.addEventListener("resize", () => { if (isOpen()) position(); });
      window.addEventListener("scroll", () => { if (isOpen()) position(); }, true);
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", () => { if (isOpen()) position(); });
      }
    })();
  </script>
</body>
</html>
