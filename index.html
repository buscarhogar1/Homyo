<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Buscar Hogar</title>

    <link rel="stylesheet" href="./bh-shared.css" />

    <style>
      body{
        background:#FFFFFF;
      }

      .wrap{
        min-height: calc(100% - 54px);
        display:grid;
        grid-template-rows: 1fr auto;
      }

      .main{
        display:flex;
        align-items:flex-start;
        justify-content:center;
        padding:0 16px 12px;
        box-sizing:border-box;
      }

      .center{
        width:min(1180px,100%);
        display:grid;
        justify-items:center;
        text-align:center;
      }

      .heroWrap{
        width:100%;
        margin:7px 0 0;
      }

      .heroImage{
        width:100%;
        display:block;
        height:auto;
      }

      .headline{
        font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",system-ui,Segoe UI,Roboto,sans-serif;
        font-weight:700;
        letter-spacing:-0.3px;
        font-size:24px;
        line-height:1.08;
        color:#111;
        margin:0;
      }

      .controlsWrap{
        width:min(720px,100%);
        margin-top:8px;
        box-sizing:border-box;
        padding:18px 18px;
      }

      .modeRow{
        width:100%;
        display:flex;
        justify-content:center;
        align-items:center;
        gap:8px;
        flex-wrap:nowrap;
        margin-bottom:10px;
      }

      .pill{
        position:relative;
        display:inline-flex;
        align-items:center;
        justify-content:center;
        min-height:42px;
        padding:10px 10px;
        border-radius:6px;
        background:#fff;
        color:#111;
        font-size:12px;
        font-weight:600;
        line-height:1;
        text-transform:uppercase;
        letter-spacing:0.2px;
        cursor:pointer;
        user-select:none;
        box-sizing:border-box;
        flex:1 1 0;
        min-width:0;
      }

      .pill input{
        position:absolute;
        inset:0;
        opacity:0;
        pointer-events:none;
      }

      .pill span{
        position:relative;
        z-index:1;
        display:block;
        width:100%;
        text-align:center;
        white-space:nowrap;
        color:inherit;
      }

      .pill:has(input:checked){
        background:#9e2f0d;
        color:#fff;
      }

      .searchBox{
        width:100%;
        display:flex;
        justify-content:center;
        align-items:center;
        background:#F6931E;
        border-radius:18px;
        padding:16px 6px;
        box-sizing:border-box;
      }

      .input{
        border:0;
        outline:0;
        font-size:14px;
        line-height:1.2;
        flex:0 1 82%;
        width:82%;
        min-width:0;
        padding:12px 14px;
        background:#fff;
        color:#222;
        border-radius:10px;
      }

      .input::placeholder{
        color:#7a7a7a;
      }

      .subTag{
        width:min(720px,100%);
        font-size:12px;
        color:#666;
        text-align:center;
        margin-top:8px;
      }

      @media (min-width: 721px){
        .headline{
          font-size:30px;
        }

        .controlsWrap{
          width:min(820px,100%);
        }

        .modeRow{
          gap:10px;
          margin-bottom:12px;
        }

        .pill{
          min-height:46px;
          font-size:14px;
          padding:12px 14px;
        }

        .searchBox{
          padding:12px 28px;
          border-radius:20px;
        }

        .input{
          width:76%;
          flex:0 1 76%;
          font-size:16px;
          padding:13px 16px;
          border-radius:10px;
        }

        .subTag{
          font-size:13px;
        }
      }

      @media (max-width: 720px){
        .main{
          padding:0 16px 10px;
        }

        .center{
          width:min(100%,560px);
        }

        .headline{
          font-size:23px;
          line-height:1.1;
        }

        .controlsWrap{
          width:100%;
          margin-top:8px;
          padding:18px 18px;
        }

        .modeRow{
          gap:6px;
          margin-bottom:8px;
          flex-wrap:nowrap;
        }

        .pill{
          min-height:38px;
          font-size:11px;
          font-weight:600;
          padding:10px 6px;
          border-radius:6px;
          flex:1 1 0;
          min-width:0;
        }

        .searchBox{
          padding:16px 6px;
          border-radius:16px;
        }

        .input{
          font-size:13px;
          padding:10px 12px;
          border-radius:8px;
          width:78%;
          flex:0 1 78%;
        }

        .subTag{
          width:100%;
          font-size:12px;
          margin-top:8px;
        }
      }
    </style>
  </head>

  <body>
    <div id="bhHeader"></div>

    <div class="wrap">
      <main class="main">
        <div class="center">
          <div class="heroWrap">
            <img
              src="/buscarhogardemo/index-hero.png?v=3"
              alt="Ilustración de varios tipos de viviendas"
              class="heroImage"
            />
          </div>

          <h1 class="headline">Anuncios publicados únicamente por profesionales inmobiliarios</h1>

          <div class="controlsWrap">
            <div class="modeRow" aria-label="Tipo de búsqueda">
              <label class="pill">
                <input type="radio" name="mode" value="buy" checked />
                <span>COMPRAR</span>
              </label>

              <label class="pill">
                <input type="radio" name="mode" value="rent" />
                <span>ALQUILAR</span>
              </label>

              <label class="pill">
                <input type="radio" name="mode" value="room" />
                <span>HABITACIÓN</span>
              </label>

              <label class="pill">
                <input type="radio" name="mode" value="new_build" />
                <span>OBRA NUEVA</span>
              </label>
            </div>

            <form id="form" class="searchBox" autocomplete="off">
              <input
                id="q"
                class="input"
                placeholder="Escribe una ciudad o zona (ej. Murcia)"
                aria-label="Buscar ciudad o zona"
                enterkeyhint="search"
              />
            </form>
          </div>

          <div class="subTag">Una vivienda, un anuncio.</div>
        </div>
      </main>

      <div id="bhFooter"></div>
    </div>

    <script type="module">
      import { initLayout } from "./bh-layout.js?v=20260309b";
      import { initAuth } from "./bh-auth.js?v=20260309b";

      initLayout({ showMiniSearch: false });
      initAuth();

      function getSelectedMode(){
        const el = document.querySelector('input[name="mode"]:checked');
        return el ? el.value : "buy";
      }

      window.BH_goToMap = function(city){
        const params = new URLSearchParams();
        params.set("city", city);
        params.set("mode", getSelectedMode());
        window.location.href = "./map.html?" + params.toString();
      };

      const form = document.getElementById("form");
      const q = document.getElementById("q");

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const city = (q.value || "").trim();
        if(!city) return;
        window.BH_goToMap(city);
      });
    </script>
  </body>
</html>
