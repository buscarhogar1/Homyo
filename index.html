<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Homyo</title>

  <link rel="stylesheet" href="./bh-shared.css?v=20260504" />
  <link rel="stylesheet" href="./bh-header-overrides.css?v=20260504" />

  <style>
    /* Preview autocontenida del header real generado por bh-layout.js + estilos de bh-shared.css y bh-header-overrides.css */
    .topbar{
      height:82px;
      background:#FFFDFA !important;
      color:#8C1F2D;
      display:flex;
      align-items:center;
      padding:0 16px;
      box-sizing:border-box;
      border:none !important;
      border-bottom:none !important;
      position:relative;
      z-index:20;
      box-shadow:
        0 1px 0 rgba(140,31,45,0.18),
        0 8px 22px rgba(0,0,0,0.055) !important;
    }

    .topbarInner{
      width:min(1120px,100%);
      margin:0 auto;
      display:flex;
      align-items:center;
      gap:12px;
      position:relative;
      justify-content:center;
    }

    .leftGroup{
      position:absolute;
      left:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:2;
    }

    .menuBtn{
      appearance:none;
      border:none;
      background:transparent;
      padding:0;
      margin:0;
      width:28px;
      height:28px;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      color:#8C1F2D;
    }

    .menuBtn svg{
      width:26px;
      height:26px;
      display:block;
    }

    .menuBtn svg *{ stroke-width:1.8; }

    .brand{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      display:flex;
      align-items:center;
      text-decoration:none;
      color:#8C1F2D;
      flex:0 0 auto;
    }

    .brandText{
      margin-top:0 !important;
      color:#8C1F2D;
      font-family:'Raleway','Montserrat',system-ui,sans-serif;
      font-size:43px;
      font-weight:600;
      letter-spacing:0.35em;
      line-height:1;
      text-transform:uppercase;
    }

    .rightGroup{
      margin-left:auto;
      margin-right:20px;
      display:flex;
      gap:10px;
      align-items:center;
      position:relative;
      z-index:1;
      transform:none !important;
    }

    .navActionLink{
      color:#8A1F2D;
      text-decoration:none;
      font-size:14px;
      font-weight:400;
      padding:6px 8px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      gap:8px;
    }

    .navActionLink:hover{ background:rgba(255,255,255,0.14); }

    .navActionIcon{
      color:#8C1F2D;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      flex:0 0 auto;
      line-height:1;
    }

    .navActionIconSvg,
    .navActionIconSvg svg,
    .navAvatar,
    .navAvatarSvg,
    .navAvatarSvg svg{
      width:28px;
      min-width:28px;
      height:28px;
      margin-top:0 !important;
    }

    .navActionIconSvg svg,
    .navAvatarSvg svg{ display:block; }

    .navActionIconSvg svg *,
    .navAvatarSvg svg *{ stroke-width:1.7; }

    .navActionText,
    .navUserLabel,
    #navUserLabel,
    #navLogoutBtn{ display:none !important; }

    .navUserArea{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .navUserBtn,
    .navLogoutBtn{
      appearance:none;
      border:0;
      background:transparent;
      color:#8A1F2D;
      cursor:pointer;
      font-size:14px;
      font-weight:400;
      padding:6px 8px;
      border-radius:999px;
    }

    .navUserBtn{
      display:inline-flex;
      align-items:center;
      gap:8px;
    }

    .navAvatar,
    .navAvatarSvg{
      border-radius:999px;
      background:transparent;
      border:0;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .bh-hidden{ display:none !important; }

    @media (max-width:720px){
      .topbar{
        height:56px;
        padding:0 14px;
      }

      .topbarInner{ width:100%; }
      .leftGroup{ left:12px; }
      .rightGroup{ margin-right:12px; transform:none !important; }

      .menuBtn{
        width:24px;
        height:24px;
      }

      .menuBtn svg{
        width:22px;
        height:22px;
      }

      .brandText{
        font-size:32px;
        letter-spacing:.24em;
      }

      .navActionIconSvg,
      .navActionIconSvg svg,
      .navAvatar,
      .navAvatarSvg,
      .navAvatarSvg svg{
        width:22px;
        min-width:22px;
        height:22px;
      }
    }

    @media (max-width:420px){
      .topbar{ height:54px; }
      .brandText{
        font-size:30px;
        letter-spacing:.22em;
      }
    }

    :root{
      --bg:#FFFDFA;
      --granate:#8C1F2D;
      --dorado:#C4962A;
      --muted:#6b7280;
      --headerH:82px;
    }

    *{ box-sizing:border-box; }

    html,body{
      width:100%;
      height:100%;
      min-height:100%;
      margin:0;
      background:var(--bg);
      color:#111;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      overflow:hidden;
    }

    body{
      min-height:100vh;
      min-height:100dvh;
    }

    .wrap{
      height:calc(100vh - var(--headerH,82px));
      height:calc(100dvh - var(--headerH,82px));
      display:grid;
      grid-template-rows:minmax(0,1fr);
      overflow:hidden;
    }

    .main{
      position:relative;
      display:flex;
      flex-direction:column;
      align-items:stretch;
      min-height:0;
      padding-bottom:0;
      overflow:hidden;
    }

    .searchBlock{
      display:flex;
      flex-direction:column;
      align-items:center;
      width:100%;
      min-height:100%;
      padding:clamp(14px,3vh,28px) 20px 0;
      margin-top:0;
      flex:1 1 auto;
    }

    .searchInner{
      display:flex;
      flex-direction:column;
      align-items:center;
      width:100%;
      max-width:650px;
      margin:0 auto;
      padding:20px;
      border:none;
      border-radius:3.5px;
      flex:0 0 auto;
    }

    .tagline{
      margin-top:33px;
      transform:translateY(15px);
      display:flex;
      align-items:center;
      justify-content:center;
      width:100%;
      margin-bottom:52px;
    }

    .heroMapImage{
      display:block;
      width:min(860px,92vw);
      height:auto;
      object-fit:contain;
      pointer-events:none;
      user-select:none;
    }

    .modeRow{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      width:min(680px,100%);
      border-bottom:1.5px solid #e8e0d5;
      margin-top:10px;
      margin-bottom:37px;
    }

    .pill{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:44px;
      padding:0 8px;
      background:transparent;
      color:#c0b8b0;
      font-size:17px;
      font-weight:500;
      letter-spacing:1px;
      text-transform:uppercase;
      cursor:pointer;
      border-bottom:2px solid transparent;
      margin-bottom:-1.5px;
      white-space:nowrap;
      transition:color .15s;
    }

    .pill input{
      position:absolute;
      inset:0;
      opacity:0;
      pointer-events:none;
    }

    .pill:hover{ color:var(--granate); }

    .pill:has(input:checked){
      color:var(--granate);
      font-weight:700;
      border-bottom-color:var(--granate);
    }

    .pill:has(input:checked) span{ color:var(--granate); }

    .searchWrap{
      width:min(680px,100%);
    }

    .searchBox{
      width:calc(100% + 60px);
      margin-left:-30px;
      margin-right:-30px;
      display:flex;
      align-items:center;
      background:#fff;
      border-radius:999px;
      padding:0 12px 0 22px;
      min-height:58px;
      box-shadow:0 2px 20px rgba(196,150,42,.12);
      border:1px solid rgba(196,150,42,.18);
      gap:10px;
      transition:box-shadow .18s,border-color .18s;
    }

    .searchBox:focus-within{
      box-shadow:0 4px 28px rgba(196,150,42,.16);
      border-color:rgba(196,150,42,.28);
    }

    .searchIcon{
      color:#ddd;
      width:18px;
      min-width:24px;
      height:24px;
      margin-right:-1px;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:color .18s;
    }

    .searchBox:focus-within .searchIcon{ color:var(--dorado); }

    .searchIcon svg{
      width:16px;
      height:16px;
      display:block;
    }

    .input{
      width:100%;
      min-width:0;
      border:0;
      outline:0;
      background:transparent;
      font-size:17px;
      color:#222;
      line-height:1.2;
    }

    .input::placeholder{ color:#ccc; }

    .mobileSearchBtn{ display:none; }

    .locationBtn{
      appearance:none;
      border:none;
      background:transparent;
      color:var(--granate);
      width:42px;
      min-width:42px;
      height:42px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0;
      margin-left:auto;
      margin-right:2px;
      cursor:pointer;
    }

    .locationBtn svg{
      width:21px;
      height:21px;
      display:block;
    }

    .searchBtn{
      background:var(--granate);
      color:#fff;
      border:none;
      border-radius:999px;
      padding:10px 18px;
      font-size:14px;
      font-weight:600;
      cursor:pointer;
      white-space:nowrap;
      transition:all .18s ease;
    }

    .searchBtn:hover{
      opacity:.9;
      transform:translateY(-1px);
    }

    .subTagline{
      margin-top:28px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      font-family:'Raleway','Montserrat',system-ui,sans-serif;
      font-size:15px;
      font-style:normal;
      color:var(--granate);
      letter-spacing:1.2px;
      text-transform:uppercase;
      opacity:.85;
    }

    .rotatingPhraseContent{
      color:var(--dorado);
    }

    .midDot{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:34px;
      height:1px;
      margin:0;
      font-size:0;
      line-height:0;
      color:transparent;
      background:#8A1F2D;
      transform:none;
      flex:0 0 34px;
    }

    .bottomPhraseZone{
      flex:1 1 auto;
      min-height:0;
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    .quickActions{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:86px;
      padding:0 24px;
      margin-top:auto;
      margin-bottom:auto;
    }

    .quickAction{
      appearance:none;
      border:none;
      background:transparent;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:10px;
      cursor:pointer;
      color:#8A1F2D;
      min-width:67px;
    }

    .quickActionIcon{
      width:58px;
      height:58px;
      border-radius:19px;
      border:1px solid rgba(138,31,45,.12);
      background:rgba(255,255,255,.72);
      box-shadow:
        0 10px 24px rgba(138,31,45,.06),
        inset 0 1px 0 rgba(255,255,255,.9);
      display:flex;
      align-items:center;
      justify-content:center;
      backdrop-filter:blur(10px);
      transition:all .18s ease;
    }

    .quickAction:hover .quickActionIcon{
      transform:translateY(-2px);
      border-color:rgba(226,184,76,.35);
      box-shadow:
        0 14px 30px rgba(138,31,45,.09),
        inset 0 1px 0 rgba(255,255,255,.95);
    }

    .quickActionIcon svg{
      width:24px;
      height:24px;
      stroke:#8A1F2D;
      stroke-width:1.8;
      fill:none;
    }

    .quickActionLabel{
      font-family:'Raleway','Montserrat',system-ui,sans-serif;
      font-size:10px;
      font-weight:650;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:#8A1F2D;
      white-space:nowrap;
    }

    .bottomTagline{
      margin:0;
      transform:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      color:var(--dorado);
      font-size:22px;
      font-weight:550;
      letter-spacing:.55px;
      word-spacing:0;
      font-family:'Raleway','Montserrat',system-ui,sans-serif;
      font-style:normal;
      white-space:nowrap;
    }

    #bhFooter{
      display:none !important;
    }

    @media (max-width:720px){
      :root{ --headerH:56px; }

      .desktopSearchBtn{
        display:none;
      }

      .mobileSearchBtn{
        display:block;
        width:calc(100% + 40px);
        margin:22px -20px 0;
        min-height:52px;
        border-radius:3.5px;
        padding:8px 14px;
        font-size:18px;
        font-family:'Raleway','Montserrat',system-ui,sans-serif;
        font-weight:600;
        letter-spacing:.17em;
        text-transform:none;
      }

      .wrap{
        height:calc(100vh - var(--headerH,56px));
        height:calc(100dvh - var(--headerH,56px));
        grid-template-rows:minmax(0,1fr);
      }

      .main{ padding-bottom:0; }

      .searchBlock{
        padding:clamp(10px,2.2vh,22px) 18px 0;
        min-height:100%;
      }

      .tagline{
        margin-top:34px;
        margin-bottom:38px;
        max-width:100%;
        display:flex;
        justify-content:center;
        text-align:center;
        white-space:nowrap;
        transform:translateY(10px);
        text-transform:none;
        font-size:22px;
        letter-spacing:.55px;
        word-spacing:0;
      }

      .modeRow{
        grid-template-columns:repeat(2,minmax(0,1fr));
        width:calc(100% + 40px);
        margin-left:-20px;
        margin-right:-20px;
        max-width:none;
        column-gap:15px;
        row-gap:20px;
        border-bottom:0;
        margin-top:15px;
        margin-bottom:22px;
      }

      .pill{
        min-width:0;
        min-height:54px;
        padding:0 4px;
        background:#fff;
        color:#6b6b6b;
        font-size:16.5px;
        font-weight:500;
        letter-spacing:.17em;
        font-family:Raleway,Montserrat,system-ui,sans-serif;
        text-transform:uppercase;
        border:1px solid #e7dfd2;
        border-radius:3.5px;
        margin-bottom:0;
        overflow:hidden;
        text-overflow:ellipsis;
        box-shadow:0 1px 6px rgba(0,0,0,.04);
        transition:all .18s ease;
      }

      .pill:hover{
        color:var(--granate);
        border-color:rgba(140,31,45,.35);
        box-shadow:0 2px 10px rgba(140,31,45,.08);
      }

      .pill:has(input:checked){
        background:rgba(196,150,42,.055);
        color:var(--granate);
        font-weight:650;
        border-color:rgba(196,150,42,.55);
        box-shadow:
          inset 0 0 0 1px rgba(196,150,42,.18),
          0 3px 10px rgba(196,150,42,.08);
      }

      .pill:has(input:checked) span{
        color:var(--granate);
      }

      .searchWrap{
        width:100%;
        max-width:420px;
      }

      .searchBox{
        width:calc(100% + 40px);
        margin-left:-20px;
        margin-right:-20px;
        min-height:54px;
        padding:0 8px 0 12px;
        border-radius:3.5px;
      }

      .input{
        font-size:15px;
        min-width:0;
      }

      .locationBtn{
        width:34px;
        min-width:34px;
        height:34px;
        margin-left:2px;
        margin-right:0;
      }

      .locationBtn svg{
        width:19px;
        height:19px;
      }

      .subTagline{
        font-size:11px;
        margin-top:24px;
        text-align:center;
        white-space:nowrap;
        gap:12px;
      }

      .midDot{
        width:22px;
        flex-basis:22px;
      }

      .quickActions{
        gap:10px;
        padding:0 10px;
      }

      .quickAction{
        min-width:58px;
        gap:8px;
      }

      .quickActionIcon{
        width:52px;
        height:52px;
        border-radius:18px;
      }

      .quickActionIcon svg{
        width:22px;
        height:22px;
      }

      .quickActionLabel{
        font-size:9px;
        letter-spacing:.08em;
      }
    }

    @media (max-width:420px){
      :root{ --headerH:54px; }

      .tagline{
        font-size:20px;
        letter-spacing:.55px;
        word-spacing:0;
      }

      .pill{
        font-size:13.5px;
        letter-spacing:.17em;
      }
    }
  </style>
</head>

<body>
  <div id="bhHeader">
    <header class="topbar">
      <div class="topbarInner">
        <div class="leftGroup">
          <button type="button" class="menuBtn" id="navMenuBtn" aria-label="Más opciones">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" aria-hidden="true">
              <path d="M4 7h16"></path>
              <path d="M4 12h16"></path>
              <path d="M4 17h16"></path>
            </svg>
          </button>
        </div>

        <a class="brand" href="./" aria-label="Ir a inicio">
          <span class="brandText">HOMYO</span>
        </a>

        <div class="rightGroup" aria-label="Acciones">
          <a href="#" id="navLogin" class="navActionLink">
            <span class="navActionIcon navActionIconSvg" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="8" r="4"></circle>
                <path d="M4.5 19.5c2.1-3.7 12.9-3.7 15 0"></path>
                <circle cx="18.1" cy="18.1" r="3.1"></circle>
                <path d="M16.9 16.9l2.4 2.4"></path>
              </svg>
            </span>
            <span class="navActionText">Cuenta</span>
          </a>

          <div id="navUserArea" class="navUserArea bh-hidden" aria-label="Usuario conectado">
            <button type="button" id="navAccountBtn" class="navUserBtn">
              <span id="navUserAvatar" class="navAvatar navAvatarSvg" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <circle cx="12" cy="8" r="4"></circle>
                  <path d="M4.5 19.5c2.1-3.7 12.9-3.7 15 0"></path>
                </svg>
              </span>
              <span id="navUserLabel" class="navUserLabel">Cuenta</span>
            </button>

            <button type="button" id="navLogoutBtn" class="navLogoutBtn">Cerrar sesión</button>
          </div>
        </div>
      </div>
    </header>
  </div>
  <div id="bhFooter"></div>

  <div class="wrap">
    <main class="main">
      <div class="searchBlock">
        <div class="tagline">
          <img src="./imagenmapa.png" alt="Mapa" class="heroMapImage" />
        </div>

        <div class="searchInner">
          <div class="modeRow" aria-label="Tipo de búsqueda">
            <label class="pill"><input type="radio" name="mode" value="buy" checked /><span>Comprar</span></label>
            <label class="pill"><input type="radio" name="mode" value="new_build" /><span>Obra nueva</span></label>
            <label class="pill"><input type="radio" name="mode" value="rent" /><span>Alquilar</span></label>
            <label class="pill"><input type="radio" name="mode" value="room" /><span>Habitacion</span></label>
          </div>

          <div class="searchWrap">
            <form id="form" autocomplete="off">
              <div class="searchBox">
                <span class="searchIcon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="7"></circle>
                    <path d="M21 21l-4.3-4.3"></path>
                  </svg>
                </span>

                <input id="q" class="input" placeholder="Ciudad, zona, código postal..." aria-label="Buscar ciudad o zona" enterkeyhint="search" />

                <button type="button" class="locationBtn" id="locationBtn" aria-label="Usar mi ubicación">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1 1 18 0z"></path>
                    <circle cx="12" cy="10" r="3"></circle>
                  </svg>
                </button>

                <button class="searchBtn desktopSearchBtn" type="submit">Buscar</button>
              </div>

              <button class="searchBtn mobileSearchBtn" type="submit">Buscar</button>
            </form>
          </div>

          <div class="subTagline" id="rotatingPhrase">
            <span class="midDot">·</span>
            <span class="rotatingPhraseContent" id="rotatingPhraseText">Metros de vivienda útiles</span>
            <span class="midDot">·</span>
          </div>
        </div>

        <div class="bottomPhraseZone">
          <div class="quickActions">
            <button class="quickAction" type="button">
              <div class="quickActionIcon">
                <svg viewBox="0 0 24 24">
                  <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1 1 18 0z"></path>
                  <circle cx="12" cy="10" r="3"></circle>
                </svg>
              </div>
              <div class="quickActionLabel">Ubicación</div>
            </button>

            <button class="quickAction" type="button">
              <div class="quickActionIcon">
                <svg viewBox="0 0 24 24">
                  <path d="M4 6h16"></path>
                  <path d="M4 12h10"></path>
                  <path d="M4 18h16"></path>

  <script>
    const phrases = [
      "Solo anuncios de profesionales",
      "Metros de vivienda útiles",
      "Precio por metro cuadrado útil",
      "Sin anuncios duplicados",
      "Sin anuncios de particulares",
      "Filtros por fecha de construcción",
      "Posición del sol durante el año",
      "Plano siempre disponible"
    ];

    const rotatingPhraseText = document.getElementById("rotatingPhraseText");
    let phraseIndex = 0;

    if (rotatingPhraseText) {
      rotatingPhraseText.textContent = phrases[0];
      setInterval(() => {
        phraseIndex = (phraseIndex + 1) % phrases.length;
        rotatingPhraseText.textContent = phrases[phraseIndex];
      }, 6000);
    }

    function getSelectedMode() {
      const el = document.querySelector('input[name="mode"]:checked');
      return el ? el.value : "buy";
    }

    function go(city) {
      const cleanCity = String(city || "").trim();
      if (!cleanCity) return;

      const params = new URLSearchParams();
      params.set("city", cleanCity);
      params.set("mode", getSelectedMode());

      window.location.href = "./map.html?" + params.toString();
    }

    window.BH_goToMap = go;

    const form = document.getElementById("form");
    const q = document.getElementById("q");

    function updateSearchPlaceholder() {
      if (!q) return;
      q.placeholder = window.matchMedia("(max-width:720px)").matches
        ? "Ciudad, Barrio, Código postal..."
        : "Ciudad, zona, código postal...";
    }

    updateSearchPlaceholder();
    window.addEventListener("resize", updateSearchPlaceholder);

    const locationBtn = document.getElementById("locationBtn");

    async function fillCurrentAreaFromLocation(position) {
      try {
        const lat = position.coords.latitude;
        const lon = position.coords.longitude;

        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`);
        const data = await response.json();

        const address = data.address || {};
        const area =
          address.suburb ||
          address.neighbourhood ||
          address.city_district ||
          address.quarter ||
          address.town ||
          address.village ||
          address.city ||
          "";

        if (area && q) q.value = area;
      } catch (err) {
        console.error(err);
      }
    }

    if (locationBtn && navigator.geolocation) {
      locationBtn.addEventListener("click", () => {
        navigator.geolocation.getCurrentPosition(fillCurrentAreaFromLocation, console.error, {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 300000
        });
      });
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      go(q.value);
    });

    window.addEventListener("bh:mini-search", (ev) => {
      const city = ev?.detail?.query || "";
      if (q) q.value = city;
      go(city);
    });
  </script>
</body>
