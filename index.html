<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Buscar Hogar</title>

    <link rel="stylesheet" href="./bh-shared.css" />

    <style>
      /* CSS específico de index (solo lo que no es común) */

      body{
        background:#FFFFFF;
      }

      .wrap{
        min-height: calc(100% - 54px);
        display:grid;
        grid-template-rows: 1fr auto;
      }

      .main{
        display:flex;
        align-items:center;
        justify-content:center;
        padding: 22px 16px 22px;
        box-sizing: border-box;
      }

      .center{
        width:min(980px, 100%);
        display:grid;
        justify-items:center;
        text-align:center;
      }

      .headline{
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, Segoe UI, Roboto, sans-serif;
        font-weight: 300;
        letter-spacing: -0.6px;
        font-size: 29px;
        line-height: 1.05;
        color: #111;
        margin: 0 0 14px 0;
      }

      .modeRow{
        width: min(720px, 100%);
        display:flex;
        justify-content:center;
        gap:12px;
        flex-wrap:wrap;
        margin-bottom: 12px;
      }

      .pill{
        position: relative;
        display:inline-flex;
        align-items:center;
        gap:10px;
        border: 2px solid #5BA8D8;
        background:#fff;
        padding: 10px 14px;
        box-shadow: 0 1px 6px rgba(0,0,0,0.05);
        border-radius: 999px;
        cursor:pointer;
        user-select:none;
        font-size: 16px;
        color:#111;
      }

      .pill input{
        position:absolute;
        opacity:0;
        pointer-events:none;
      }

      .dot{
        width: 18px;
        height: 18px;
        border-radius: 999px;
        border: 1px solid #6b7280;
        display:grid;
        place-items:center;
        flex: 0 0 auto;
      }

      .dot::after{
        content:"";
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: transparent;
      }

      .pill input:checked + .dot{
        border-color: var(--btn);
      }

      .pill input:checked + .dot::after{
        background: var(--btn);
      }

      .searchBox{
        width: min(720px, 100%);
        border: 2px solid #5BA8D8;
        border-radius: 999px;
        padding: 10px;
        display:flex;
        align-items:center;
        gap: 10px;
        background:#fff;
        box-sizing: border-box;
        box-shadow: none;
      }

      .searchIcon{
        width: 20px;
        height: 20px;
        color: #9aa0a6;
        flex: 0 0 auto;
        margin-left: 2px;
      }

      .input{
        border:0;
        outline:0;
        font-size: 17px;
        flex: 1 1 auto;
        padding: 11px 4px;
        background: transparent;
        color:#202124;
      }

      .input::placeholder{
        color:#5f6368;
      }

      .btn{
        border:0;
        background: #F6931E;
        color: #fff;
        width: 44px;
        height: 44px;
        border-radius: 999px;
        cursor: pointer;
        font-size: 0;
        font-weight: 650;
        margin-right: 0;
        display:flex;
        align-items:center;
        justify-content:center;
        flex: 0 0 44px;
      }

      .btn::before{
        content:"";
        width: 18px;
        height: 18px;
        display:block;
        background-repeat:no-repeat;
        background-position:center;
        background-size:18px 18px;
        background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='7'/><path d='M21 21l-4.3-4.3'/></svg>");
      }

      .btn:active{ transform: translateY(1px); }

      .subTag{
        width: min(720px, 100%);
        font-size: 14px;
        color: var(--muted);
        text-align:center;
        margin-top: 10px;
      }

      @media (max-width: 720px){
        .main{
          padding: 30px 16px 20px;
          align-items: flex-start;
        }

        .center{
          width: min(100%, 560px);
        }

        .headline{
          font-size: 22px;
          line-height: 1.15;
          margin-bottom: 18px;
        }

        .modeRow{
          width: 100%;
          gap: 8px;
          margin-bottom: 16px;
          justify-content: center;
        }

        .pill{
          font-size: 13px;
          padding: 9px 14px;
        }

        .searchBox{
          width: 100%;
          flex-direction: row;
          align-items: center;
          border-radius: 999px;
          padding: 7px 10px 7px 12px;
          gap: 8px;
        }

        .searchIcon{
          display: none;
        }

        .input{
          font-size: 16px;
          padding: 10px 4px;
          width: auto;
          box-sizing: border-box;
        }

        .btn{
          width: 42px;
          min-width: 42px;
          height: 42px;
          margin: 0;
          padding: 0;
          font-size: 0;
        }

        .subTag{
          width: 100%;
          font-size: 13px;
          margin-top: 14px;
        }
      }
    </style>
  </head>

  <body>
    <div id="bhHeader"></div>

    <div class="wrap">
      <main class="main">
        <div class="center">
          <h1 class="headline">Anuncios publicados únicamente por profesionales inmobiliarios</h1>

          <div class="modeRow" aria-label="Tipo de búsqueda">
            <label class="pill">
              <input type="radio" name="mode" value="buy" checked />
              <span>Comprar</span>
            </label>

            <label class="pill">
              <input type="radio" name="mode" value="rent" />
              <span>Alquilar</span>
            </label>

            <label class="pill">
              <input type="radio" name="mode" value="room" />
              <span>Habitación</span>
            </label>

            <label class="pill">
              <input type="radio" name="mode" value="new_build" />
              <span>Obra nueva</span>
            </label>
          </div>

          <form id="form" class="searchBox" autocomplete="off">
            <svg class="searchIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <circle cx="11" cy="11" r="7"></circle>
              <path d="M21 21l-4.3-4.3"></path>
            </svg>

            <input
              id="q"
              class="input"
              placeholder="Escribe una ciudad o zona (ej. Murcia)"
              aria-label="Buscar ciudad o zona"
            />

            <button class="btn" type="submit" aria-label="Buscar"></button>
          </form>

          <div class="subTag">Una vivienda, un anuncio.</div>
        </div>
      </main>

      <div id="bhFooter"></div>
    </div>

    <script type="module">
      import { initLayout } from "./bh-layout.js?v=20260309b";
      import { initAuth } from "./bh-auth.js?v=20260309b";

      initLayout({ showMiniSearch: false });
      initAuth();

      function getSelectedMode(){
        const el = document.querySelector('input[name="mode"]:checked');
        return el ? el.value : "buy";
      }

      // Lo usa también el miniSearch del header (si existe)
      window.BH_goToMap = function(city){
        const params = new URLSearchParams();
        params.set("city", city);
        params.set("mode", getSelectedMode());
        window.location.href = "./map.html?" + params.toString();
      };

      const form = document.getElementById("form");
      const q = document.getElementById("q");

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const city = (q.value || "").trim();
        if(!city) return;
        window.BH_goToMap(city);
      });
    </script>
  </body>
</html>
