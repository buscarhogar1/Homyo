<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Homyo — Solo anuncios de profesionales</title>

    <link rel="stylesheet" href="./bh-shared.css?v=4" />
    <link rel="stylesheet" href="./bh-header-overrides.css?v=4" />

    <style>
      :root{
        --bg:#FFFDFA;
        --granate:#8C1F2D;
        --dorado:#C4962A;
        --muted:#6b7280;
        --terra:#FFFDFA;
      }

      *{
        box-sizing:border-box;
      }

      html,body{
        width:100%;
        height:100%;
        min-height:100%;
        margin:0;
        background:var(--bg);
        color:#111;
        font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
        overflow-x:hidden;
      }

      body{
        min-height:100vh;
      }

      .wrap{
        min-height:calc(100vh - 84px);
        display:grid;
        grid-template-rows:1fr auto;
        overflow-x:hidden;
      }

      .main{
        display:flex;
        flex-direction:column;
        align-items:stretch;
        padding-bottom:56px;
        overflow-x:hidden;
      }

      .searchBlock{
        display:flex;
        flex-direction:column;
        align-items:center;
        width:100%;
        padding:28px 20px 0;
      }

      .tagline{
        margin-top:33px;
        display:inline-flex;
        align-items:center;
        gap:14px;
        color:#555;
        font-size:20px;
        font-weight:500;
        letter-spacing:2.4px;
        word-spacing:6px;
        text-transform:uppercase;
        margin-bottom:52px;
        font-family:Georgia,serif;
        font-style:italic;
      }

      .tagline::before,
      .tagline::after{
        content:"";
        height:1px;
        width:36px;
        background:linear-gradient(to right,transparent,var(--dorado));
        flex-shrink:0;
      }

      .tagline::after{
        background:linear-gradient(to left,transparent,var(--dorado));
      }

      .modeRow{
        display:grid;
        grid-template-columns:repeat(4,minmax(0,1fr));
        width:min(680px,100%);
        border-bottom:1.5px solid #e8e0d5;
        margin-bottom:37px;
      }

      .pill{
        position:relative;
        display:flex;
        align-items:center;
        justify-content:center;
        min-height:44px;
        padding:0 8px;
        background:transparent;
        color:#c0b8b0;
        font-size:16px;
        font-weight:500;
        letter-spacing:1px;
        text-transform:uppercase;
        cursor:pointer;
        user-select:none;
        border-bottom:2px solid transparent;
        margin-bottom:-1.5px;
        white-space:nowrap;
        transition:color .15s;
      }

      .pill input{
        position:absolute;
        inset:0;
        opacity:0;
        pointer-events:none;
      }

      .pill span{
        color:inherit;
      }

      .pill:hover{
        color:var(--granate);
      }

      .pill:has(input:checked){
        color:var(--granate);
        font-weight:700;
        border-bottom-color:var(--granate);
      }

      .searchWrap{
        width:min(680px,100%);
      }

      .searchBox{
        width:100%;
        display:flex;
        align-items:center;
        background:#fff;
        border-radius:999px;
        padding:0 22px;
        min-height:58px;
        box-shadow:0 2px 20px rgba(196,150,42,.12);
        border:1px solid rgba(196,150,42,.18);
        transition:box-shadow .18s,border-color .18s;
      }

      .searchBox:focus-within{
        box-shadow:0 4px 28px rgba(196,150,42,.16);
        border-color:rgba(196,150,42,.28);
      }

      .searchIcon{
        color:#ddd;
        width:18px;
        min-width:18px;
        height:18px;
        margin-right:12px;
        display:flex;
        align-items:center;
        justify-content:center;
        transition:color .18s;
      }

      .searchBox:focus-within .searchIcon{
        color:#555;
      }

      .searchIcon svg{
        width:18px;
        height:18px;
        display:block;
      }

      .input{
        width:100%;
        border:0;
        outline:0;
        background:transparent;
        font-size:17px;
        color:#222;
        line-height:1.2;
      }

      .input::placeholder{
        color:#ccc;
      }

      .subTagline{
        margin-top:28px;
        font-family:Georgia,serif;
        font-size:15px;
        font-style:italic;
        color:var(--dorado);
        letter-spacing:.3px;
        opacity:.85;
      }

      .midDot{
        display:inline-block;
        margin:0 6px;
      }

      .wordGap{
        display:inline-block;
        width:6px;
      }

      .carouselCard{
        width:min(680px,calc(100% - 40px));
        margin:auto auto 20px;
        align-self:center;
        background:#faf7f2;
        border-radius:18px;
        box-shadow:0 2px 18px rgba(140,31,45,.06),0 1px 4px rgba(0,0,0,.04);
        border:1px solid rgba(196,150,42,.12);
        overflow:hidden;
        padding:33px 0;
      }

      .carouselTrack{
        display:flex;
        width:max-content;
        animation:carouselScroll 32s linear infinite;
        will-change:transform;
      }

      .carouselTrack:hover{
        animation-play-state:paused;
      }

      .carouselItem{
        display:inline-flex;
        align-items:center;
        gap:18px;
        padding:0 36px;
        white-space:nowrap;
        font-family:Georgia,"Times New Roman",serif;
        font-size:16px;
        font-style:italic;
        color:#555;
        letter-spacing:.2px;
      }

      .carouselDot{
        width:5px;
        height:5px;
        border-radius:50%;
        background:var(--dorado);
        opacity:.55;
        flex-shrink:0;
      }

      @keyframes carouselScroll{
        0%{ transform:translateX(0); }
        100%{ transform:translateX(-50%); }
      }

      @media (max-width:720px){
        .wrap{
          min-height:calc(100vh - 69px);
          grid-template-rows:1fr auto;
        }

        .main{
          padding-bottom:24px;
        }

        .searchBlock{
          padding:22px 18px 0;
        }

        .tagline{
          margin-top:24px;
          margin-bottom:38px;
          max-width:100%;
          display:flex;
          justify-content:center;
          text-align:center;
          font-size:13px;
          line-height:1.5;
          letter-spacing:1.4px;
          word-spacing:3px;
          white-space:normal;
        }

        .tagline::before,
        .tagline::after{
          width:24px;
        }

        .modeRow{
          grid-template-columns:repeat(2,minmax(0,1fr));
          width:100%;
          max-width:420px;
          margin-bottom:31px;
        }

        .pill{
          min-width:0;
          min-height:42px;
          padding:0 8px;
          font-size:12.5px;
          letter-spacing:.55px;
          overflow:hidden;
          text-overflow:ellipsis;
        }

        .searchWrap{
          width:100%;
          max-width:420px;
        }

        .searchBox{
          min-height:54px;
          padding:0 16px;
        }

        .input{
          font-size:15px;
          min-width:0;
        }

        .subTagline{
          font-size:15px;
          margin-top:24px;
          text-align:center;
          white-space:nowrap;
        }

        .carouselCard{
          width:calc(100% - 36px);
          max-width:420px;
          margin:auto auto 20px;
          padding:30px 0;
        }

        .carouselItem{
          font-size:15px;
          padding:0 28px;
          gap:14px;
        }
      }

      @media (max-width:420px){
        .tagline{
          font-size:12px;
          letter-spacing:1.1px;
        }

        .pill{
          font-size:11.5px;
          letter-spacing:.35px;
        }
      }
    </style>
  </head>

  <body>
    <div id="bhHeader"></div>

    <div class="wrap">
      <main class="main">
        <div class="searchBlock">
          <div class="tagline">Solo anuncios de profesionales</div>

          <div class="modeRow" aria-label="Tipo de búsqueda">
            <label class="pill">
              <input type="radio" name="mode" value="buy" checked />
              <span>Comprar</span>
            </label>
            <label class="pill">
              <input type="radio" name="mode" value="new_build" />
              <span>Obra nueva</span>
            </label>
            <label class="pill">
              <input type="radio" name="mode" value="rent" />
              <span>Alquilar</span>
            </label>
            <label class="pill">
              <input type="radio" name="mode" value="room" />
              <span>Habitación</span>
            </label>
          </div>

          <div class="searchWrap">
            <form id="form" class="searchBox" autocomplete="off">
              <span class="searchIcon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="11" cy="11" r="7"></circle>
                  <path d="M21 21l-4.3-4.3"></path>
                </svg>
              </span>
              <input
                id="q"
                class="input"
                placeholder="Ciudad, zona o código postal..."
                aria-label="Buscar ciudad o zona"
                enterkeyhint="search"
              />
            </form>
          </div>

          <div class="subTagline">Una<span class="wordGap"></span>vivienda <span class="midDot">·</span> Un<span class="wordGap"></span>anuncio</div>
        </div>

        <div class="carouselCard" aria-label="Valores de la plataforma">
          <div class="carouselTrack" id="carouselTrack"></div>
        </div>
      </main>

      <div id="bhFooter"></div>
    </div>

    <script type="module">
      import { initLayout } from "./bh-layout.js?v=20260309b";
      import { initAuth } from "./bh-auth.js?v=20260309b";

      initLayout({ showMiniSearch: false });
      initAuth();

      const phrases = [
        "Metros de vivienda útiles",
        "Sin anuncios duplicados",
        "Sin anuncios de particulares",
        "Filtros por fecha de construcción",
        "Posición del sol durante el año",
        "Plano siempre disponible"
      ];

      const track = document.getElementById("carouselTrack");
      if (track) {
        const buildItems = () => phrases.map(text => `
          <span class="carouselItem">
            <span class="carouselDot" aria-hidden="true"></span>
            ${text}
          </span>
        `).join("");

        track.innerHTML = buildItems() + buildItems();

        requestAnimationFrame(() => {
          const halfW = track.scrollWidth / 2;
          const duration = Math.round(halfW / 38);
          track.style.animationDuration = duration + "s";
        });
      }

      function getSelectedMode() {
        const el = document.querySelector('input[name="mode"]:checked');
        return el ? el.value : "buy";
      }

      window.BH_goToMap = function(city) {
        const params = new URLSearchParams();
        params.set("city", city);
        params.set("mode", getSelectedMode());
        window.location.href = "./map.html?" + params.toString();
      };

      const form = document.getElementById("form");
      const q = document.getElementById("q");

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const city = (q.value || "").trim();
        if (!city) return;
        window.BH_goToMap(city);
      });
    </script>
  </body>
</html>
