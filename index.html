<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Buscar Hogar</title>

    <link rel="stylesheet" href="./bh-shared.css" />

    <style>
      body{
        background:#FFFFFF;
      }

      .wrap{
        min-height: calc(100% - 54px);
        display:grid;
        grid-template-rows: 1fr auto;
      }

      .main{
        display:flex;
        align-items:flex-start;
        justify-content:center;
        padding: 0 16px 12px;
        box-sizing: border-box;
      }

      .center{
        width:min(1180px, 100%);
        display:grid;
        justify-items:center;
        text-align:center;
      }

      /* El espacio grande venía del propio lienzo de la PNG.
         Aquí la recortamos visualmente sin tocar el archivo. */
      .heroWrap{
        width:100%;
        margin:7px 0 0;
      }

      .heroCrop{
        width:100%;
        overflow:hidden;
        line-height:0;
      }

      .heroImage{
        width:100%;
        height:auto;
        display:block;
        margin-top:-6%;
        margin-bottom:-6%;
      }

      .headline{
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, Segoe UI, Roboto, sans-serif;
        font-weight:700;
        letter-spacing:-0.4px;
        font-size:24px;
        line-height:1.08;
        color:#111;
        margin:0;
      }

      .controlsWrap{
        width:min(720px,100%);
        margin-top:8px;
        box-sizing:border-box;
      }

      .modeRow{
        width:100%;
        display:flex;
        justify-content:center;
        gap:8px;
        flex-wrap:wrap;
        margin-bottom:8px;
      }

      .pill{
        position:relative;
        display:inline-flex;
        align-items:center;
        justify-content:center;
        min-height:42px;
        padding:10px 14px;
        border-radius:6px;
        background:#fff;
        color:#111;
        font-size:14px;
        line-height:1;
        cursor:pointer;
        user-select:none;
        box-sizing:border-box;
      }

      .pill input{
        position:absolute;
        inset:0;
        opacity:0;
        pointer-events:none;
      }

      .pill span{
        position:relative;
        z-index:1;
      }

      .pill:has(input:checked){
        background:#ffe0bf;
      }

      .searchBox{
        width:100%;
        display:flex;
        align-items:center;
        gap:8px;
        background:#F6931E;
        border-radius:18px;
        padding:10px;
        box-sizing:border-box;
      }

      .input{
        border:0;
        outline:0;
        font-size:14px;
        line-height:1.2;
        flex:1 1 auto;
        min-width:0;
        padding:12px 14px;
        background:#fff;
        color:#222;
        border-radius:10px;
      }

      .input::placeholder{
        color:#7a7a7a;
      }

      .btn{
        border:0;
        background:#F6931E;
        color:#fff;
        width:34px;
        min-width:34px;
        height:34px;
        border-radius:8px;
        cursor:pointer;
        font-size:0;
        display:flex;
        align-items:center;
        justify-content:center;
        padding:0;
      }

      .btn::before{
        content:"";
        width:16px;
        height:16px;
        display:block;
        background-repeat:no-repeat;
        background-position:center;
        background-size:16px 16px;
        background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%239e2f0d' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='7'/><path d='M21 21l-4.3-4.3'/></svg>");
      }

      .btn:active{
        transform:translateY(1px);
      }

      .subTag{
        width:min(720px,100%);
        font-size:13px;
        color:#666;
        text-align:center;
        margin-top:8px;
      }

      @media (max-width: 720px){
        .main{
          padding:0 16px 10px;
        }

        .center{
          width:min(100%, 560px);
        }

        .heroImage{
          margin-top:-8%;
          margin-bottom:-8%;
        }

        .headline{
          font-size:21px;
          line-height:1.1;
        }

        .controlsWrap{
          width:100%;
          margin-top:8px;
        }

        .modeRow{
          gap:8px;
          margin-bottom:8px;
        }

        .pill{
          min-height:40px;
          font-size:13px;
          padding:10px 12px;
          border-radius:6px;
        }

        .searchBox{
          padding:10px;
          gap:6px;
          border-radius:16px;
        }

        .input{
          font-size:13px;
          padding:10px 12px;
          border-radius:8px;
        }

        .btn{
          width:32px;
          min-width:32px;
          height:32px;
          border-radius:8px;
        }

        .btn::before{
          width:15px;
          height:15px;
          background-size:15px 15px;
        }

        .subTag{
          width:100%;
          font-size:12px;
          margin-top:8px;
        }
      }
    </style>
  </head>

  <body>
    <div id="bhHeader"></div>

    <div class="wrap">
      <main class="main">
        <div class="center">
          <div class="heroWrap">
            <div class="heroCrop">
              <img
                src="/buscarhogardemo/index-hero.png?v=3"
                alt="Ilustración de varios tipos de viviendas"
                class="heroImage"
              />
            </div>
          </div>

          <h1 class="headline">Anuncios publicados únicamente por profesionales inmobiliarios</h1>

          <div class="controlsWrap">
            <div class="modeRow" aria-label="Tipo de búsqueda">
              <label class="pill">
                <input type="radio" name="mode" value="buy" checked />
                <span>Comprar</span>
              </label>

              <label class="pill">
                <input type="radio" name="mode" value="rent" />
                <span>Alquilar</span>
              </label>

              <label class="pill">
                <input type="radio" name="mode" value="room" />
                <span>Habitación</span>
              </label>

              <label class="pill">
                <input type="radio" name="mode" value="new_build" />
                <span>Obra nueva</span>
              </label>
            </div>

            <form id="form" class="searchBox" autocomplete="off">
              <input
                id="q"
                class="input"
                placeholder="Escribe una ciudad o zona (ej. Murcia)"
                aria-label="Buscar ciudad o zona"
              />

              <button class="btn" type="submit" aria-label="Buscar"></button>
            </form>
          </div>

          <div class="subTag">Una vivienda, un anuncio.</div>
        </div>
      </main>

      <div id="bhFooter"></div>
    </div>

    <script type="module">
      import { initLayout } from "./bh-layout.js?v=20260309b";
      import { initAuth } from "./bh-auth.js?v=20260309b";

      initLayout({ showMiniSearch: false });
      initAuth();

      function getSelectedMode(){
        const el = document.querySelector('input[name="mode"]:checked');
        return el ? el.value : "buy";
      }

      window.BH_goToMap = function(city){
        const params = new URLSearchParams();
        params.set("city", city);
        params.set("mode", getSelectedMode());
        window.location.href = "./map.html?" + params.toString();
      };

      const form = document.getElementById("form");
      const q = document.getElementById("q");

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const city = (q.value || "").trim();
        if(!city) return;
        window.BH_goToMap(city);
      });
    </script>
  </body>
</html>
