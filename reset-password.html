<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Cambiar contraseña · Buscar Hogar</title>
    <link rel="stylesheet" href="../bh-shared.css" />
    <style>
      .resetWrap{
        min-height:100vh;
        display:grid;
        place-items:center;
        padding:24px 16px;
        box-sizing:border-box;
        background:#fff;
      }

      .resetCard{
        width:min(460px, 100%);
        border:1px solid #e6e7eb;
        border-radius:20px;
        padding:28px 24px;
        box-sizing:border-box;
        background:#fff;
        box-shadow:0 10px 30px rgba(0,0,0,.06);
      }

      .resetBrand{
        font-size:14px;
        color:#6b7280;
        margin-bottom:10px;
      }

      .resetTitle{
        margin:0 0 8px 0;
        font-size:28px;
        line-height:1.1;
        color:#111;
      }

      .resetText{
        margin:0 0 18px 0;
        color:#6b7280;
        font-size:14px;
      }

      .resetMsg{
        margin-top:12px;
        font-size:14px;
        color:#6b7280;
      }

      .resetMsg.ok{
        color:#166534;
      }

      .resetMsg.error{
        color:#b91c1c;
      }

      .resetActions{
        margin-top:16px;
      }

      .resetLink{
        color:#111;
        text-decoration:none;
        border-bottom:1px solid #111;
      }
    </style>
  </head>
  <body>
    <div class="resetWrap">
      <div class="resetCard">
        <div class="resetBrand">Buscar Hogar</div>
        <h1 class="resetTitle">Cambia tu contraseña</h1>
        <p class="resetText">Introduce una nueva contraseña para tu cuenta.</p>

        <input id="newPassword" class="bh-input" type="password" autocomplete="new-password" placeholder="Nueva contraseña (mín. 8)" />
        <button id="savePasswordBtn" type="button" class="bh-btn bh-primary">Guardar nueva contraseña</button>

        <div id="resetMsg" class="resetMsg" role="status" aria-live="polite"></div>

        <div class="resetActions">
          <a class="resetLink" href="../index.html">Volver al inicio</a>
        </div>
      </div>
    </div>

    <script type="module">
      import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

      const SUPABASE_URL = "https://dpusnylssfjnksbieimj.supabase.co";
      const SUPABASE_ANON_KEY = "sb_publishable_tSSgJcWWRfEe2uob7SFYgw_AqcBL7KK";
      const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const newPassword = document.getElementById("newPassword");
      const savePasswordBtn = document.getElementById("savePasswordBtn");
      const resetMsg = document.getElementById("resetMsg");

      function setMsg(text, type = "") {
        resetMsg.textContent = text || "";
        resetMsg.className = "resetMsg" + (type ? " " + type : "");
      }

      savePasswordBtn.addEventListener("click", async () => {
        const password = newPassword.value || "";

        if (password.length < 8) {
          setMsg("La contraseña debe tener al menos 8 caracteres.", "error");
          return;
        }

        try {
          savePasswordBtn.disabled = true;
          setMsg("");

          const { error } = await supabase.auth.updateUser({ password });

          if (error) throw error;

          setMsg("Contraseña actualizada. Ya puedes iniciar sesión.", "ok");
          setTimeout(() => {
            window.location.href = "../index.html";
          }, 1200);
        } catch (e) {
          setMsg("No se pudo actualizar la contraseña. Abre de nuevo el enlace del correo e inténtalo otra vez.", "error");
          console.error(e);
        } finally {
          savePasswordBtn.disabled = false;
        }
      });

      newPassword.addEventListener("keydown", (e) => {
        if (e.key === "Enter") savePasswordBtn.click();
      });
    </script>
  </body>
</html>
