<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Favoritos · Homyo</title>

    <link rel="stylesheet" href="./bh-shared.css?v=20260504" />
    <link rel="stylesheet" href="./bh-header-overrides.css?v=20260504" />

    <style>
      :root{
        --bg:#FFFDFA;
        --granate:#8C1F2D;
        --dorado:#C4962A;
        --doradoSoft:#E2B84C;
        --ink:#1d1a17;
        --ink2:#4a4640;
        --muted:#8a857d;
        --line:#ece6db;
        --lineSoft:#f3ede2;
        --card:#FFFFFF;
        --cardWarm:#fbf5e9;
        --good:#1f7a4c;
      }

      *{ box-sizing:border-box; }

      body{
        background:var(--bg);
        color:var(--ink);
        font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      }

      .pageWrap{
        width:min(1120px,100%);
        margin:0 auto;
        padding:40px 24px 96px;
      }

      /* ===== Breadcrumb ===== */
      .crumbs{
        display:flex;
        align-items:center;
        gap:10px;
        font-family:'Raleway',sans-serif;
        font-size:11px;
        letter-spacing:.28em;
        text-transform:uppercase;
        color:var(--muted);
        margin-bottom:24px;
      }

      .crumbs a{
        color:var(--muted);
        text-decoration:none;
      }

      .crumbs a:hover{
        color:var(--granate);
      }

      .crumbs .sep{
        color:var(--doradoSoft);
      }

      .crumbs .current{
        color:var(--granate);
      }

      /* ===== Page header ===== */
      .pageHeader{
        display:grid;
        grid-template-columns:1fr auto;
        align-items:end;
        gap:24px;
        padding-bottom:28px;
        margin-bottom:36px;
        border-bottom:1px solid var(--line);
      }

      .pageKicker{
        font-family:'Raleway',sans-serif;
        font-size:12px;
        font-weight:600;
        letter-spacing:.32em;
        text-transform:uppercase;
        color:var(--dorado);
        margin:0 0 14px;
      }

      .pageTitle{
        margin:0;
        font-family:'Raleway',sans-serif;
        font-size:56px;
        line-height:1;
        letter-spacing:-1.2px;
        font-weight:300;
        color:var(--granate);
      }

      .pageTitle strong{ font-weight:600; }

      .pageSubtitle{
        margin:14px 0 0;
        font-size:16px;
        color:var(--ink2);
        max-width:560px;
        line-height:1.5;
      }

      .headerActions{
        display:flex;
        gap:10px;
        align-items:center;
      }

      .pillBtn{
        appearance:none;
        border:1px solid var(--line);
        background:#fff;
        color:var(--ink2);
        font-family:'Raleway',sans-serif;
        font-size:11px;
        font-weight:600;
        letter-spacing:.2em;
        text-transform:uppercase;
        padding:11px 18px;
        border-radius:999px;
        cursor:pointer;
        display:inline-flex;
        align-items:center;
        gap:8px;
        transition:all .18s ease;
      }

      .pillBtn:hover{
        border-color:var(--granate);
        color:var(--granate);
      }

      .pillBtn.primary{
        background:var(--granate);
        color:#fff;
        border-color:var(--granate);
      }

      .pillBtn.primary:hover{
        background:#711824;
      }

      .pillBtn svg{
        width:14px;
        height:14px;
      }

      /* ===== Toolbar ===== */
      .toolbar{
        display:flex;
        justify-content:space-between;
        align-items:center;
        gap:16px;
        margin-bottom:24px;
        flex-wrap:wrap;
      }

      .toolbarLeft{
        display:flex;
        gap:6px;
        flex-wrap:wrap;
      }

      .tabBtn{
        appearance:none;
        border:none;
        background:transparent;
        font-family:'Raleway',sans-serif;
        font-size:13px;
        font-weight:500;
        letter-spacing:.1em;
        text-transform:uppercase;
        color:var(--muted);
        padding:8px 14px;
        cursor:pointer;
        border-bottom:2px solid transparent;
        transition:color .18s ease, border-color .18s ease;
      }

      .tabBtn:hover{
        color:var(--ink);
      }

      .tabBtn.active{
        color:var(--granate);
        border-bottom-color:var(--granate);
      }

      .tabBtn .count{
        color:var(--dorado);
        margin-left:6px;
        font-size:11px;
      }

      .sortWrap{
        display:flex;
        align-items:center;
        gap:8px;
        font-size:13px;
        color:var(--muted);
      }

      .sortSelect{
        appearance:none;
        border:1px solid var(--line);
        background:#fff;
        padding:8px 32px 8px 12px;
        font-size:13px;
        font-family:inherit;
        color:var(--ink);
        border-radius:999px;
        cursor:pointer;
        background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12' fill='none' stroke='%238C1F2D' stroke-width='1.6' stroke-linecap='round'><path d='m3 5 3 3 3-3'/></svg>");
        background-repeat:no-repeat;
        background-position:right 10px center;
        background-size:12px;
      }

      /* ===== Grid ===== */
      .favGrid{
        display:grid;
        grid-template-columns:repeat(3, minmax(0,1fr));
        gap:22px;
      }

      .favCard{
        background:var(--card);
        border:1px solid var(--line);
        border-radius:4px;
        overflow:hidden;
        text-decoration:none;
        color:inherit;
        display:flex;
        flex-direction:column;
        transition:all .22s ease;
        position:relative;
      }

      .favCard:hover{
        border-color:rgba(140,31,45,.22);
        box-shadow:0 14px 28px rgba(140,31,45,.07);
        transform:translateY(-2px);
      }

      .favMedia{
        position:relative;
        aspect-ratio: 4 / 3;
        background:linear-gradient(135deg, var(--cardWarm) 0%, #f6ead2 100%);
        overflow:hidden;
      }

      .favMedia .placeholder{
        position:absolute;
        inset:0;
        display:grid;
        place-items:center;
        color:var(--dorado);
        opacity:.45;
      }

      .favMedia .placeholder svg{
        width:54px;
        height:54px;
      }

      .favBadge{
        position:absolute;
        top:12px;
        left:12px;
        background:rgba(255,253,250,.95);
        color:var(--granate);
        font-family:'Raleway',sans-serif;
        font-size:10px;
        font-weight:700;
        letter-spacing:.2em;
        text-transform:uppercase;
        padding:6px 10px;
        border-radius:2px;
        backdrop-filter:blur(4px);
      }

      .favBadge.alert{
        background:var(--granate);
        color:#fff;
      }

      .heartBtn{
        position:absolute;
        top:10px;
        right:10px;
        width:36px;
        height:36px;
        border-radius:50%;
        background:rgba(255,253,250,.95);
        border:none;
        display:grid;
        place-items:center;
        color:var(--granate);
        cursor:pointer;
        backdrop-filter:blur(4px);
        transition:all .18s ease;
      }

      .heartBtn:hover{
        background:#fff;
        transform:scale(1.06);
      }

      .heartBtn svg{
        width:18px;
        height:18px;
        fill:currentColor;
      }

      .favBody{
        padding:18px 18px 20px;
        display:flex;
        flex-direction:column;
        gap:6px;
      }

      .favPrice{
        font-family:'Raleway',sans-serif;
        font-size:24px;
        font-weight:600;
        color:var(--granate);
        letter-spacing:-.5px;
        line-height:1;
      }

      .favPrice .perMeter{
        font-size:12px;
        color:var(--muted);
        font-weight:500;
        letter-spacing:0;
        margin-left:8px;
      }

      .favTitle{
        margin:0;
        font-size:15px;
        font-weight:500;
        color:var(--ink);
        line-height:1.35;
      }

      .favLocation{
        font-size:13px;
        color:var(--muted);
        display:flex;
        align-items:center;
        gap:4px;
      }

      .favLocation svg{
        width:12px;
        height:12px;
        flex-shrink:0;
      }

      .favSpecs{
        display:flex;
        gap:14px;
        font-size:12.5px;
        color:var(--ink2);
        padding-top:10px;
        margin-top:6px;
        border-top:1px solid var(--lineSoft);
      }

      .favSpecs span{
        display:inline-flex;
        align-items:center;
        gap:5px;
      }

      .favSpecs svg{
        width:13px;
        height:13px;
        color:var(--dorado);
      }

      .favFootnote{
        font-size:12px;
        color:var(--muted);
        margin-top:10px;
        display:flex;
        justify-content:space-between;
        align-items:center;
      }

      .favFootnote .saved{
        color:var(--good);
        display:inline-flex;
        align-items:center;
        gap:5px;
      }

      .favFootnote .saved::before{
        content:"";
        width:6px;
        height:6px;
        border-radius:50%;
        background:var(--good);
      }

      /* ===== Empty state ===== */
      .emptyState{
        display:none;
        text-align:center;
        padding:80px 20px;
        border:1px dashed var(--line);
        border-radius:4px;
        background:var(--cardWarm);
      }

      .emptyState.show{ display:block; }

      .emptyState h3{
        font-family:'Raleway',sans-serif;
        color:var(--granate);
        font-size:24px;
        margin:14px 0 8px;
        font-weight:400;
      }

      .emptyState p{
        color:var(--ink2);
        margin:0 0 22px;
      }

      @media (max-width:900px){
        .favGrid{ grid-template-columns:repeat(2,minmax(0,1fr)); }
        .pageTitle{ font-size:42px; }
      }

      @media (max-width:680px){
        .pageWrap{ padding:24px 16px 64px; }
        .pageHeader{
          grid-template-columns:1fr;
          gap:18px;
        }
        .headerActions{ flex-wrap:wrap; }
        .pageTitle{ font-size:34px; letter-spacing:-.8px; }
        .pageSubtitle{ font-size:15px; }
        .favGrid{ grid-template-columns:1fr; gap:16px; }
      }
    </style>
  </head>

  <body>
    <div id="bhHeader"></div>

    <main class="pageWrap">
      <nav class="crumbs" aria-label="Migas de pan">
        <a href="./account.html">Mi cuenta</a>
        <span class="sep">/</span>
        <span class="current">Favoritos</span>
      </nav>

      <header class="pageHeader">
        <div>
          <p class="pageKicker">Tu colección</p>
          <h1 class="pageTitle">Tus <strong>favoritos</strong></h1>
          <p class="pageSubtitle">Las viviendas que has guardado. Solo se muestran los favoritos asociados a tu cuenta.</p>
        </div>
        <div class="headerActions">
          <a class="pillBtn primary" href="./map.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>
            Buscar viviendas
          </a>
        </div>
      </header>

      <div class="toolbar">
        <div class="toolbarLeft" role="tablist">
          <button class="tabBtn active" type="button" data-mode="all">Todos <span class="count" id="countAll">0</span></button>
          <button class="tabBtn" type="button" data-mode="buy">Comprar <span class="count" id="countBuy">0</span></button>
          <button class="tabBtn" type="button" data-mode="newbuild">Obra nueva <span class="count" id="countNewBuild">0</span></button>
          <button class="tabBtn" type="button" data-mode="rent">Alquilar <span class="count" id="countRent">0</span></button>
          <button class="tabBtn" type="button" data-mode="room">Habitación <span class="count" id="countRoom">0</span></button>
        </div>
        <div class="sortWrap">
          <span>Ordenar</span>
          <select class="sortSelect" id="sortSelect">
            <option value="saved_desc">Guardados recientemente</option>
            <option value="price_asc">Precio menor a mayor</option>
            <option value="price_desc">Precio mayor a menor</option>
          </select>
        </div>
      </div>

      <section class="favGrid" id="favGrid" aria-live="polite"></section>

      <section class="emptyState" id="emptyState" aria-hidden="true">
        <h3>Aún no tienes favoritos</h3>
        <p>Pulsa el corazón en cualquier vivienda del mapa o de la ficha para guardarla aquí.</p>
        <a class="pillBtn primary" href="./map.html">Ir al mapa</a>
      </section>
    </main>

    <div id="bhFooter"></div>

    <script type="module">
      import { initLayout } from "./bh-layout.js?v=20260507_fix_layout_export";
      import { initAuth } from "./bh-auth.js?v=20260504";
      import { getSession, listFavorites, removeFavorite, openLoginModalOrAlert } from "./bh-user-data.js";

      initLayout({ showMiniSearch: false });
      initAuth();

      const grid = document.getElementById("favGrid");
      const empty = document.getElementById("emptyState");
      const sortSelect = document.getElementById("sortSelect");
      const tabs = Array.from(document.querySelectorAll(".tabBtn"));
      let rows = [];
      let activeMode = "all";

      function euro(n){
        if (n == null) return "—";
        return new Intl.NumberFormat("es-ES", { style:"currency", currency:"EUR", maximumFractionDigits:0 }).format(n);
      }
      function text(v, fallback="—"){ return v == null || String(v).trim()==="" ? fallback : String(v).trim(); }
      function address(r){ return text(r.address_display) !== "—" ? r.address_display : [r.street_name, r.street_number, r.floor, r.door].map(v=>text(v,"")).filter(Boolean).join(" ") || "Dirección"; }
      function locationText(r){ return [r.postcode, r.city].map(v=>text(v,"")).filter(Boolean).join(" ") || "—"; }
      function savedWhen(v){
        if (!v) return "Guardado";
        const d = new Date(v); if (isNaN(d)) return "Guardado";
        return "Guardado el " + d.toLocaleDateString("es-ES");
      }
      function modeOf(r){ return String(r.listing_mode || "buy"); }

      function propertyTypeOf(r){
        return String(
          r.property_type ||
          r.listing_type ||
          r.operation_type ||
          ""
        ).toLowerCase();
      }

      function isNewBuild(r){
        return (
          r.is_new_build === true ||
          propertyTypeOf(r).includes("obra") ||
          propertyTypeOf(r).includes("new")
        );
      }

      function isRoom(r){
        return (
          propertyTypeOf(r).includes("habitacion") ||
          propertyTypeOf(r).includes("habitación") ||
          propertyTypeOf(r).includes("room")
        );
      }

      function matchesActiveMode(r){
        if (activeMode === "all") return true;
        if (activeMode === "buy") return modeOf(r) === "buy";
        if (activeMode === "rent") return modeOf(r) === "rent";
        if (activeMode === "newbuild") return isNewBuild(r);
        if (activeMode === "room") return isRoom(r);
        return true;
      }

      function sortRows(a,b){
        const mode = sortSelect.value;
        if (mode === "price_asc") return (a.price_eur ?? 999999999) - (b.price_eur ?? 999999999);
        if (mode === "price_desc") return (b.price_eur ?? -1) - (a.price_eur ?? -1);
        return new Date(b.favorited_at || 0) - new Date(a.favorited_at || 0);
      }
      function updateCounts(){
        document.getElementById("countAll").textContent = rows.length;
        document.getElementById("countBuy").textContent = rows.filter(r => modeOf(r)==="buy").length;
        document.getElementById("countRent").textContent = rows.filter(r => modeOf(r)==="rent").length;
        document.getElementById("countNewBuild").textContent = rows.filter(r => isNewBuild(r)).length;
        document.getElementById("countRoom").textContent = rows.filter(r => isRoom(r)).length;
      }

      function render(){
        updateCounts();
        let visible = rows.filter(matchesActiveMode).sort(sortRows);
        grid.innerHTML = "";
        empty.classList.toggle("show", visible.length === 0);
        empty.setAttribute("aria-hidden", visible.length === 0 ? "false" : "true");
        visible.forEach(r => {
          const a = document.createElement("a");
          a.className = "favCard";
          a.href = `./listing.html?id=${encodeURIComponent(r.listing_id)}`;
          a.innerHTML = `
            <div class="favMedia">
              <div class="placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 4h16v16H4z"/><path d="m4 16 5-5 4 4 2-2 5 5"/><circle cx="9" cy="8" r="1.5"/></svg></div>
              <span class="favBadge">${text(r.status, "publicado")}</span>
              <button class="heartBtn" type="button" aria-label="Quitar de favoritos" data-id="${r.listing_id}"><svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.8"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 1 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"></path></svg></button>
            </div>
            <div class="favBody">
              <div class="favPrice">${euro(r.price_eur)}</div>
              <h3 class="favTitle">${address(r)}</h3>
              <div class="favLocation">${locationText(r)}</div>
              <div class="favSpecs"><span>${r.bedrooms ?? "—"} hab.</span><span>${r.bathrooms ?? "—"} baños</span><span>${r.useful_area_m2 ?? "—"} m² útiles</span></div>
              <div class="favFootnote"><span class="saved">${savedWhen(r.favorited_at)}</span><span>${text(r.agency_name)}</span></div>
            </div>`;
          grid.appendChild(a);
        });
      }
      grid.addEventListener("click", async (e) => {
        const btn = e.target.closest(".heartBtn");
        if (!btn) return;
        e.preventDefault(); e.stopPropagation();
        const id = btn.dataset.id;
        try{
          await removeFavorite(id);
          rows = rows.filter(r => String(r.listing_id) !== String(id));
          render();
        }catch(err){ console.error(err); alert("No se pudo quitar el favorito."); }
      });
      tabs.forEach(tab => tab.addEventListener("click", () => {
        tabs.forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        activeMode = tab.dataset.mode || "all";
        render();
      }));
      sortSelect.addEventListener("change", render);
      (async()=>{
        const session = await getSession();
        if (!session?.user){ openLoginModalOrAlert(); empty.classList.add("show"); return; }
        rows = await listFavorites();
        render();
      })().catch(err => { console.error(err); alert("No se pudieron cargar los favoritos."); });
    </script>
  </body>
</html>
