<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Homyo · 10 variantes por icono</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@500;600;700;800&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; }

  .setCard {
    box-sizing: border-box;
    height: 100%;
    padding: 22px 24px;
    display: flex;
    flex-direction: column;
    background: #FBF8F4;
  }
  .setHead {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 16px;
  }
  .setName {
    font-family: 'Raleway', sans-serif;
    font-weight: 700; font-size: 17px;
    color: #3a2b2e;
  }
  .setMeta {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500; font-size: 11px;
    color: #a89a93; margin-left: auto;
  }
  .vGrid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 18px 14px;
    flex: 1;
    align-content: center;
  }
  .vCell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .vTile {
    width: 56px; height: 56px;
    border-radius: 17px;
    border: 1px solid rgba(138,31,45,.12);
    background: rgba(255,255,255,.78);
    box-shadow: 0 8px 18px rgba(138,31,45,.05), inset 0 1px 0 rgba(255,255,255,.9);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
  }
  .vTile svg {
    width: 24px; height: 24px;
    stroke: #8A1F2D; stroke-width: 1.6; fill: none;
    stroke-linecap: round; stroke-linejoin: round;
  }
  .vNum {
    font-family: 'Raleway', sans-serif;
    font-weight: 700; font-size: 9px;
    letter-spacing: .1em; color: #8A1F2D; opacity: .5;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">

function VariantGrid({ set }) {
  return (
    <div className="setCard">
      <div className="setHead">
        <span className="setName">{set.name}</span>
        <span className="setMeta">{set.meta}</span>
      </div>
      <div className="vGrid">
        {set.variants.map((svg, i) => (
          <div className="vCell" key={i}>
            <div className="vTile">
              <svg viewBox="0 0 24 24" dangerouslySetInnerHTML={{ __html: svg }} />
            </div>
            <span className="vNum">{'V' + String(i + 1).padStart(2, '0')}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="variantes" title="10 variantes por icono · Homyo" subtitle="Cada tarjeta es uno de los 5 modos de búsqueda con 10 alternativas de glifo — mismo estilo de línea fina granate. Ábrelas en pantalla completa para inspeccionar.">
        {SETS.map((set) => (
          <DCArtboard key={set.key} id={set.key} label={set.name} width={460} height={300}>
            <VariantGrid set={set} />
          </DCArtboard>
        ))}
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
